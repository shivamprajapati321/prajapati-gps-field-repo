<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Campaign Report — Prajapati Advertising</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B1957;--orange:#FF6B00;--bg:#f0f2f8;--card:#fff;
  --tx:#0f172a;--tx2:#64748b;--tx3:#94a3b8;--border:#e2e8f0;
  --gr:#22c55e;--bl:#3b82f6;--am:#f59e0b;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}

.hdr{background:var(--navy);padding:16px 20px;position:sticky;top:0;z-index:50}
.hdr-top{display:flex;justify-content:space-between;align-items:center;max-width:1300px;margin:0 auto;flex-wrap:wrap;gap:10px}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:38px;height:38px;background:var(--orange);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:15px}
.brand-name{color:#fff;font-size:15px;font-weight:800}
.brand-tag{color:rgba(255,255,255,.5);font-size:10px;letter-spacing:.5px;text-transform:uppercase}
.camp-badge{background:rgba(255,255,255,.1);color:#fff;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600}
.camp-badge b{color:var(--orange)}

.container{max-width:1300px;margin:0 auto;padding:20px}

.date-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;scrollbar-width:none}
.date-bar::-webkit-scrollbar{display:none}
.dp{padding:8px 16px;border-radius:20px;background:#fff;border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--tx2);cursor:pointer;white-space:nowrap;transition:all 0.15s}
.dp.act{background:var(--navy);color:#fff;border-color:var(--navy)}
.dp:hover:not(.act){border-color:var(--navy)}

.custom-range{display:none;gap:8px;align-items:center;margin-bottom:16px;background:#fff;padding:12px;border-radius:10px}
.custom-range.show{display:flex}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--card);border-radius:12px;padding:16px;border-top:3px solid var(--c)}
.kpi-v{font-size:26px;font-weight:900;color:var(--navy)}
.kpi-l{font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-top:2px}

.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px;background:var(--card);padding:14px 16px;border-radius:12px}
.tb-left{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sel,.inp{background:#fff;border:1px solid var(--border);color:var(--tx);padding:8px 12px;border-radius:8px;font-size:12px;font-family:inherit;outline:none}
.sel:focus,.inp:focus{border-color:var(--navy)}
.tb-right{display:flex;gap:8px;flex-wrap:wrap}
.dl-btn{display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all 0.15s}
.dl-zip{background:#1e293b;color:#fff}
.dl-ppt{background:#d04727;color:#fff}
.dl-excel{background:#1d6f42;color:#fff}
.dl-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.dl-btn:disabled{opacity:.5;cursor:not-allowed}

.view-toggle{display:flex;background:#f1f5f9;border-radius:8px;padding:3px}
.vt{padding:7px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;color:var(--tx2);border:none;background:none;font-family:inherit}
.vt.act{background:#fff;color:var(--navy);box-shadow:0 1px 3px rgba(0,0,0,.1)}

.loc-group{margin-bottom:24px}
.loc-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.loc-icon{width:32px;height:32px;background:var(--orange);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.loc-name{font-size:15px;font-weight:800;color:var(--navy)}
.loc-count{background:#dcfce7;color:#166534;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700}
.loc-dl{margin-left:auto;font-size:11px;color:var(--navy);cursor:pointer;font-weight:600;display:flex;align-items:center;gap:4px}

.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.pcard{background:var(--card);border-radius:12px;overflow:hidden;cursor:pointer;transition:all 0.15s;border:2px solid transparent}
.pcard:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.12);border-color:var(--orange)}
.pthumb{aspect-ratio:4/3;background:linear-gradient(135deg,#cbd5e1,#94a3b8);position:relative;display:flex;align-items:center;justify-content:center;font-size:36px;color:rgba(255,255,255,.6);overflow:hidden}
.pthumb img{width:100%;height:100%;object-fit:cover}
.p-rick{position:absolute;top:8px;left:8px;background:rgba(255,107,0,.9);padding:2px 8px;border-radius:5px;font-size:9px;font-weight:800;color:#fff;z-index:2}
.p-info{padding:10px}
.p-vehicle{font-size:13px;font-weight:800;color:var(--navy)}
.p-time{font-size:10px;color:var(--tx2);margin-top:1px}
.p-addr{font-size:9px;color:var(--tx3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.lb{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:100;flex-direction:column}
.lb.show{display:flex}
.lb-img{max-width:90%;max-height:75vh;border-radius:10px}
.lb-info{color:#fff;margin-top:16px;text-align:center;max-width:500px}
.lb-close{position:absolute;top:20px;right:20px;color:#fff;font-size:24px;background:rgba(255,255,255,.15);border:none;width:40px;height:40px;border-radius:50%;cursor:pointer}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);font-size:30px;color:#fff;background:rgba(255,255,255,.1);border:none;width:50px;height:50px;border-radius:50%;cursor:pointer}

.dl-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:110}
.dl-modal.show{display:flex}
.dl-box{background:#fff;border-radius:14px;padding:24px;width:340px;text-align:center}
.dl-spin{width:50px;height:50px;border:4px solid #e2e8f0;border-top-color:var(--orange);border-radius:50%;margin:0 auto 16px;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.dl-prog{height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden;margin-top:12px}
.dl-prog-fill{height:8px;background:var(--orange);width:0%;transition:width 0.2s}

.loading{text-align:center;padding:60px 20px;color:var(--tx2)}
.empty{text-align:center;padding:60px 20px;color:var(--tx2)}
.footer{text-align:center;padding:24px;color:var(--tx3);font-size:11px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="brand">
      <div class="brand-mark" id="brandMark">PA</div>
      <div>
        <div class="brand-name" id="brandName">Prajapati Advertising</div>
        <div class="brand-tag">Campaign Report</div>
      </div>
    </div>
    <div class="camp-badge">📋 <b id="campName">Loading...</b></div>
  </div>
</div>

<div class="container">
  <div class="date-bar">
    <div class="dp act" data-range="today">📅 Today</div>
    <div class="dp" data-range="yesterday">Yesterday</div>
    <div class="dp" data-range="week">This Week</div>
    <div class="dp" data-range="month">This Month</div>
    <div class="dp" data-range="custom">Custom Range</div>
    <div class="dp" data-range="all">All Time</div>
  </div>

  <div class="custom-range" id="customRange">
    <input type="date" class="inp" id="dateFrom">
    <span style="color:var(--tx2)">to</span>
    <input type="date" class="inp" id="dateTo">
    <button class="dl-btn" style="background:var(--navy);color:#fff" onclick="applyCustom()">Apply</button>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="toolbar">
    <div class="tb-left">
      <select class="sel" id="areaFilter" onchange="render()"><option value="">All Areas</option></select>
      <div class="view-toggle">
        <button class="vt act" data-view="grid" onclick="setView('grid')">📷 Grid</button>
        <button class="vt" data-view="area" onclick="setView('area')">📍 By Area</button>
      </div>
    </div>
    <div class="tb-right">
      <button class="dl-btn dl-zip" id="btnZip" onclick="downloadZIP()">⬇️ Photos ZIP</button>
      <button class="dl-btn dl-ppt" id="btnPpt" onclick="downloadPPT()">📊 PPT Report</button>
      <button class="dl-btn dl-excel" id="btnExcel" onclick="downloadExcel()">📗 Excel</button>
    </div>
  </div>

  <div id="content">
    <div class="loading">⏳ Loading photos...</div>
  </div>
</div>

<div class="footer">
  Powered by Prajapati Advertising · GPS-verified field photography<br>
  <span id="genTime"></span>
</div>

<div class="lb" id="lightbox" onclick="if(event.target.id==='lightbox')closeLB()">
  <button class="lb-close" onclick="closeLB()">✕</button>
  <button class="lb-nav" style="left:20px" onclick="navLB(-1)">‹</button>
  <button class="lb-nav" style="right:20px" onclick="navLB(1)">›</button>
  <img class="lb-img" id="lbImg" src="" alt="">
  <div class="lb-info" id="lbInfo"></div>
</div>

<div class="dl-modal" id="dlModal">
  <div class="dl-box">
    <div class="dl-spin"></div>
    <div style="font-weight:800;font-size:15px" id="dlText">Preparing...</div>
    <div style="font-size:12px;color:#64748b;margin-top:6px" id="dlSub">Please wait...</div>
    <div class="dl-prog"><div class="dl-prog-fill" id="dlProg"></div></div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────
const SU = 'https://fpbktcgtspqsqpaytslv.supabase.co';
const SK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwYmt0Y2d0c3Bxc3FwYXl0c2x2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDI0NTksImV4cCI6MjA5MjI3ODQ1OX0._iXN3-rQ9tAW1OuzY4cZZT-Jdvysv4bJlkwT3TwvSJI';

// URL params
const params = new URLSearchParams(location.search);
const campaignId = params.get('c');  // e.g. camp_xxx or actual campaign id
const token = params.get('t');

let allPhotos = [];
let filteredPhotos = [];
let currentView = 'grid';
let currentRange = 'today';
let campaign = null;
let lbIndex = 0;

// ── DB HELPER ───────────────────────────────────────
async function db(path) {
  const r = await fetch(SU + '/rest/v1/' + path, {
    headers: { apikey: SK, Authorization: 'Bearer ' + SK }
  });
  return r.json();
}

// ── DATE RANGE ──────────────────────────────────────
function getDateRange(range) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let from, to = new Date(today.getTime() + 86400000);

  switch(range) {
    case 'today': from = today; break;
    case 'yesterday': from = new Date(today.getTime() - 86400000); to = today; break;
    case 'week': from = new Date(today.getTime() - 6*86400000); break;
    case 'month': from = new Date(now.getFullYear(), now.getMonth(), 1); break;
    case 'all': from = new Date(2020, 0, 1); break;
    case 'custom':
      from = new Date(document.getElementById('dateFrom').value || today);
      to = new Date(new Date(document.getElementById('dateTo').value || today).getTime() + 86400000);
      break;
    default: from = today;
  }
  return { from: from.toISOString(), to: to.toISOString() };
}

// ── LOAD DATA ───────────────────────────────────────
async function init() {
  document.getElementById('genTime').textContent = 'Report generated: ' + new Date().toLocaleString('en-IN');

  // Load campaign info
  if (campaignId) {
    try {
      const campField = campaignId.startsWith('camp_') ? 'campaign_code' : 'id';
      const camps = await db(`fc_campaigns?${campField}=eq.${campaignId}&select=*`);
      if (camps?.[0]) {
        campaign = camps[0];
        document.getElementById('campName').textContent = campaign.name || 'Campaign';
        // Branding
        if (campaign.branding === 'agency') {
          document.getElementById('brandName').textContent = campaign.agency_name || 'Agency';
          document.getElementById('brandMark').textContent = (campaign.agency_name || 'AG')[0];
        }
      }
    } catch(e) { console.error(e); }
  }

  loadPhotos();
}

async function loadPhotos() {
  document.getElementById('content').innerHTML = '<div class="loading">⏳ Loading photos...</div>';
  const { from, to } = getDateRange(currentRange);

  let query = `fc_photos?select=*&order=captured_at.desc&captured_at=gte.${from}&captured_at=lt.${to}`;
  if (campaign?.id) query += `&campaign_id=eq.${campaign.id}`;

  try {
    allPhotos = await db(query) || [];
    filteredPhotos = allPhotos;
    populateAreaFilter();
    updateKPIs();
    render();
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty">❌ Error loading photos</div>';
  }
}

function populateAreaFilter() {
  const areas = [...new Set(allPhotos.map(p => getArea(p)))].filter(Boolean).sort();
  const sel = document.getElementById('areaFilter');
  sel.innerHTML = '<option value="">All Areas</option>' + areas.map(a => `<option value="${a}">${a}</option>`).join('');
}

function getArea(p) {
  if (p.city) return p.city.split(',')[0].trim();
  if (p.address) return p.address.split(',')[0].trim();
  return 'Unknown Area';
}

function updateKPIs() {
  const photos = filteredPhotos.length;
  const rickshaws = new Set(filteredPhotos.map(p => p.rickshaw_session + '_' + p.assignment_id)).size;
  const areas = new Set(filteredPhotos.map(p => getArea(p))).size;
  const withGps = filteredPhotos.filter(p => p.latitude).length;
  const gpsPct = photos ? Math.round(withGps/photos*100) : 0;

  document.getElementById('kpis').innerHTML = `
    <div class="kpi" style="--c:#0B1957"><div class="kpi-v">${photos}</div><div class="kpi-l">Total Photos</div></div>
    <div class="kpi" style="--c:#FF6B00"><div class="kpi-v">${rickshaws}</div><div class="kpi-l">Rickshaws</div></div>
    <div class="kpi" style="--c:#22c55e"><div class="kpi-v">${areas}</div><div class="kpi-l">Areas Covered</div></div>
    <div class="kpi" style="--c:#8b5cf6"><div class="kpi-v">${gpsPct}%</div><div class="kpi-l">GPS Tagged</div></div>
  `;
}

// ── DATE PILLS ──────────────────────────────────────
document.querySelectorAll('.dp').forEach(pill => {
  pill.onclick = () => {
    document.querySelectorAll('.dp').forEach(p => p.classList.remove('act'));
    pill.classList.add('act');
    currentRange = pill.dataset.range;
    document.getElementById('customRange').classList.toggle('show', currentRange === 'custom');
    if (currentRange !== 'custom') loadPhotos();
  };
});

function applyCustom() { loadPhotos(); }

// ── FILTER ──────────────────────────────────────────
function applyFilters() {
  const area = document.getElementById('areaFilter').value;
  filteredPhotos = allPhotos.filter(p => !area || getArea(p) === area);
  updateKPIs();
}

// ── RENDER ──────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.querySelectorAll('.vt').forEach(b => b.classList.toggle('act', b.dataset.view === v));
  render();
}

function render() {
  applyFilters();
  const content = document.getElementById('content');

  if (!filteredPhotos.length) {
    content.innerHTML = '<div class="empty">📷 No photos found for this period</div>';
    return;
  }

  if (currentView === 'area') {
    // Group by area
    const groups = {};
    filteredPhotos.forEach(p => {
      const area = getArea(p);
      if (!groups[area]) groups[area] = [];
      groups[area].push(p);
    });
    content.innerHTML = Object.entries(groups).map(([area, photos]) => {
      const ricks = new Set(photos.map(p => p.rickshaw_session)).size;
      return `<div class="loc-group">
        <div class="loc-hdr">
          <div class="loc-icon">📍</div>
          <div class="loc-name">${area}</div>
          <div class="loc-count">${photos.length} photos · ${ricks} rickshaws</div>
          <div class="loc-dl" onclick="downloadArea('${area}')">⬇️ Download area</div>
        </div>
        <div class="pgrid">${photos.map(p => photoCard(p)).join('')}</div>
      </div>`;
    }).join('');
  } else {
    // Simple grid
    content.innerHTML = `<div class="pgrid">${filteredPhotos.map(p => photoCard(p)).join('')}</div>`;
  }
}

function photoCard(p) {
  const idx = filteredPhotos.indexOf(p);
  const url = p.storage_url || '';
  const time = p.captured_at ? new Date(p.captured_at).toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'}) : '';
  return `<div class="pcard" onclick="openLB(${idx})">
    <div class="pthumb">
      ${url ? `<img src="${url}" loading="lazy" onerror="this.style.display='none';this.parentElement.innerHTML='📸'+this.parentElement.innerHTML">` : '📸'}
      <div class="p-rick">Rick ${String(p.rickshaw_session || 1).padStart(3,'0')}</div>
    </div>
    <div class="p-info">
      <div class="p-vehicle">${p.vehicle_number || 'Photo ' + (p.photo_number||1) + '/3'}</div>
      <div class="p-time">${time} · Photo ${p.photo_number || 1}/3</div>
      <div class="p-addr">📍 ${getArea(p)}</div>
    </div>
  </div>`;
}

// ── LIGHTBOX ────────────────────────────────────────
function openLB(idx) {
  lbIndex = idx;
  showLB();
  document.getElementById('lightbox').classList.add('show');
}
function showLB() {
  const p = filteredPhotos[lbIndex];
  document.getElementById('lbImg').src = p.storage_url || '';
  document.getElementById('lbInfo').innerHTML = `
    <div style="font-size:16px;font-weight:800">Rick ${String(p.rickshaw_session||1).padStart(3,'0')} · Photo ${p.photo_number||1}/3</div>
    <div style="font-size:12px;opacity:.8;margin-top:4px">${p.address || getArea(p)}</div>
    <div style="font-size:11px;opacity:.6;margin-top:2px">Lat ${p.latitude?.toFixed(6)||'—'}° Long ${p.longitude?.toFixed(6)||'—'}°</div>
    <a href="${p.storage_url}" download class="dl-btn dl-zip" style="margin-top:12px;display:inline-flex;text-decoration:none">⬇️ Download</a>
  `;
}
function navLB(dir) {
  lbIndex = (lbIndex + dir + filteredPhotos.length) % filteredPhotos.length;
  showLB();
}
function closeLB() { document.getElementById('lightbox').classList.remove('show'); }

// ── DOWNLOAD MODAL ──────────────────────────────────
function showModal(text, sub) {
  document.getElementById('dlText').textContent = text;
  document.getElementById('dlSub').textContent = sub || 'Please wait...';
  document.getElementById('dlProg').style.width = '0%';
  document.getElementById('dlModal').classList.add('show');
}
function updateProg(pct, sub) {
  document.getElementById('dlProg').style.width = pct + '%';
  if (sub) document.getElementById('dlSub').textContent = sub;
}
function hideModal() { document.getElementById('dlModal').classList.remove('show'); }

// ── ZIP DOWNLOAD ────────────────────────────────────
async function downloadZIP(photos) {
  const list = photos || filteredPhotos;
  if (!list.length) { alert('No photos to download'); return; }
  showModal('Preparing ZIP...', `Downloading ${list.length} photos...`);
  const zip = new JSZip();

  for (let i = 0; i < list.length; i++) {
    const p = list[i];
    if (!p.storage_url) continue;
    try {
      const resp = await fetch(p.storage_url);
      const blob = await resp.blob();
      const area = getArea(p).replace(/\W/g, '_');
      const folder = `${area}/Rick_${String(p.rickshaw_session||1).padStart(3,'0')}`;
      zip.file(`${folder}/photo_${p.photo_number||i}.jpg`, blob);
    } catch(e) { console.warn('Skip:', p.id); }
    updateProg(Math.round((i+1)/list.length*100), `${i+1}/${list.length} photos`);
  }

  updateProg(100, 'Compressing...');
  const content = await zip.generateAsync({ type: 'blob' });
  const name = (campaign?.name || 'Campaign').replace(/\W/g, '_');
  saveAs(content, `${name}_Photos_${new Date().toISOString().slice(0,10)}.zip`);
  hideModal();
}

function downloadArea(area) {
  const photos = filteredPhotos.filter(p => getArea(p) === area);
  downloadZIP(photos);
}

// ── PPT DOWNLOAD ────────────────────────────────────
async function downloadPPT() {
  if (!filteredPhotos.length) { alert('No photos'); return; }
  showModal('Generating PPT...', 'Creating presentation...');
  const pptx = new PptxGenJS();
  pptx.layout = 'LAYOUT_WIDE';

  // Title slide
  const title = pptx.addSlide();
  title.background = { color: '0B1957' };
  title.addText(campaign?.name || 'Campaign Report', { x: 0.5, y: 2, w: 12, h: 1, fontSize: 36, bold: true, color: 'FF6B00', align: 'center' });
  title.addText('Prajapati Advertising', { x: 0.5, y: 3, w: 12, h: 0.5, fontSize: 18, color: 'FFFFFF', align: 'center' });
  title.addText(`${filteredPhotos.length} Photos · ${new Date().toLocaleDateString('en-IN')}`, { x: 0.5, y: 3.6, w: 12, h: 0.4, fontSize: 14, color: 'AAAAAA', align: 'center' });

  const mediaType = campaign?.media_type || filteredPhotos[0]?.media_type || 'Hood';
  const perSlide = mediaType === 'Hood' ? 3 : 1;

  for (let i = 0; i < filteredPhotos.length; i += perSlide) {
    const slide = pptx.addSlide();
    const batch = filteredPhotos.slice(i, i + perSlide);
    updateProg(Math.round(i/filteredPhotos.length*100), `Slide ${Math.floor(i/perSlide)+1}`);

    for (let j = 0; j < batch.length; j++) {
      const p = batch[j];
      try {
        const dataUrl = await urlToBase64(p.storage_url);
        if (perSlide === 1) {
          slide.addImage({ data: dataUrl, x: 1, y: 0.5, w: 11, h: 6 });
        } else {
          slide.addImage({ data: dataUrl, x: 0.3 + j*4.4, y: 1.5, w: 4.2, h: 4 });
        }
      } catch(e) {}
    }
  }

  updateProg(100, 'Saving...');
  const name = (campaign?.name || 'Campaign').replace(/\W/g, '_');
  await pptx.writeFile({ fileName: `${name}_Report.pptx` });
  hideModal();
}

// ── EXCEL DOWNLOAD ──────────────────────────────────
function downloadExcel() {
  if (!filteredPhotos.length) { alert('No photos'); return; }
  showModal('Building Excel...', 'Creating report...');

  const rows = filteredPhotos.map((p, i) => ({
    'Sr': i + 1,
    'Rickshaw': 'Rick_' + String(p.rickshaw_session||1).padStart(3,'0'),
    'Photo': (p.photo_number||1) + '/3',
    'Vehicle': p.vehicle_number || '',
    'Area': getArea(p),
    'Address': p.address || '',
    'Latitude': p.latitude || '',
    'Longitude': p.longitude || '',
    'Pincode': p.pincode || '',
    'Captured': p.captured_at ? new Date(p.captured_at).toLocaleString('en-IN') : '',
    'Photo URL': p.storage_url || ''
  }));

  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:5},{wch:12},{wch:8},{wch:15},{wch:15},{wch:40},{wch:12},{wch:12},{wch:10},{wch:20},{wch:50}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Photos');

  const name = (campaign?.name || 'Campaign').replace(/\W/g, '_');
  XLSX.writeFile(wb, `${name}_Report_${new Date().toISOString().slice(0,10)}.xlsx`);
  hideModal();
}

// ── HELPER: URL to Base64 ──────────────────────────
async function urlToBase64(url) {
  const resp = await fetch(url);
  const blob = await resp.blob();
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result);
    reader.readAsDataURL(blob);
  });
}

// ── KEYBOARD ────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('show')) return;
  if (e.key === 'ArrowLeft') navLB(-1);
  if (e.key === 'ArrowRight') navLB(1);
  if (e.key === 'Escape') closeLB();
});

// ── START ───────────────────────────────────────────
init();
</script>
