<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
<title>Prajapati PPT Generator v15</title>
<script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--p:#0f1c5e;--p2:#0073e6;--ok:#10b981;--err:#ef4444;--warn:#f59e0b;--bg:#f5f7fb;--card:#fff;--border:#e5e7eb;--muted:#6b7280}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:var(--bg);min-height:100vh;padding:20px}
.container{max-width:1200px;margin:0 auto}
.hdr{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;padding:24px 28px;border-radius:14px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:24px;font-weight:700;margin-bottom:4px}
.hdr .sub{font-size:13px;opacity:0.9}
.version-badge{background:rgba(255,255,255,0.2);padding:6px 14px;border-radius:99px;font-size:13px;font-weight:700}
.card{background:var(--card);border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid var(--border)}
.card h2{color:var(--p);font-size:18px;margin-bottom:12px;font-weight:700}
.field-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:14px}
.field-group{display:flex;flex-direction:column;gap:6px}
.field-group label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase}
.field-group input,.field-group select{padding:10px 12px;border:2px solid var(--border);border-radius:8px;font-size:14px;background:#fff;font-family:inherit}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:0.2s}
.btn-primary{background:var(--p2);color:#fff}
.btn-success{background:var(--ok);color:#fff}
.btn-outline{background:#fff;border:2px solid var(--border);color:var(--p)}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:14px}
.vehicle-preview{background:#fafbfc;border:1px solid var(--border);border-radius:10px;padding:12px}
.vehicle-preview .plate{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--p);font-size:14px;margin-bottom:6px}
.vehicle-preview .meta{font-size:11px;color:var(--muted);margin-bottom:8px}
.vehicle-preview .photos-mini{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.vehicle-preview .photos-mini img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:4px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:14px}
.stat-tile{background:linear-gradient(135deg,#f0f9ff,#dbeafe);border-radius:10px;padding:14px;text-align:center;border:1px solid #bae6fd}
.stat-tile .num{font-size:28px;font-weight:700;color:var(--p);line-height:1}
.stat-tile .label{font-size:11px;color:var(--muted);text-transform:uppercase;margin-top:4px;font-weight:600}
.empty{text-align:center;padding:40px;color:var(--muted)}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--p2);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.alert{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:14px;font-weight:600}
.alert-info{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd}
.alert-warn{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
.toast{position:fixed;bottom:20px;right:20px;background:var(--p);color:#fff;padding:14px 20px;border-radius:8px;font-weight:600;opacity:0;transition:0.2s;z-index:1000}
.toast.show{opacity:1}
.toast.success{background:var(--ok)}
.toast.error{background:var(--err)}
</style>
</head>
<body>
<div class="container">
  <div class="hdr">
    <div><h1>📊 PPT Generator v15</h1><div class="sub">Vehicle-wise grouping · Filter rejected/deleted out</div></div>
    <div class="version-badge">v15 ✅</div>
  </div>

  <div class="alert alert-info">ℹ️ <b>v15:</b> Rejected aur deleted photos automatically filter ho jate hain — sirf verified, active photos PPT me dikhte hain.</div>

  <div class="card">
    <h2>1. Filter Criteria</h2>
    <div class="field-row">
      <div class="field-group">
        <label>Campaign</label>
        <select id="campaignSelect"><option value="">-- Loading --</option></select>
      </div>
      <div class="field-group">
        <label>From Date</label>
        <input type="date" id="dateFrom" />
      </div>
      <div class="field-group">
        <label>To Date</label>
        <input type="date" id="dateTo" />
      </div>
      <div class="field-group">
        <label>Mode</label>
        <select id="modeSelect"><option value="">All (Hood + Back)</option><option value="hood">Hood Only</option><option value="back_panel">Back Panel Only</option></select>
      </div>
    </div>
    <button class="btn btn-primary" onclick="loadVehicles()">🔍 Load Vehicles</button>
  </div>

  <div class="card" id="resultsCard" style="display:none">
    <h2>2. Preview</h2>
    <div class="stats-row" id="statsRow"></div>
    <div id="previewGrid" class="preview-grid"></div>
  </div>

  <div class="card" id="generateCard" style="display:none">
    <h2>3. Generate PPT</h2>
    <div class="field-row">
      <div class="field-group">
        <label>Client/Brand Name</label>
        <input type="text" id="clientName" placeholder="e.g. iNVENT APAR" />
      </div>
      <div class="field-group">
        <label>City</label>
        <input type="text" id="cityName" placeholder="e.g. Nanded" />
      </div>
    </div>
    <button class="btn btn-success" id="generateBtn" onclick="generatePPT()">📥 Generate & Download PPT</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
console.log('[PPT v15] Filter rejected/deleted - loaded');

var CONFIG = {
  supabaseUrl: 'https://fpbktcgtspqsqpaytslv.supabase.co',
  supabaseKey: 'sb_publishable_JhObe56x_zETygpy6y8-DQ_qpQXIz_j'
};

var state = { vehicles: [], campaigns: [] };

function $(id){ return document.getElementById(id); }
function toast(msg, type){
  var t = $('toast');
  t.textContent = msg; t.className = 'toast show ' + (type || '');
  setTimeout(function(){ t.className = 'toast'; }, 3000);
}
function escHtml(s){
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; });
}
function api(path){
  return fetch(CONFIG.supabaseUrl + path, {
    headers: { 'apikey': CONFIG.supabaseKey, 'Authorization': 'Bearer ' + CONFIG.supabaseKey }
  }).then(function(r){
    if (!r.ok) throw new Error('API ' + r.status);
    return r.json();
  });
}

function loadCampaigns(){
  api('/rest/v1/trial_campaigns?select=key,name,client_name&active=eq.true&order=name.asc').then(function(rows){
    state.campaigns = rows || [];
    var sel = $('campaignSelect');
    sel.innerHTML = '<option value="">-- Select Campaign --</option>';
    state.campaigns.forEach(function(c){
      sel.innerHTML += '<option value="' + escHtml(c.key) + '">' + escHtml(c.name) + '</option>';
    });
  }).catch(function(err){ toast('Load campaigns error: ' + err.message, 'error'); });
}

function loadVehicles(){
  var campaign = $('campaignSelect').value;
  var dateFrom = $('dateFrom').value;
  var dateTo = $('dateTo').value;
  var mode = $('modeSelect').value;
  
  if (!campaign) return toast('Campaign select karo', 'error');
  
  $('previewGrid').innerHTML = '<div class="empty"><div class="spinner"></div><div style="margin-top:10px;">Loading...</div></div>';
  $('resultsCard').style.display = 'block';
  
  // ⭐ KEY v15 FILTER: rejected=false AND deleted_at IS NULL
  var qs = '/rest/v1/trial_photos?select=*&campaign_key=eq.' + encodeURIComponent(campaign) 
    + '&is_verified=eq.true&rejected=eq.false&deleted_at=is.null'
    + '&order=captured_at.desc&limit=2000';
  
  if (dateFrom) qs += '&captured_at=gte.' + new Date(dateFrom + 'T00:00:00+05:30').toISOString();
  if (dateTo) qs += '&captured_at=lte.' + new Date(dateTo + 'T23:59:59+05:30').toISOString();
  if (mode) qs += '&mode=eq.' + mode;
  
  api(qs).then(function(photos){
    photos = photos || [];
    console.log('[PPT v15] Loaded', photos.length, 'active verified photos');
    
    // Group by vehicle_group_id or vehicle_number
    var groups = {};
    photos.forEach(function(p){
      var key = p.vehicle_group_id || (p.verified_plate || p.vehicle_number || 'unknown') + '_' + (p.captured_at||'').slice(0,10);
      if (!groups[key]){
        groups[key] = {
          plate: p.verified_plate || p.vehicle_number,
          captured: p.captured_at,
          campaign: p.campaign_key,
          member: p.member_name,
          city: p.city || '',
          address: p.address || '',
          mode: p.mode || 'hood',
          photos: []
        };
      }
      groups[key].photos.push(p);
    });
    
    state.vehicles = Object.values(groups);
    renderPreview();
    
    if (state.vehicles.length > 0){
      $('generateCard').style.display = 'block';
      var camp = state.campaigns.find(function(c){ return c.key === campaign; });
      if (camp){
        $('clientName').value = camp.client_name || camp.name || '';
      }
    } else {
      $('generateCard').style.display = 'none';
    }
  }).catch(function(err){
    $('previewGrid').innerHTML = '<div class="empty" style="color:var(--err)">Error: ' + err.message + '</div>';
  });
}

function renderPreview(){
  if (state.vehicles.length === 0){
    $('previewGrid').innerHTML = '<div class="empty">📭 No verified vehicles in this range</div>';
    $('statsRow').innerHTML = '';
    return;
  }
  
  var hoodCount = state.vehicles.filter(function(v){ return v.mode === 'hood'; }).length;
  var backCount = state.vehicles.filter(function(v){ return v.mode === 'back_panel'; }).length;
  var totalPhotos = state.vehicles.reduce(function(sum,v){ return sum + v.photos.length; }, 0);
  
  $('statsRow').innerHTML = 
    '<div class="stat-tile"><div class="num">' + state.vehicles.length + '</div><div class="label">Total Vehicles</div></div>' +
    '<div class="stat-tile"><div class="num">' + hoodCount + '</div><div class="label">Hood</div></div>' +
    '<div class="stat-tile"><div class="num">' + backCount + '</div><div class="label">Back Panel</div></div>' +
    '<div class="stat-tile"><div class="num">' + totalPhotos + '</div><div class="label">Total Photos</div></div>';
  
  $('previewGrid').innerHTML = state.vehicles.slice(0, 24).map(function(v){
    var miniPhotos = v.photos.slice(0,4).map(function(p){
      return '<img src="' + escHtml(p.public_url) + '" loading="lazy" />';
    }).join('');
    var date = v.captured ? new Date(v.captured).toLocaleDateString('en-IN') : '';
    return '<div class="vehicle-preview">' +
      '<div class="plate">' + escHtml(v.plate || '— No Plate —') + '</div>' +
      '<div class="meta">' + date + ' · ' + escHtml(v.city || '—') + ' · ' + v.photos.length + ' photos · ' + (v.mode === 'hood' ? '🛺 Hood' : '📋 Back') + '</div>' +
      '<div class="photos-mini">' + miniPhotos + '</div>' +
    '</div>';
  }).join('');
  
  if (state.vehicles.length > 24){
    $('previewGrid').innerHTML += '<div class="empty">+ ' + (state.vehicles.length - 24) + ' more vehicles (all will be in PPT)</div>';
  }
}

function imageToDataUrl(url){
  return fetch(url).then(function(r){ return r.blob(); }).then(function(blob){
    return new Promise(function(resolve, reject){
      var reader = new FileReader();
      reader.onloadend = function(){ resolve(reader.result); };
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  });
}

async function generatePPT(){
  if (state.vehicles.length === 0) return toast('Pehle vehicles load karo', 'error');
  
  var client = $('clientName').value.trim() || 'Client';
  var city = $('cityName').value.trim() || '';
  
  $('generateBtn').disabled = true;
  $('generateBtn').innerHTML = '<div class="spinner" style="border-color:rgba(255,255,255,0.3);border-top-color:#fff;"></div> Generating...';
  
  try {
    var pptx = new PptxGenJS();
    pptx.layout = 'LAYOUT_WIDE';
    pptx.title = client + ' - Vehicle Branding Verification';
    pptx.author = 'Prajapati Advertising';
    
    // ━━━ COVER SLIDE ━━━
    var cover = pptx.addSlide();
    cover.background = { color: '0F1C5E' };
    cover.addText('PRAJAPATI ADVERTISING', { x: 0.5, y: 1.5, w: 12.3, h: 0.6, fontSize: 28, color: 'F5B800', bold: true, align: 'center', fontFace: 'Arial' });
    cover.addText('Vehicle Branding Verification', { x: 0.5, y: 2.4, w: 12.3, h: 0.6, fontSize: 22, color: 'FFFFFF', align: 'center', fontFace: 'Arial' });
    cover.addText(client, { x: 0.5, y: 3.3, w: 12.3, h: 0.8, fontSize: 36, color: 'FFFFFF', bold: true, align: 'center', fontFace: 'Arial' });
    if (city) cover.addText(city, { x: 0.5, y: 4.2, w: 12.3, h: 0.5, fontSize: 20, color: 'CCCCCC', align: 'center' });
    cover.addText('Total Vehicles: ' + state.vehicles.length, { x: 0.5, y: 5.5, w: 12.3, h: 0.5, fontSize: 16, color: 'F5B800', align: 'center', bold: true });
    cover.addText('Generated: ' + new Date().toLocaleDateString('en-IN'), { x: 0.5, y: 6.5, w: 12.3, h: 0.4, fontSize: 12, color: 'AAAAAA', align: 'center' });
    
    // ━━━ VEHICLE SLIDES ━━━
    for (var i = 0; i < state.vehicles.length; i++){
      var v = state.vehicles[i];
      $('generateBtn').innerHTML = '<div class="spinner" style="border-color:rgba(255,255,255,0.3);border-top-color:#fff;"></div> Slide ' + (i+1) + '/' + state.vehicles.length;
      
      var slide = pptx.addSlide();
      slide.background = { color: 'FFFFFF' };
      
      // Header bar
      slide.addShape('rect', { x: 0, y: 0, w: 13.33, h: 0.8, fill: { color: '0F1C5E' } });
      slide.addText(client, { x: 0.3, y: 0.1, w: 8, h: 0.6, fontSize: 18, color: 'FFFFFF', bold: true, align: 'left' });
      slide.addText('Vehicle ' + (i+1) + ' of ' + state.vehicles.length, { x: 9, y: 0.1, w: 4, h: 0.6, fontSize: 14, color: 'F5B800', align: 'right', bold: true });
      
      // Vehicle info bar
      slide.addText('🚗 ' + (v.plate || '— No Plate —'), { x: 0.3, y: 1.0, w: 6, h: 0.5, fontSize: 22, bold: true, color: '0F1C5E' });
      slide.addText('📅 ' + new Date(v.captured).toLocaleDateString('en-IN') + '  ·  📍 ' + (v.city || '—'), { x: 6.5, y: 1.05, w: 6.5, h: 0.4, fontSize: 12, color: '666666', align: 'right' });
      
      // Photos grid - up to 4 photos
      var photosToShow = v.photos.slice(0, 4);
      var positions = [
        { x: 0.3, y: 1.7, w: 6.3, h: 2.9 },
        { x: 6.85, y: 1.7, w: 6.3, h: 2.9 },
        { x: 0.3, y: 4.75, w: 6.3, h: 2.9 },
        { x: 6.85, y: 4.75, w: 6.3, h: 2.9 }
      ];
      
      for (var j = 0; j < photosToShow.length; j++){
        var p = photosToShow[j];
        var pos = positions[j];
        try {
          var dataUrl = await imageToDataUrl(p.public_url);
          slide.addImage({ data: dataUrl, x: pos.x, y: pos.y, w: pos.w, h: pos.h });
        } catch(err){
          slide.addShape('rect', { x: pos.x, y: pos.y, w: pos.w, h: pos.h, fill: { color: 'F0F0F0' } });
          slide.addText('Image load failed', { x: pos.x, y: pos.y + 1.2, w: pos.w, h: 0.5, align: 'center', color: '999999' });
        }
      }
    }
    
    // ━━━ SAVE ━━━
    var filename = client.replace(/[^a-zA-Z0-9]/g, '_') + '_' + city.replace(/[^a-zA-Z0-9]/g, '_') + '_' + new Date().toISOString().slice(0,10) + '.pptx';
    pptx.writeFile({ fileName: filename });
    
    toast('✅ PPT generated! ' + state.vehicles.length + ' vehicles', 'success');
    $('generateBtn').innerHTML = '✅ Downloaded!';
    setTimeout(function(){
      $('generateBtn').disabled = false;
      $('generateBtn').innerHTML = '📥 Generate & Download PPT';
    }, 3000);
    
  } catch(err){
    console.error(err);
    toast('Generate failed: ' + err.message, 'error');
    $('generateBtn').disabled = false;
    $('generateBtn').innerHTML = '📥 Generate & Download PPT';
  }
}

document.addEventListener('DOMContentLoaded', function(){
  var today = new Date().toISOString().split('T')[0];
  $('dateFrom').value = today;
  $('dateTo').value = today;
  loadCampaigns();
});
</script>
</body>
</html>
