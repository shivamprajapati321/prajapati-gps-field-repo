<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Archive · Prajapati Advertising</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:opsz,wght,ital@9..144,300..900,0..1&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{
  --navy:#0B1957;--gold:#B89B4E;--gold-deep:#8B7430;--gold-soft:#F4E4B0;--gold-pale:#FBF6E4;
  --cream:#FAF8F3;--paper:#F7F4EC;--rule:#E5E0D2;
  --ink-950:#0F172A;--ink-500:#64748B;--text-dim:#94A3B8;
  --success:#047857;--success-bg:#D1FAE5;
  --warn:#C2410C;--warn-bg:#FED7AA;
  --danger:#BE123C;--danger-bg:#FECACA;
  --info:#1E40AF;--info-bg:#DBEAFE;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--cream);color:var(--ink-950);font-size:14px;line-height:1.55;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none}
input,select{font-family:inherit;outline:none}

.topbar{background:var(--navy);color:#fff;padding:14px 32px;border-bottom:3px solid var(--gold);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.tb-brand{display:flex;align-items:center;gap:12px}
.tb-logo{width:36px;height:36px;background:var(--gold);color:var(--navy);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.tb-name{font-size:14px;font-weight:700}
.tb-tag{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--gold-soft);letter-spacing:0.16em;text-transform:uppercase;margin-top:2px}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;border:none;transition:all 0.15s}
.btn-secondary{background:#fff;color:var(--navy);border:1px solid var(--rule)}
.btn-secondary:hover{background:var(--paper)}
.btn-warn{background:var(--warn);color:#fff}
.btn-info{background:var(--info);color:#fff}
.btn.sm{padding:6px 10px;font-size:10.5px}

.main{max-width:1320px;margin:0 auto;padding:28px}

.page-head{margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--rule)}
.page-title{font-family:'Fraunces',serif;font-size:30px;font-weight:500;color:var(--navy);letter-spacing:-0.02em}
.page-title em{color:var(--gold);font-style:italic}
.page-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:0.14em;text-transform:uppercase;margin-top:6px}

.filter-bar{background:#fff;border:1px solid var(--rule);border-radius:12px;padding:18px;margin-bottom:20px;display:grid;grid-template-columns:1fr 180px 180px 180px auto;gap:12px;align-items:center}
.filter-bar input,.filter-bar select{padding:10px 14px;border:1px solid var(--rule);background:var(--cream);font-size:13px;border-radius:8px}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--gold);background:#fff}
.filter-bar label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--gold-deep);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:4px;display:block}
.filter-field{display:flex;flex-direction:column}

.stats-bar{display:grid;grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));gap:14px;margin-bottom:20px}
.stat{background:#fff;border:1px solid var(--rule);border-radius:10px;padding:16px;text-align:left}
.stat-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--gold-deep);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:8px}
.stat-value{font-family:'Fraunces',serif;font-size:28px;font-weight:600;color:var(--navy);line-height:1;letter-spacing:-0.02em}
.stat-meta{font-size:11.5px;color:var(--text-dim);margin-top:6px}

.archive-table-wrap{background:#fff;border:1px solid var(--rule);border-radius:12px;overflow:hidden}
.archive-table{width:100%;border-collapse:collapse}
.archive-table th{background:var(--paper);color:var(--navy);padding:12px 14px;font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;text-align:left;border-bottom:2px solid var(--rule)}
.archive-table td{padding:14px;border-bottom:1px solid var(--rule);vertical-align:middle;font-size:13px}
.archive-table tr:last-child td{border-bottom:none}
.archive-table tr:hover td{background:var(--cream)}

.cname{font-weight:600;color:var(--navy);font-size:13.5px;margin-bottom:2px}
.cmeta{font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace}
.num{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--navy);text-align:right}

.status-pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase}
.status-pill.archived{background:#E5E7EB;color:#374151}
.status-pill.completed{background:var(--success-bg);color:var(--success)}
.status-pill.delivered{background:var(--info-bg);color:var(--info)}

.callout{display:flex;align-items:flex-start;gap:12px;padding:14px 18px;border-radius:10px;margin-bottom:18px;font-size:13px}
.callout.info{background:var(--info-bg);color:var(--info)}
.callout.error{background:var(--danger-bg);color:var(--danger)}

.empty{text-align:center;padding:60px 20px;color:var(--text-dim);font-style:italic}

.modal-bg{position:fixed;inset:0;background:rgba(11,25,87,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(4px)}
.modal{background:#fff;border-radius:12px;max-width:480px;width:100%;border:1px solid var(--gold);box-shadow:0 30px 60px rgba(0,0,0,0.3)}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between;background:var(--paper)}
.modal-title{font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:var(--navy)}
.modal-close{width:30px;height:30px;border-radius:50%;background:#fff;color:var(--danger);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.modal-body{padding:20px 22px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--rule);display:flex;justify-content:flex-end;gap:8px;background:var(--paper)}
.field{margin-bottom:14px}
.label{font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:700;color:var(--navy);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px;display:block}
.textarea{width:100%;padding:10px 12px;border:1px solid var(--rule);background:var(--cream);font-family:inherit;font-size:13px;border-radius:6px;min-height:80px;resize:vertical}

.spin{width:13px;height:13px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:-2px}
@keyframes spin{to{transform:rotate(360deg)}}

@media (max-width:768px){
  .main{padding:16px}
  .topbar{padding:12px 16px}
  .filter-bar{grid-template-columns:1fr;gap:10px}
  .archive-table{font-size:11px}
  .archive-table th,.archive-table td{padding:8px}
  .stat-value{font-size:22px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-brand">
    <div class="tb-logo">📦</div>
    <div>
      <div class="tb-name">Campaign Archive</div>
      <div class="tb-tag">Historical · Searchable · Reopenable</div>
    </div>
  </div>
  <div style="display:flex;gap:8px">
    <a href="/hub.html" class="btn btn-secondary">← Hub</a>
    <a href="/dashboard.html" class="btn btn-secondary">Dashboard</a>
  </div>
</div>

<div class="main">
  
  <div class="page-head">
    <div class="page-title">Campaign <em>Archive</em></div>
    <div class="page-sub" id="todayDate">…</div>
  </div>
  
  <div id="alertsArea"></div>
  
  <div class="stats-bar" id="statsBar"></div>
  
  <div class="filter-bar">
    <div class="filter-field">
      <label>Search</label>
      <input type="text" id="filterSearch" placeholder="Campaign name, client name…" oninput="renderList()">
    </div>
    <div class="filter-field">
      <label>Status</label>
      <select id="filterStatus" onchange="renderList()">
        <option value="all">All</option>
        <option value="archived">Archived</option>
        <option value="completed">Completed</option>
        <option value="delivered">Delivered</option>
      </select>
    </div>
    <div class="filter-field">
      <label>Date From</label>
      <input type="date" id="filterFrom" onchange="renderList()">
    </div>
    <div class="filter-field">
      <label>Date To</label>
      <input type="date" id="filterTo" onchange="renderList()">
    </div>
    <div class="filter-field" style="justify-content:flex-end">
      <label>&nbsp;</label>
      <button class="btn btn-secondary" onclick="clearFilters()">Clear</button>
    </div>
  </div>
  
  <div id="listArea">
    <div class="empty">Loading archive…</div>
  </div>
  
</div>

<!-- REOPEN MODAL -->
<div class="modal-bg" id="reopenModal" style="display:none">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">↩️ Reopen Campaign</div>
      <button class="modal-close" onclick="closeReopenModal()">×</button>
    </div>
    <div class="modal-body">
      <div id="reopenCampaignInfo" style="margin-bottom:14px"></div>
      <div class="field">
        <label class="label">Reason for Reopening <span style="color:var(--danger)">*</span></label>
        <textarea class="textarea" id="reopenReason" placeholder="e.g., Client requested additional units, found error in delivery..."></textarea>
      </div>
      <div class="callout info" style="margin-bottom:0;font-size:12px">
        <span>ℹ️</span>
        <div>Campaign will move back to "in_production" status. Operators will see it again. Audit log preserves this action.</div>
      </div>
      <div id="reopenStatus" style="margin-top:10px"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeReopenModal()">Cancel</button>
      <button class="btn btn-warn" id="reopenSaveBtn" onclick="confirmReopen()">↩️ Reopen Campaign</button>
    </div>
  </div>
</div>

<script src="/lib/access-guard.js"></script>
<script>
const SUPABASE_URL = 'https://fpbktcgtspqsqpaytslv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_JhObe56x_zETygpy6y8-DQ_qpQXIz_j';

const HEADERS = {
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Content-Type': 'application/json'
};

const state = {
  user: null,
  campaigns: [],
  currentReopen: null
};

async function api(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + path, { ...opts, headers: { ...HEADERS, ...(opts.headers || {}) } });
  if (!res.ok) throw new Error('API ' + res.status + ': ' + await res.text());
  if (res.status === 204) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function checkAccess() {
  const phone = localStorage.getItem('prajapati_admin_phone');
  if (!phone) { location.href = '/hub.html'; return null; }
  
  const members = await api('/rest/v1/trial_team_members?phone=eq.' + phone + '&active=eq.true&select=*');
  if (!members || !members.length) { location.href = '/hub.html'; return null; }
  
  const m = members[0];
  const role = (m.role || '').toLowerCase();
  const allowed = ['owner', 'admin', 'operations_manager', 'ops_manager', 'operations', 'sales'];
  if (!allowed.includes(role)) {
    document.getElementById('listArea').innerHTML = '<div class="callout error"><span>🔒</span><div>Access restricted. Your role: ' + role + '</div></div>';
    return null;
  }
  
  if (window.AccessGuard) AccessGuard.filterUI(m);
  return m;
}

async function loadData() {
  state.user = await checkAccess();
  if (!state.user) return;
  
  document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-IN', {
    weekday: 'long', day: '2-digit', month: 'long', year: 'numeric', timeZone: 'Asia/Kolkata'
  });
  
  try {
    const campaigns = await api('/rest/v1/v_archived_campaigns?select=*&limit=500');
    state.campaigns = campaigns || [];
    
    renderStats();
    renderList();
  } catch (e) {
    document.getElementById('listArea').innerHTML = `
      <div class="callout error">
        <span>❌</span>
        <div><strong>Load failed:</strong> ${escapeHtml(e.message)}<br>
        <small>Make sure SESSION_4 SQL has been applied.</small></div>
      </div>
    `;
  }
}

function renderStats() {
  const campaigns = state.campaigns;
  const archived = campaigns.filter(c => c.status === 'archived').length;
  const completed = campaigns.filter(c => c.status === 'completed').length;
  const delivered = campaigns.filter(c => c.status === 'delivered').length;
  
  const totalUnits = campaigns.reduce((sum, c) => sum + (Number(c.total_units_delivered) || 0), 0);
  
  document.getElementById('statsBar').innerHTML = `
    <div class="stat">
      <div class="stat-label">Total Archived</div>
      <div class="stat-value">${campaigns.length}</div>
      <div class="stat-meta">all historical campaigns</div>
    </div>
    <div class="stat">
      <div class="stat-label">Archived</div>
      <div class="stat-value">${archived}</div>
      <div class="stat-meta">> 30 days old</div>
    </div>
    <div class="stat">
      <div class="stat-label">Recently Done</div>
      <div class="stat-value">${completed + delivered}</div>
      <div class="stat-meta">${delivered} delivered · ${completed} completed</div>
    </div>
    <div class="stat">
      <div class="stat-label">Total Units</div>
      <div class="stat-value">${totalUnits.toLocaleString('en-IN')}</div>
      <div class="stat-meta">across all campaigns</div>
    </div>
  `;
}

function renderList() {
  const search = (document.getElementById('filterSearch').value || '').toLowerCase();
  const status = document.getElementById('filterStatus').value;
  const from = document.getElementById('filterFrom').value;
  const to = document.getElementById('filterTo').value;
  
  let list = state.campaigns;
  
  if (search) list = list.filter(c => 
    (c.campaign_name || c.name || '').toLowerCase().includes(search) ||
    (c.client_name || '').toLowerCase().includes(search)
  );
  
  if (status !== 'all') list = list.filter(c => c.status === status);
  
  if (from) {
    const fromDate = new Date(from);
    list = list.filter(c => {
      const d = new Date(c.archived_at || c.completed_at || c.delivered_at || c.updated_at);
      return d >= fromDate;
    });
  }
  
  if (to) {
    const toDate = new Date(to + 'T23:59:59');
    list = list.filter(c => {
      const d = new Date(c.archived_at || c.completed_at || c.delivered_at || c.updated_at);
      return d <= toDate;
    });
  }
  
  if (!list.length) {
    document.getElementById('listArea').innerHTML = '<div class="empty" style="background:#fff;border-radius:12px;border:1px solid var(--rule);padding:60px 20px">No campaigns match current filter.</div>';
    return;
  }
  
  document.getElementById('listArea').innerHTML = `
    <div class="archive-table-wrap">
      <table class="archive-table">
        <thead>
          <tr>
            <th>Campaign</th>
            <th>Status</th>
            <th>Units</th>
            <th>Team</th>
            <th>Completed</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${list.map(c => {
            const completedDate = c.archived_at || c.completed_at || c.delivered_at;
            const dateStr = completedDate 
              ? new Date(completedDate).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric', timeZone:'Asia/Kolkata' }) 
              : '—';
            const daysAgo = c.days_since_archive != null 
              ? (c.days_since_archive === 0 ? 'today' : (c.days_since_archive === 1 ? 'yesterday' : c.days_since_archive + 'd ago')) 
              : '';
            
            return `
              <tr>
                <td>
                  <div class="cname">${escapeHtml(c.campaign_name || c.name || 'Unnamed')}</div>
                  <div class="cmeta">${escapeHtml(c.client_name || 'No client')}</div>
                </td>
                <td><span class="status-pill ${c.status}">${escapeHtml(c.status || '—')}</span></td>
                <td class="num">${(Number(c.total_units_delivered) || 0).toLocaleString('en-IN')}</td>
                <td class="num">${c.unique_operators_involved || 0}</td>
                <td>
                  <div style="font-size:12.5px">${dateStr}</div>
                  <div class="cmeta">${daysAgo}</div>
                </td>
                <td>
                  <button class="btn btn-warn sm" onclick="openReopenModal('${c.id}')">↩️ Reopen</button>
                </td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function clearFilters() {
  document.getElementById('filterSearch').value = '';
  document.getElementById('filterStatus').value = 'all';
  document.getElementById('filterFrom').value = '';
  document.getElementById('filterTo').value = '';
  renderList();
}

// ═══════════════════════════════════════════════════════════════
// REOPEN
// ═══════════════════════════════════════════════════════════════

function openReopenModal(campaignId) {
  const c = state.campaigns.find(x => x.id === campaignId);
  if (!c) return;
  state.currentReopen = c;
  
  document.getElementById('reopenCampaignInfo').innerHTML = `
    <div style="padding:12px;background:var(--paper);border-radius:8px;border:1px solid var(--rule)">
      <div style="font-weight:600;color:var(--navy);margin-bottom:4px">${escapeHtml(c.campaign_name || c.name)}</div>
      <div style="font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace">${escapeHtml(c.client_name || '—')} · Status: ${escapeHtml(c.status)}</div>
    </div>
  `;
  
  document.getElementById('reopenReason').value = '';
  document.getElementById('reopenStatus').innerHTML = '';
  document.getElementById('reopenModal').style.display = 'flex';
}

function closeReopenModal() {
  document.getElementById('reopenModal').style.display = 'none';
  state.currentReopen = null;
}

async function confirmReopen() {
  const c = state.currentReopen;
  if (!c) return;
  
  const reason = document.getElementById('reopenReason').value.trim();
  if (!reason) {
    document.getElementById('reopenStatus').innerHTML = '<div class="callout error" style="margin:0;padding:10px;font-size:12px"><span>⚠️</span><div>Reason required</div></div>';
    return;
  }
  
  const btn = document.getElementById('reopenSaveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Reopening…';
  
  try {
    await api(`/rest/v1/trial_campaigns?id=eq.${c.id}`, {
      method: 'PATCH',
      headers: { 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        status: 'in_production',
        archived_at: null,
        auto_archived: false,
        reopened_at: new Date().toISOString(),
        reopened_by: state.user.id,
        reopen_reason: reason,
        updated_at: new Date().toISOString()
      })
    });
    
    document.getElementById('reopenStatus').innerHTML = '<div class="callout info" style="margin:0;padding:10px;font-size:12px;background:var(--success-bg);color:var(--success)"><span>✅</span><div>Campaign reopened successfully!</div></div>';
    
    setTimeout(() => {
      closeReopenModal();
      loadData();
    }, 1200);
  } catch (e) {
    document.getElementById('reopenStatus').innerHTML = `<div class="callout error" style="margin:0;padding:10px;font-size:12px"><span>❌</span><div>${escapeHtml(e.message)}</div></div>`;
    btn.disabled = false;
    btn.innerHTML = '↩️ Reopen Campaign';
  }
}

document.addEventListener('DOMContentLoaded', loadData);
</script>

</body>
</html>
