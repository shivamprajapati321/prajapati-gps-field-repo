<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reassignment History · Prajapati Advertising</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:opsz,wght,ital@9..144,300..900,0..1&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{
  --navy:#0B1957;--gold:#B89B4E;--gold-soft:#F4E4B0;--gold-deep:#8B7430;
  --cream:#FAF8F3;--paper:#F7F4EC;--rule:#E5E0D2;
  --ink-950:#0F172A;--text-dim:#94A3B8;
  --info:#1E40AF;--info-bg:#DBEAFE;
  --success:#047857;--success-bg:#D1FAE5;
  --danger:#BE123C;--danger-bg:#FECACA;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--cream);color:var(--ink-950);font-size:14px;line-height:1.5;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none}

.topbar{background:var(--navy);color:#fff;padding:14px 32px;border-bottom:3px solid var(--gold);display:flex;align-items:center;justify-content:space-between}
.tb-brand{display:flex;align-items:center;gap:12px}
.tb-logo{width:36px;height:36px;background:var(--gold);color:var(--navy);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px}
.tb-name{font-size:14px;font-weight:700}
.tb-tag{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--gold-soft);letter-spacing:0.16em;text-transform:uppercase;margin-top:2px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer}
.btn-secondary{background:#fff;color:var(--navy);border:1px solid var(--rule)}

.main{padding:28px;max-width:1280px;margin:0 auto}
.page-head{margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--rule)}
.page-title{font-family:'Fraunces',serif;font-size:26px;font-weight:500;color:var(--navy)}
.page-title em{color:var(--gold);font-style:italic}
.page-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:0.12em;text-transform:uppercase;margin-top:4px}

.section{background:#fff;border:1px solid var(--rule);border-radius:10px;margin-bottom:18px;overflow:hidden}
.section-head{padding:14px 20px;border-bottom:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between;background:var(--paper)}
.section-title{font-family:'Fraunces',serif;font-size:15px;font-weight:600;color:var(--navy)}
.section-meta{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--gold-deep);letter-spacing:0.14em;text-transform:uppercase}

.history-table{width:100%;border-collapse:collapse;font-size:13px}
.history-table th{background:var(--paper);color:var(--navy);padding:12px;font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;text-align:left;border-bottom:2px solid var(--rule)}
.history-table td{padding:12px;border-bottom:1px solid var(--rule);vertical-align:top}
.history-table tr:hover td{background:var(--cream)}

.arrow{display:inline-block;color:var(--gold-deep);font-weight:700;margin:0 6px}
.operator-cell{font-weight:600}
.operator-cell.from{color:var(--danger)}
.operator-cell.to{color:var(--success)}
.reason-cell{font-style:italic;color:var(--text-dim);max-width:300px}
.date-cell{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim)}

.empty{text-align:center;padding:60px 20px;color:var(--text-dim);font-style:italic}
.callout{display:flex;align-items:flex-start;gap:10px;padding:14px 18px;border-radius:8px;margin-bottom:18px;font-size:13px}
.callout.info{background:var(--info-bg);color:var(--info)}
.callout.error{background:var(--danger-bg);color:var(--danger)}

.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;background:var(--gold-soft);color:var(--gold-deep)}

.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:var(--navy);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

@media (max-width:768px){
  .main{padding:18px}
  .topbar{padding:12px 16px}
  .history-table{font-size:11px}
  .history-table th,.history-table td{padding:8px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-brand">
    <div class="tb-logo">🔄</div>
    <div>
      <div class="tb-name">Reassignment History</div>
      <div class="tb-tag">Manager Audit Log</div>
    </div>
  </div>
  <div style="display:flex;gap:8px">
    <a href="/dashboard.html" class="btn btn-secondary">← Dashboard</a>
    <a href="/printing-v2.html" class="btn btn-secondary">🖨️ Printing</a>
    <a href="/stitching-v2.html" class="btn btn-secondary">🧵 Stitching</a>
  </div>
</div>

<div class="main">
  <div class="page-head">
    <div class="page-title">Reassignment <em>Audit Trail</em></div>
    <div class="page-sub" id="todayDate">…</div>
  </div>
  
  <div id="contentArea">
    <div class="empty">Loading…</div>
  </div>
</div>

<script src="/lib/access-guard.js"></script>
<script>
const SUPABASE_URL = 'https://fpbktcgtspqsqpaytslv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_JhObe56x_zETygpy6y8-DQ_qpQXIz_j';

const HEADERS = {
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Content-Type': 'application/json'
};

async function api(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + path, { ...opts, headers: { ...HEADERS, ...(opts.headers || {}) } });
  if (!res.ok) throw new Error('API error: ' + res.status);
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function checkAccess() {
  // Manager-only page
  const phone = localStorage.getItem('prajapati_admin_phone');
  if (!phone) {
    location.href = '/login.html';
    return null;
  }
  try {
    const members = await api('/rest/v1/trial_team_members?phone=eq.' + phone + '&active=eq.true&select=*');
    if (!members || !members.length) {
      location.href = '/login.html';
      return null;
    }
    const m = members[0];
    const role = (m.role || '').toLowerCase();
    const allowed = ['owner', 'admin', 'operations_manager', 'ops_manager', 'operations'];
    if (!allowed.includes(role)) {
      document.getElementById('contentArea').innerHTML = '<div class="callout error"><span>🔒</span><div>This page is for managers only. Your role: ' + role + '</div></div>';
      return null;
    }
    if (window.AccessGuard) AccessGuard.filterUI(m);
    return m;
  } catch (e) {
    document.getElementById('contentArea').innerHTML = '<div class="callout error"><span>❌</span><div>' + escapeHtml(e.message) + '</div></div>';
    return null;
  }
}

async function loadHistory() {
  const user = await checkAccess();
  if (!user) return;
  
  document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-IN', {
    weekday: 'long', day: '2-digit', month: 'long', year: 'numeric', timeZone: 'Asia/Kolkata'
  });
  
  try {
    const history = await api('/rest/v1/v_assignment_reassignment_history?select=*&limit=200');
    
    if (!history || !history.length) {
      document.getElementById('contentArea').innerHTML = `
        <div class="callout info">
          <span>ℹ️</span>
          <div>No reassignments yet. When managers move jobs between operators, the audit trail will appear here.</div>
        </div>
      `;
      return;
    }
    
    document.getElementById('contentArea').innerHTML = `
      <div class="section">
        <div class="section-head">
          <div class="section-title">All <em>Reassignments</em></div>
          <div class="section-meta">${history.length} entries</div>
        </div>
        <div style="overflow-x:auto">
          <table class="history-table">
            <thead>
              <tr>
                <th>When</th>
                <th>From → To</th>
                <th>By</th>
                <th>Progress at Transfer</th>
                <th>Reason</th>
              </tr>
            </thead>
            <tbody>
              ${history.map(r => {
                const date = new Date(r.reassigned_at);
                const dateStr = date.toLocaleString('en-IN', { 
                  day:'2-digit', month:'short', year:'numeric', 
                  hour:'2-digit', minute:'2-digit',
                  timeZone:'Asia/Kolkata'
                });
                const pct = r.qty_assigned_at_reassignment > 0 
                  ? Math.round((r.qty_done_at_reassignment / r.qty_assigned_at_reassignment) * 100) 
                  : 0;
                return `
                  <tr>
                    <td class="date-cell">${dateStr}</td>
                    <td>
                      <span class="operator-cell from">${escapeHtml(r.from_operator_name || '⚠️ Unassigned')}</span>
                      <span class="arrow">→</span>
                      <span class="operator-cell to">${escapeHtml(r.to_operator_name || '—')}</span>
                    </td>
                    <td>
                      <strong>${escapeHtml(r.reassigned_by_name || 'Unknown')}</strong>
                      <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em">${escapeHtml(r.reassigned_by_role || '')}</div>
                    </td>
                    <td>
                      <span class="tag">${r.qty_done_at_reassignment || 0} / ${r.qty_assigned_at_reassignment || 0} (${pct}%)</span>
                    </td>
                    <td class="reason-cell">${escapeHtml(r.reason || '—')}</td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  } catch (e) {
    document.getElementById('contentArea').innerHTML = '<div class="callout error"><span>❌</span><div>Load failed: ' + escapeHtml(e.message) + '</div></div>';
  }
}

document.addEventListener('DOMContentLoaded', loadHistory);
</script>

</body>
</html>
