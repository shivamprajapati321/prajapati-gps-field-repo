<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
<title>Prajapati GPS - Verifier v13</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--p:#0f1c5e;--p2:#0073e6;--ok:#10b981;--warn:#f59e0b;--err:#ef4444;--bg:#f5f7fb;--card:#fff;--txt:#1a1a2e;--muted:#6b7280;--border:#e5e7eb}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:14px}
.hdr{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.hdr h1{font-size:18px;font-weight:700}
.user-badge{background:rgba(255,255,255,0.15);padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-right:10px}
.btn-logout{background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600}
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,var(--p),var(--p2))}
.login-card{background:#fff;border-radius:16px;padding:32px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.login-card h2{color:var(--p);margin-bottom:8px;font-size:24px}
.login-card .subtitle{color:var(--muted);margin-bottom:24px;font-size:13px}
.login-card input{width:100%;padding:12px;border:2px solid var(--border);border-radius:8px;font-size:15px;margin-bottom:16px;font-family:inherit}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer}
.container{padding:16px 20px;max-width:1400px;margin:0 auto}
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px}
.stat-card{background:var(--card);border-radius:10px;padding:14px;border:1px solid var(--border);position:relative;overflow:hidden}
.stat-card::before{content:"";position:absolute;top:0;left:0;width:4px;height:100%}
.stat-card.pending::before{background:var(--err)}
.stat-card.verified::before{background:var(--ok)}
.stat-card.total::before{background:var(--p2)}
.stat-card.rejected::before{background:#6b7280}
.stat-label{font-size:11px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;font-weight:600}
.stat-value{font-size:24px;font-weight:700;color:var(--p)}
.stat-trend{font-size:11px;color:var(--muted);margin-top:4px}
.filters{background:var(--card);border-radius:10px;padding:14px;margin-bottom:16px;border:1px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;align-items:end}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-group label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase}
.filter-group input,.filter-group select{padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:#fff;min-width:130px}
.filter-btn{padding:7px 14px;background:var(--p2);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
.filter-btn.reset{background:#f3f4f6;color:var(--txt);border:1px solid var(--border)}
.status-tabs{display:flex;gap:4px;margin-bottom:14px;background:var(--card);padding:4px;border-radius:10px;border:1px solid var(--border)}
.tab-btn{flex:1;padding:10px;border:none;background:transparent;font-size:13px;font-weight:600;cursor:pointer;border-radius:7px;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:6px}
.tab-btn.active{background:var(--p);color:#fff}
.tab-count{background:rgba(255,255,255,0.2);padding:1px 7px;border-radius:10px;font-size:11px;font-weight:700}
.tab-btn:not(.active) .tab-count{background:var(--border)}
.vehicle-list{display:flex;flex-direction:column;gap:14px}
.vehicle-card{background:var(--card);border-radius:12px;padding:16px;border:2px solid var(--border)}
.vehicle-card.pending{border-color:#fecaca;background:#fef9f9}
.vehicle-card.verified{border-color:#bbf7d0;background:#f0fdf4}
.vehicle-card.rejected{opacity:0.7;background:#fafafa}
.vc-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:12px;flex-wrap:wrap;gap:10px}
.vc-status{padding:4px 10px;border-radius:99px;font-size:10px;font-weight:700;text-transform:uppercase}
.vc-status.pending{background:var(--err);color:#fff}
.vc-status.verified{background:var(--ok);color:#fff}
.vc-status.rejected{background:#6b7280;color:#fff}
.vc-meta{font-size:11px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap}
.vc-meta b{color:var(--txt)}
.vc-photos{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.vc-photo{position:relative;aspect-ratio:4/3;background:#f0f0f0;border-radius:8px;overflow:hidden;border:1px solid var(--border);cursor:pointer}
.vc-photo img{width:100%;height:100%;object-fit:cover}
.vc-photo-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.7);color:#fff;padding:4px 8px;font-size:11px;font-weight:600;text-transform:uppercase}
.vc-photo-ocr{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.7);color:#fff;padding:2px 6px;font-size:10px;font-family:monospace;border-radius:4px}
.vc-photo-mode{position:absolute;top:4px;left:4px;background:rgba(15,28,94,0.9);color:#fff;padding:2px 6px;font-size:9px;border-radius:4px;font-weight:700}
.vc-ocr-row{background:#fef3c7;border:1px solid #fcd34d;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px}
.suggestion-chip{background:#fff;border:1px solid #fcd34d;padding:3px 9px;border-radius:99px;font-family:monospace;font-size:11px;font-weight:700;cursor:pointer;margin-right:6px;display:inline-block}
.vc-form{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end}
@media(max-width:600px){.vc-form{grid-template-columns:1fr}}
.vc-input-row{display:flex;flex-direction:column;gap:4px}
.vc-input-row label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase}
.vc-input{padding:10px 14px;border:2px solid var(--border);border-radius:8px;font-size:16px;font-weight:700;font-family:monospace;text-transform:uppercase}
.vc-actions{display:flex;gap:8px}
.btn-verify{background:var(--ok);color:#fff;border:none;padding:11px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.btn-verify:disabled{opacity:0.5;cursor:not-allowed}
.btn-reject{background:#fff;color:var(--err);border:1px solid var(--err);padding:11px 14px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.vc-verified-info{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 14px;font-size:13px;display:flex;flex-wrap:wrap;gap:14px;align-items:center}
.vc-verified-info .field-label{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:600}
.vc-verified-info .field-value{font-weight:700}
.vc-verified-info .plate{font-family:monospace;font-size:16px;color:var(--p)}
.photo-count-badge{display:inline-block;padding:3px 8px;border-radius:99px;font-size:10px;font-weight:700;margin-left:6px}
.photo-count-badge.complete{background:#dcfce7;color:#0d9968}
.photo-count-badge.partial{background:#fef3c7;color:#a06000}
.loading{text-align:center;padding:40px;color:var(--muted)}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--p2);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);background:var(--card);border-radius:12px;border:1px solid var(--border)}
.empty-state .emoji{font-size:48px;margin-bottom:12px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;z-index:1000;opacity:0;transition:0.2s}
.toast.show{opacity:1}
.toast.success{background:var(--ok)}
.toast.error{background:var(--err)}
.zoom-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:1000;align-items:center;justify-content:center;cursor:pointer}
.zoom-modal.show{display:flex}
.zoom-modal img{max-width:100%;max-height:100%;object-fit:contain}
.zoom-close{position:absolute;top:20px;right:20px;background:rgba(255,255,255,0.2);color:#fff;border:none;width:40px;height:40px;border-radius:50%;font-size:24px;cursor:pointer}
.version-tag{position:fixed;bottom:5px;right:10px;font-size:10px;color:#aaa;font-weight:700;background:#fff;padding:4px 10px;border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
</style>
</head>
<body>
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <h2>🔍 Verifier Portal v13</h2>
    <div class="subtitle">Hood + Back Panel grouping FIXED</div>
    <input type="text" id="loginPhone" placeholder="Phone (e.g. 9876543210)" maxlength="15" />
    <button class="login-btn" onclick="doLogin()">Login</button>
  </div>
</div>

<div id="mainApp" style="display:none;">
  <div class="hdr">
    <h1>🔍 Verifier Portal v13</h1>
    <div>
      <span class="user-badge" id="userBadge">—</span>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="container">
    <div class="stats-bar">
      <div class="stat-card pending"><div class="stat-label">⏳ Pending</div><div class="stat-value" id="statPending">—</div></div>
      <div class="stat-card verified"><div class="stat-label">✅ Verified Today</div><div class="stat-value" id="statVerified">—</div></div>
      <div class="stat-card total"><div class="stat-label">📊 Total Today</div><div class="stat-value" id="statTotal">—</div></div>
      <div class="stat-card rejected"><div class="stat-label">❌ Rejected</div><div class="stat-value" id="statRejected">—</div></div>
    </div>
    <div class="filters">
      <div class="filter-group"><label>Date</label><input type="date" id="filterDate" /></div>
      <div class="filter-group"><label>Campaign</label><select id="filterCampaign"><option value="">All</option></select></div>
      <div class="filter-group"><label>Team Member</label><select id="filterMember"><option value="">All</option></select></div>
      <button class="filter-btn" onclick="loadQueue()">🔍 Apply</button>
      <button class="filter-btn reset" onclick="resetFilters()">Reset</button>
    </div>
    <div class="status-tabs">
      <button class="tab-btn active" data-status="pending" onclick="switchTab('pending')">⏳ Pending <span class="tab-count" id="tabPending">0</span></button>
      <button class="tab-btn" data-status="verified" onclick="switchTab('verified')">✅ Verified <span class="tab-count" id="tabVerified">0</span></button>
      <button class="tab-btn" data-status="all" onclick="switchTab('all')">📋 All <span class="tab-count" id="tabAll">0</span></button>
    </div>
    <div id="vehicleList" class="vehicle-list">
      <div class="loading"><div class="spinner"></div><div style="margin-top:12px;">Loading...</div></div>
    </div>
  </div>
</div>

<div class="zoom-modal" id="zoomModal" onclick="closeZoom()">
  <button class="zoom-close" onclick="closeZoom()">×</button>
  <img id="zoomImg" alt="zoomed" />
</div>
<div class="toast" id="toast"></div>
<div class="version-tag">v13 ✅</div>
