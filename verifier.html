<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Prajapati GPS - Verifier Portal v13</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--p:#0f1c5e;--p2:#0073e6;--ok:#10b981;--warn:#f59e0b;--err:#ef4444;--bg:#f5f7fb;--card:#fff;--txt:#1a1a2e;--muted:#6b7280;--border:#e5e7eb}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:14px}
.hdr{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,0.1);position:sticky;top:0;z-index:100}
.hdr h1{font-size:18px;font-weight:700}
.user-badge{background:rgba(255,255,255,0.15);padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-right:10px}
.btn-logout{background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600}
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,var(--p),var(--p2))}
.login-card{background:#fff;border-radius:16px;padding:32px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.login-card h2{color:var(--p);margin-bottom:8px;font-size:24px}
.login-card .subtitle{color:var(--muted);margin-bottom:24px;font-size:13px}
.login-card input{width:100%;padding:12px;border:2px solid var(--border);border-radius:8px;font-size:15px;margin-bottom:16px;font-family:inherit}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer}
.container{padding:16px 20px;max-width:1400px;margin:0 auto}
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px}
.stat-card{background:var(--card);border-radius:10px;padding:14px;border:1px solid var(--border);position:relative;overflow:hidden}
.stat-card::before{content:"";position:absolute;top:0;left:0;width:4px;height:100%}
.stat-card.pending::before{background:var(--err)}
.stat-card.verified::before{background:var(--ok)}
.stat-card.total::before{background:var(--p2)}
.stat-card.rejected::before{background:#6b7280}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:4px;font-weight:600}
.stat-value{font-size:24px;font-weight:700;color:var(--p)}
.stat-trend{font-size:11px;color:var(--muted);margin-top:4px}
.filters{background:var(--card);border-radius:10px;padding:14px;margin-bottom:16px;border:1px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;align-items:end}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-group label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase}
.filter-group input,.filter-group select{padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;background:#fff;min-width:130px}
.filter-btn{padding:7px 14px;background:var(--p2);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
.filter-btn.reset{background:#f3f4f6;color:var(--txt);border:1px solid var(--border)}
.status-tabs{display:flex;gap:4px;margin-bottom:14px;background:var(--card);padding:4px;border-radius:10px;border:1px solid var(--border)}
.tab-btn{flex:1;padding:10px;border:none;background:transparent;font-size:13px;font-weight:600;cursor:pointer;border-radius:7px;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:6px}
.tab-btn.active{background:var(--p);color:#fff}
.tab-count{background:rgba(255,255,255,0.2);padding:1px 7px;border-radius:10px;font-size:11px;font-weight:700}
.tab-btn:not(.active) .tab-count{background:var(--border)}
.vehicle-list{display:flex;flex-direction:column;gap:14px}
.vehicle-card{background:var(--card);border-radius:12px;padding:16px;border:2px solid var(--border)}
.vehicle-card.pending{border-color:#fecaca;background:#fef9f9}
.vehicle-card.verified{border-color:#bbf7d0;background:#f0fdf4}
.vehicle-card.rejected{opacity:0.7;background:#fafafa}
.vc-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:12px;flex-wrap:wrap;gap:10px}
.vc-status{padding:4px 10px;border-radius:99px;font-size:10px;font-weight:700;text-transform:uppercase}
.vc-status.pending{background:var(--err);color:#fff}
.vc-status.verified{background:var(--ok);color:#fff}
.vc-status.rejected{background:#6b7280;color:#fff}
.vc-meta{font-size:11px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap}
.vc-meta b{color:var(--txt)}
.vc-photos{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.vc-photo{position:relative;aspect-ratio:4/3;background:#f0f0f0;border-radius:8px;overflow:hidden;border:1px solid var(--border);cursor:pointer}
.vc-photo img{width:100%;height:100%;object-fit:cover}
.vc-photo-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.7);color:#fff;padding:4px 8px;font-size:11px;font-weight:600;text-transform:uppercase}
.vc-photo-ocr{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.7);color:#fff;padding:2px 6px;font-size:10px;font-family:monospace;border-radius:4px}
.vc-photo-mode{position:absolute;top:4px;left:4px;background:rgba(15,28,94,0.9);color:#fff;padding:2px 6px;font-size:9px;border-radius:4px;font-weight:700;text-transform:uppercase}
.vc-ocr-row{background:#fef3c7;border:1px solid #fcd34d;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px}
.suggestion-chip{background:#fff;border:1px solid #fcd34d;padding:3px 9px;border-radius:99px;font-family:monospace;font-size:11px;font-weight:700;cursor:pointer;margin-right:6px;display:inline-block}
.vc-form{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end}
@media(max-width:600px){.vc-form{grid-template-columns:1fr}}
.vc-input-row{display:flex;flex-direction:column;gap:4px}
.vc-input-row label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase}
.vc-input{padding:10px 14px;border:2px solid var(--border);border-radius:8px;font-size:16px;font-weight:700;font-family:monospace;text-transform:uppercase;letter-spacing:1px}
.vc-actions{display:flex;gap:8px}
.btn-verify{background:var(--ok);color:#fff;border:none;padding:11px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.btn-verify:disabled{opacity:0.5;cursor:not-allowed}
.btn-reject{background:#fff;color:var(--err);border:1px solid var(--err);padding:11px 14px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.vc-verified-info{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 14px;font-size:13px;display:flex;flex-wrap:wrap;gap:14px;align-items:center}
.vc-verified-info .field{display:flex;flex-direction:column;gap:2px}
.vc-verified-info .field-label{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:600}
.vc-verified-info .field-value{font-weight:700}
.vc-verified-info .plate{font-family:monospace;font-size:16px;color:var(--p)}
.photo-count-badge{display:inline-block;padding:3px 8px;border-radius:99px;font-size:10px;font-weight:700;margin-left:6px}
.photo-count-badge.complete{background:#dcfce7;color:#0d9968}
.photo-count-badge.partial{background:#fef3c7;color:#a06000}
.loading{text-align:center;padding:40px;color:var(--muted)}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--p2);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);background:var(--card);border-radius:12px;border:1px solid var(--border)}
.empty-state .emoji{font-size:48px;margin-bottom:12px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;z-index:1000;opacity:0;transition:0.2s;pointer-events:none}
.toast.show{opacity:1}
.toast.success{background:var(--ok)}
.toast.error{background:var(--err)}
.zoom-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:1000;align-items:center;justify-content:center;cursor:pointer}
.zoom-modal.show{display:flex}
.zoom-modal img{max-width:100%;max-height:100%;object-fit:contain}
.zoom-close{position:absolute;top:20px;right:20px;background:rgba(255,255,255,0.2);color:#fff;border:none;width:40px;height:40px;border-radius:50%;font-size:24px;cursor:pointer}
.version-tag{position:fixed;bottom:5px;right:10px;font-size:10px;color:#aaa}
</style>
</head>
<body>
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <h2>🔍 Verifier Portal</h2>
    <div class="subtitle">Prajapati GPS v13 — Hood + Back Panel grouping fixed</div>
    <input type="text" id="loginPhone" placeholder="Phone number (e.g. 9876543210)" maxlength="15" />
    <button class="login-btn" onclick="doLogin()">Login</button>
    <div style="margin-top:14px;font-size:11px;color:#999;text-align:center;">Only Verifier/Admin role can login</div>
  </div>
</div>

<div id="mainApp" style="display:none;">
  <div class="hdr">
    <h1>🔍 Verifier Portal v13</h1>
    <div>
      <span class="user-badge" id="userBadge">—</span>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="container">
    <div class="stats-bar">
      <div class="stat-card pending"><div class="stat-label">⏳ Pending</div><div class="stat-value" id="statPending">—</div></div>
      <div class="stat-card verified"><div class="stat-label">✅ Verified Today</div><div class="stat-value" id="statVerified">—</div></div>
      <div class="stat-card total"><div class="stat-label">📊 Total Today</div><div class="stat-value" id="statTotal">—</div></div>
      <div class="stat-card rejected"><div class="stat-label">❌ Rejected</div><div class="stat-value" id="statRejected">—</div></div>
    </div>
    <div class="filters">
      <div class="filter-group"><label>Date</label><input type="date" id="filterDate" /></div>
      <div class="filter-group"><label>Campaign</label><select id="filterCampaign"><option value="">All</option></select></div>
      <div class="filter-group"><label>Team Member</label><select id="filterMember"><option value="">All</option></select></div>
      <button class="filter-btn" onclick="loadQueue()">🔍 Apply</button>
      <button class="filter-btn reset" onclick="resetFilters()">Reset</button>
    </div>
    <div class="status-tabs">
      <button class="tab-btn active" data-status="pending" onclick="switchTab('pending')">⏳ Pending <span class="tab-count" id="tabPending">0</span></button>
      <button class="tab-btn" data-status="verified" onclick="switchTab('verified')">✅ Verified <span class="tab-count" id="tabVerified">0</span></button>
      <button class="tab-btn" data-status="all" onclick="switchTab('all')">📋 All <span class="tab-count" id="tabAll">0</span></button>
    </div>
    <div id="vehicleList" class="vehicle-list">
      <div class="loading"><div class="spinner"></div><div style="margin-top:12px;">Loading...</div></div>
    </div>
  </div>
</div>

<div class="zoom-modal" id="zoomModal" onclick="closeZoom()">
  <button class="zoom-close" onclick="closeZoom()">×</button>
  <img id="zoomImg" alt="zoomed" />
</div>
<div class="toast" id="toast"></div>
<div class="version-tag">v13 - groups fixed</div>

<script>
"use strict";
console.log('[Verifier v13] Loading - hood+back-panel grouping fixed');

var CONFIG = {
  supabaseUrl: 'https://fpbktcgtspqsqpaytslv.supabase.co',
  supabaseKey: 'sb_publishable_JhObe56x_zETygpy6y8-DQ_qpQXIz_j'
};
var state = { user: null, currentTab: 'pending', vehicles: [] };

function $(id) { return document.getElementById(id); }
function toast(msg, type) {
  var t = $('toast'); if (!t) { console.log('[TOAST]', msg); return; }
  t.textContent = msg; t.className = 'toast show ' + (type || '');
  setTimeout(function() { t.classList.remove('show'); }, 3500);
}
function escHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, function(c) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; });
}
function api(path, options) {
  options = options || {}; options.headers = options.headers || {};
  options.headers.apikey = CONFIG.supabaseKey;
  options.headers.Authorization = 'Bearer ' + CONFIG.supabaseKey;
  if (options.body && typeof options.body !== 'string') {
    options.headers['Content-Type'] = 'application/json';
    options.body = JSON.stringify(options.body);
  }
  return fetch(CONFIG.supabaseUrl + path, options).then(function(r) {
    if (!r.ok) return r.text().then(function(text) { throw new Error('API ' + r.status + ': ' + text); });
    if (r.status === 204) return null;
    return r.text().then(function(text) {
      if (!text || text.trim() === '') return null;
      try { return JSON.parse(text); } catch (e) { return null; }
    });
  });
}
function cleanPlate(p) { return String(p || '').toUpperCase().replace(/[^A-Z0-9]/g, ''); }
function formatTime(iso) { if (!iso) return ''; return new Date(iso).toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit',hour12:true}); }
function formatDate(iso) { if (!iso) return ''; return new Date(iso).toLocaleDateString('en-IN', {day:'2-digit',month:'short'}); }
function extractCity(addr) {
  if (!addr) return '';
  var parts = addr.split(',').map(function(s) { return s.trim(); });
  for (var i = 1; i < Math.min(parts.length, 4); i++) {
    if (parts[i] && !parts[i].match(/^\d+/) && parts[i].length > 2) return parts[i];
  }
  return parts[0] || '';
}

function doLogin() {
  var phone = $('loginPhone').value.trim().replace(/[^0-9]/g, '');
  if (phone.length < 10) return toast('Enter 10 digit phone', 'error');
  if (phone.length > 10) phone = phone.slice(-10);
  api('/rest/v1/trial_team_members?phone=eq.' + phone + '&active=eq.true&select=*')
    .then(function(members) {
      if (!members || members.length === 0) return toast('Number not registered', 'error');
      var found = members[0];
      var role = (found.role || '').toLowerCase();
      if (role !== 'verifier' && role !== 'admin' && role !== 'owner') {
        return toast('Only Verifiers/Admins. Your role: ' + role, 'error');
      }
      state.user = found;
      localStorage.setItem('verifier_user', JSON.stringify(found));
      $('loginScreen').style.display = 'none';
      $('mainApp').style.display = 'block';
      $('userBadge').textContent = found.name + ' (' + (found.role || '').toUpperCase() + ')';
      init();
    })
    .catch(function(err) { toast('Login failed: ' + err.message, 'error'); });
}
function doLogout() {
  localStorage.removeItem('verifier_user'); state.user = null;
  $('loginScreen').style.display = 'flex'; $('mainApp').style.display = 'none';
}
function checkSession() {
  var saved = localStorage.getItem('verifier_user');
  if (!saved) return;
  try {
    var user = JSON.parse(saved);
    if (user && user.id && user.role) {
      state.user = user;
      $('loginScreen').style.display = 'none'; $('mainApp').style.display = 'block';
      $('userBadge').textContent = user.name + ' (' + (user.role || '').toUpperCase() + ')';
      init();
    }
  } catch (e) {}
}
function init() {
  $('filterDate').value = new Date().toISOString().split('T')[0];
  loadFilters(); loadQueue(); refreshStats();
  setInterval(refreshStats, 30000);
}
function resetFilters() {
  $('filterDate').value = new Date().toISOString().split('T')[0];
  $('filterCampaign').value = ''; $('filterMember').value = ''; loadQueue();
}
function loadFilters() {
  api('/rest/v1/trial_campaigns?select=key,name&active=eq.true&order=name.asc').then(function(c) {
    var sel = $('filterCampaign'); sel.innerHTML = '<option value="">All Campaigns</option>';
    (c || []).forEach(function(x) { sel.innerHTML += '<option value="' + escHtml(x.key) + '">' + escHtml(x.name) + '</option>'; });
  });
  api('/rest/v1/trial_team_members?select=phone,name&active=eq.true&role=eq.field&order=name.asc').then(function(m) {
    var sel = $('filterMember'); sel.innerHTML = '<option value="">All Members</option>';
    (m || []).forEach(function(x) { sel.innerHTML += '<option value="' + escHtml(x.phone) + '">' + escHtml(x.name) + '</option>'; });
  });
}

function loadQueue() {
  var date = $('filterDate').value, campaign = $('filterCampaign').value, member = $('filterMember').value;
  $('vehicleList').innerHTML = '<div class="loading"><div class="spinner"></div><div style="margin-top:12px;">Loading...</div></div>';
  var qs = '/rest/v1/trial_photos?select=*&order=captured_at.desc&limit=500';
  if (date) {
    qs += '&captured_at=gte.' + new Date(date + 'T00:00:00+05:30').toISOString();
    qs += '&captured_at=lte.' + new Date(date + 'T23:59:59+05:30').toISOString();
  }
  if (campaign) qs += '&campaign_key=eq.' + encodeURIComponent(campaign);
  if (member) qs += '&member_phone=eq.' + encodeURIComponent(member);
  
  api(qs).then(function(photos) {
    photos = photos || [];
    console.log('[Verifier] Loaded', photos.length, 'photos');
    if (photos.length === 0) {
      $('vehicleList').innerHTML = '<div class="empty-state"><div class="emoji">📭</div><div style="font-weight:700;">No photos found</div></div>';
      updateTabCounts(0, 0, 0); return;
    }
    state.vehicles = Object.values(groupPhotos(photos));
    console.log('[Verifier] Grouped into', state.vehicles.length, 'vehicles');
    state.vehicles.forEach(function(v) {
      var hoods = v.photos.filter(function(p){return p.mode === 'hood' || (p.public_url||'').match(/\/(back|left|right|front)-(?!panel)/i);}).length;
      var backs = v.photos.filter(function(p){return p.mode === 'back_panel' || (p.public_url||'').match(/back[-_]panel/i);}).length;
      console.log('[GROUP]', v.vehicleSlug || v.groupKey, ':', v.photos.length, 'photos (' + hoods + ' hood + ' + backs + ' back-panel)');
    });
    renderQueue();
  }).catch(function(err) {
    $('vehicleList').innerHTML = '<div class="empty-state"><div class="emoji">⚠️</div><div style="color:var(--err);">Error: ' + escHtml(err.message) + '</div></div>';
  });
}

// ⭐ CRITICAL FIX: Group by VEHICLE FOLDER + capture time (not photo type)
// This ensures hood + back-panel of SAME vehicle group together
function groupPhotos(photos) {
  var groups = {};
  
  photos.forEach(function(p) {
    var groupKey;
    var vehicleSlug = '';
    
    // Extract vehicle slug from URL: campaign/date/member/VEHICLE-SLUG/anything.jpg
    var url = p.public_url || '';
    var pathParts = url.split('/');
    if (pathParts.length >= 2) {
      // Second to last part is the vehicle folder
      vehicleSlug = pathParts[pathParts.length - 2];
    }
    
    if (vehicleSlug && vehicleSlug.length > 1) {
      // Primary group: vehicle folder slug
      groupKey = p.member_phone + '_' + vehicleSlug;
    } else if (p.vehicle_number) {
      // Fallback: vehicle_number
      groupKey = p.member_phone + '_' + cleanPlate(p.vehicle_number);
    } else {
      // Last resort: 3-min time bucket
      var bucket = Math.floor(new Date(p.captured_at).getTime() / (3 * 60 * 1000));
      groupKey = p.member_phone + '_t' + bucket;
    }
    
    if (!groups[groupKey]) {
      groups[groupKey] = {
        groupKey: groupKey,
        vehicleSlug: vehicleSlug,
        groupId: p.vehicle_group_id || null,
        photos: [],
        campaign: p.campaign_key,
        member: p.member_name || p.member_phone,
        memberPhone: p.member_phone,
        captured: p.captured_at,
        date: p.captured_at ? p.captured_at.slice(0, 10) : '',
        address: p.address,
        city: extractCity(p.address),
        ocrPlates: [],
        verified: false,
        verifiedPlate: null,
        rejected: false
      };
    }
    
    var g = groups[groupKey];
    g.photos.push(p);
    
    if (p.vehicle_number && p.vehicle_number.length >= 4 && !p.is_verified) {
      if (g.ocrPlates.indexOf(p.vehicle_number) === -1) g.ocrPlates.push(p.vehicle_number);
    }
    if (p.is_verified === true) { 
      g.verified = true; 
      g.verifiedPlate = p.verified_plate || p.vehicle_number || g.verifiedPlate; 
    }
    if (p.rejected === true) g.rejected = true;
  });
  
  return groups;
}

function renderQueue() {
  var filtered = state.vehicles.filter(function(v) {
    if (state.currentTab === 'pending') return !v.verified && !v.rejected;
    if (state.currentTab === 'verified') return v.verified;
    return true;
  });
  filtered.sort(function(a, b) {
    if (!a.verified && b.verified) return -1;
    if (a.verified && !b.verified) return 1;
    return new Date(b.captured) - new Date(a.captured);
  });
  var pending = state.vehicles.filter(function(v) { return !v.verified && !v.rejected; }).length;
  var verified = state.vehicles.filter(function(v) { return v.verified; }).length;
  updateTabCounts(pending, verified, state.vehicles.length);
  if (filtered.length === 0) {
    $('vehicleList').innerHTML = '<div class="empty-state"><div class="emoji">' + (state.currentTab === 'pending' ? '🎉' : '📭') + '</div><div style="font-weight:700;">' + (state.currentTab === 'pending' ? 'All verified!' : 'No items') + '</div></div>';
    return;
  }
  renderCards(filtered);
}

function renderCards(vehicles) {
  $('vehicleList').innerHTML = vehicles.map(function(v, idx) { return renderVehicleCard(v, idx); }).join('');
  document.querySelectorAll('.vc-input').forEach(function(input) {
    input.addEventListener('input', function() {
      var idx = parseInt(this.getAttribute('data-idx'));
      var btn = document.querySelector('.btn-verify[data-idx="' + idx + '"]');
      if (btn) btn.disabled = !this.value.trim() || this.value.trim().length < 4;
    });
    input.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') verifyVehicle(parseInt(this.getAttribute('data-idx')));
    });
  });
}

function getPhotoMode(p) {
  // Returns 'hood' or 'back_panel'
  if (p.mode === 'back_panel') return 'back_panel';
  if (p.mode === 'hood') return 'hood';
  var url = (p.public_url || '').toLowerCase();
  if (url.match(/back[-_]panel/)) return 'back_panel';
  if (url.match(/\/(back|left|right|front)-/)) return 'hood';
  return p.mode || 'photo';
}

function getPhotoSide(p) {
  // Returns 'BACK', 'LEFT', 'RIGHT', 'BACK PANEL', etc.
  var url = (p.public_url || '').toLowerCase();
  if (url.match(/back[-_]panel/)) return 'BACK PANEL';
  var sideMatch = url.match(/\/(back|left|right|front)-/);
  if (sideMatch) return sideMatch[1].toUpperCase();
  return (p.mode || 'PHOTO').toUpperCase();
}

function renderVehicleCard(v, idx) {
  var statusClass = v.verified ? 'verified' : (v.rejected ? 'rejected' : 'pending');
  var statusLabel = v.verified ? '✅ Verified' : (v.rejected ? '❌ Rejected' : '⏳ Pending');
  var uniqueOcr = [];
  v.ocrPlates.forEach(function(p) {
    var cp = cleanPlate(p);
    if (cp && cp.length >= 4 && uniqueOcr.indexOf(cp) === -1) uniqueOcr.push(cp);
  });
  var suggested = v.verifiedPlate || uniqueOcr.sort(function(a, b) { return b.length - a.length; })[0] || '';
  
  // Sort photos: hood photos first (back, left, right), then back-panel
  var sortedPhotos = v.photos.slice().sort(function(a, b) {
    var aMode = getPhotoMode(a), bMode = getPhotoMode(b);
    if (aMode === 'hood' && bMode === 'back_panel') return -1;
    if (aMode === 'back_panel' && bMode === 'hood') return 1;
    var order = { 'back': 1, 'left': 2, 'right': 3, 'front': 4 };
    var aSide = ((a.public_url || '').match(/\/(back|left|right|front)-/) || [])[1];
    var bSide = ((b.public_url || '').match(/\/(back|left|right|front)-/) || [])[1];
    return (order[aSide] || 99) - (order[bSide] || 99);
  });
  
  var hoodCount = sortedPhotos.filter(function(p){return getPhotoMode(p) === 'hood';}).length;
  var backCount = sortedPhotos.filter(function(p){return getPhotoMode(p) === 'back_panel';}).length;
  var isComplete = hoodCount >= 3 && backCount >= 1;
  var countBadge = '<span class="photo-count-badge ' + (isComplete ? 'complete' : 'partial') + '">Hood ' + hoodCount + '/3 + Back ' + backCount + '/1</span>';
  
  var photosHtml = sortedPhotos.map(function(p) {
    var url = p.public_url || '';
    var side = getPhotoSide(p);
    var mode = getPhotoMode(p);
    return '<div class="vc-photo" onclick="openZoom(\'' + escHtml(url) + '\')">' +
      '<img src="' + escHtml(url) + '" loading="lazy" />' +
      '<div class="vc-photo-mode">' + (mode === 'back_panel' ? 'BACK PANEL' : 'HOOD') + '</div>' +
      '<div class="vc-photo-label">' + side + '</div>' +
      (p.vehicle_number ? '<div class="vc-photo-ocr">' + escHtml(p.vehicle_number) + '</div>' : '') +
    '</div>';
  }).join('');
  
  var verifiedInfoHtml = '';
  if (v.verified) {
    verifiedInfoHtml = '<div class="vc-verified-info"><div class="field"><div class="field-label">Plate</div><div class="field-value plate">' + escHtml(v.verifiedPlate || '') + '</div></div><div class="field"><div class="field-label">Photos</div><div class="field-value">' + v.photos.length + ' total (' + hoodCount + ' hood + ' + backCount + ' back-panel)</div></div><div class="field"><div class="field-label">Location</div><div class="field-value">' + escHtml(v.city || '—') + '</div></div><button onclick="reEditPlate(' + idx + ')" style="margin-left:auto;background:#fff;border:1px solid var(--border);padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;">✏️ Re-edit</button></div>';
  }
  
  var formHtml = '';
  if (!v.verified) {
    var ocrChips = uniqueOcr.map(function(p) { return '<span class="suggestion-chip" onclick="usePlate(' + idx + ', \'' + escHtml(p) + '\')">' + escHtml(p) + '</span>'; }).join('');
    var ocrRow = uniqueOcr.length > 0 ? '<div class="vc-ocr-row"><b>OCR Detected:</b> ' + ocrChips + '</div>' : '<div class="vc-ocr-row" style="background:#fee2e2;border-color:#fecaca;color:#991b1b;"><b>⚠️ No plate detected by OCR</b> — read manually from photos</div>';
    formHtml = ocrRow + '<div class="vc-form"><div class="vc-input-row"><label>Verified Plate (applies to ALL ' + v.photos.length + ' photos — hood + back panel)</label><input type="text" class="vc-input" data-idx="' + idx + '" id="plate-input-' + idx + '" value="' + escHtml(suggested) + '" placeholder="MH12AB1234" maxlength="20" /></div><div class="vc-actions"><button class="btn-verify" data-idx="' + idx + '" onclick="verifyVehicle(' + idx + ')" ' + (!suggested ? 'disabled' : '') + '>✓ Verify & Save</button><button class="btn-reject" onclick="rejectVehicle(' + idx + ')">❌</button></div></div>';
  }
  
  return '<div class="vehicle-card ' + statusClass + '"><div class="vc-header"><div><span class="vc-status ' + statusClass + '">' + statusLabel + '</span>' + countBadge + '<div class="vc-meta" style="margin-top:6px;"><span>📅 <b>' + formatDate(v.captured) + '</b></span><span>🕒 <b>' + formatTime(v.captured) + '</b></span><span>📍 <b>' + escHtml(v.city || '—') + '</b></span><span>👤 <b>' + escHtml(v.member) + '</b></span><span>📷 <b>' + v.photos.length + ' photos</b></span>' + (v.vehicleSlug ? '<span>📁 <b>' + escHtml(v.vehicleSlug) + '</b></span>' : '') + '</div></div></div><div class="vc-photos">' + photosHtml + '</div>' + verifiedInfoHtml + formHtml + '</div>';
}

function switchTab(tab) {
  state.currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.toggle('active', b.getAttribute('data-status') === tab); });
  renderQueue();
}
function updateTabCounts(pending, verified, all) {
  $('tabPending').textContent = pending; $('tabVerified').textContent = verified; $('tabAll').textContent = all;
}
function usePlate(idx, plate) {
  var input = $('plate-input-' + idx);
  if (input) { input.value = plate; input.focus(); var btn = document.querySelector('.btn-verify[data-idx="' + idx + '"]'); if (btn) btn.disabled = false; }
}

// ═══════════════════════════════════════════════════════════════════════════
// VERIFY VEHICLE — Updates ALL photos in group (hood + back panel)
// Comprehensive error handling + console logs for debugging
// ═══════════════════════════════════════════════════════════════════════════
async function verifyVehicle(idx) {
  console.log('[VERIFY] Click registered for index', idx);
  
  var v = state.vehicles[idx];
  if (!v) {
    console.error('[VERIFY] Vehicle not found at index', idx);
    return toast('Vehicle not found', 'error');
  }
  
  var input = $('plate-input-' + idx);
  if (!input) {
    console.error('[VERIFY] Input field not found');
    return toast('Input not found', 'error');
  }
  
  var plate = cleanPlate(input.value);
  console.log('[VERIFY] Plate entered:', plate);
  console.log('[VERIFY] Group has', v.photos.length, 'photos');
  
  if (!plate || plate.length < 4) {
    return toast('Enter valid plate (min 4 chars)', 'error');
  }
  
  var btn = document.querySelector('.btn-verify[data-idx="' + idx + '"]');
  if (btn) { btn.disabled = true; btn.innerHTML = '⏳ Saving...'; }
  
  try {
    var groupId = v.groupId || generateUUID();
    var photoIds = v.photos.map(function(p) { return p.id; });
    
    console.log('[VERIFY] Updating photo IDs:', photoIds);
    
    var updateBody = {
      vehicle_number: plate,
      verified_plate: plate,
      verified_by: state.user.id,
      verified_at: new Date().toISOString(),
      vehicle_group_id: groupId,
      is_verified: true,
      rejected: false,
      rejection_reason: null
    };
    
    console.log('[VERIFY] PATCH body:', updateBody);
    
    var url = '/rest/v1/trial_photos?id=in.(' + photoIds.join(',') + ')';
    console.log('[VERIFY] PATCH URL:', url);
    
    var updateResult = await api(url, {
      method: 'PATCH',
      headers: { 'Prefer': 'return=representation' },
      body: updateBody
    });
    
    console.log('[VERIFY] PATCH response:', updateResult);
    
    if (Array.isArray(updateResult) && updateResult.length === 0) {
      console.error('[VERIFY] 0 rows updated - RLS issue?');
      throw new Error('PATCH matched 0 rows - check RLS policies');
    }
    
    var updatedCount = Array.isArray(updateResult) ? updateResult.length : 'unknown';
    console.log('[VERIFY] Successfully updated', updatedCount, 'rows');
    
    // Log (optional, non-critical)
    try {
      await api('/rest/v1/prajapati_verification_log', {
        method: 'POST',
        body: {
          verifier_id: state.user.id,
          verifier_name: state.user.name,
          verifier_phone: state.user.phone,
          vehicle_group_id: groupId,
          verified_plate: plate,
          ocr_plates: v.ocrPlates,
          photo_ids: photoIds,
          photo_count: v.photos.length,
          campaign_key: v.campaign,
          member_name: v.member,
          capture_date: v.date,
          action_type: 'verify',
          notes: 'v13 manual verify - hood+back grouped'
        }
      });
      console.log('[VERIFY] Log saved');
    } catch (e) {
      console.warn('[VERIFY] Log save failed (non-critical):', e.message);
    }
    
    v.verified = true;
    v.verifiedPlate = plate;
    v.groupId = groupId;
    
    toast('✅ Verified: ' + plate + ' (' + v.photos.length + ' photos updated)', 'success');
    
    // Refresh
    renderQueue();
    refreshStats();
    
  } catch (err) {
    console.error('[VERIFY] FATAL ERROR:', err);
    console.error('[VERIFY] Error stack:', err.stack);
    toast('Failed: ' + err.message, 'error');
    if (btn) { btn.disabled = false; btn.innerHTML = '✓ Verify & Save'; }
  }
}

async function rejectVehicle(idx) {
  var v = state.vehicles[idx]; if (!v) return;
  var reason = prompt('Why reject?'); if (!reason) return;
  try {
    var photoIds = v.photos.map(function(p) { return p.id; });
    await api('/rest/v1/trial_photos?id=in.(' + photoIds.join(',') + ')', {
      method: 'PATCH',
      body: { rejected: true, rejection_reason: reason, verified_by: state.user.id, verified_at: new Date().toISOString(), is_verified: false }
    });
    v.rejected = true; toast('Rejected', 'success'); renderQueue(); refreshStats();
  } catch (err) { toast('Failed: ' + err.message, 'error'); }
}

function reEditPlate(idx) {
  var v = state.vehicles[idx]; if (!v) return;
  if (!confirm('Re-edit? Plate: ' + v.verifiedPlate)) return;
  v.verified = false; v.verifiedPlate = null; renderQueue();
  setTimeout(function() { var i = $('plate-input-' + idx); if (i) { i.focus(); i.select(); } }, 100);
}

function refreshStats() {
  var today = new Date().toISOString().split('T')[0];
  var istStart = new Date(today + 'T00:00:00+05:30').toISOString();
  var istEnd = new Date(today + 'T23:59:59+05:30').toISOString();
  api('/rest/v1/trial_photos?select=id,is_verified,rejected&captured_at=gte.' + istStart + '&captured_at=lte.' + istEnd + '&limit=2000')
    .then(function(photos) {
      photos = photos || [];
      var verified = photos.filter(function(p) { return p.is_verified === true; }).length;
      var rejected = photos.filter(function(p) { return p.rejected === true; }).length;
      var pending = photos.filter(function(p) { return p.is_verified !== true && p.rejected !== true; }).length;
      $('statVerified').textContent = Math.ceil(verified / 4);
      $('statRejected').textContent = Math.ceil(rejected / 4);
      $('statPending').textContent = Math.ceil(pending / 4);
      $('statTotal').textContent = Math.ceil(photos.length / 4);
    });
}

function openZoom(url) { $('zoomImg').src = url; $('zoomModal').classList.add('show'); }
function closeZoom() { $('zoomModal').classList.remove('show'); }
function generateUUID() {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    var r = Math.random() * 16 | 0; return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

document.addEventListener('DOMContentLoaded', function() {
  console.log('[Verifier v13] DOM ready');
  checkSession();
  $('loginPhone').addEventListener('keypress', function(e) { if (e.key === 'Enter') doLogin(); });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeZoom(); });
});
</script>
