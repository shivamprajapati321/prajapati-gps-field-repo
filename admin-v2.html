<!DOCTYPE html>
<html lang="en">
<head>
<!-- Unified login bridge: feed session → legacy prajapati_admin_phone -->
<script src="/lib/access-guard.js"></script>
<script>
(function(){
  try{
    var s = (window.AccessGuard && AccessGuard.getSession) ? AccessGuard.getSession() : null;
    if (s && s.member) {
      // Make legacy code happy: set the phone key it expects
      if (s.member.phone) localStorage.setItem('prajapati_admin_phone', s.member.phone);
      window.currentSessionMember = s.member;
    } else {
      // No session → bounce to unified login (top window, in case of iframe)
      var go = function(){ try{ if(window.top&&window.top!==window.self){ window.top.location.href='/login.html'; return; } }catch(e){} window.location.href='/login.html'; };
      // Only redirect if there's no legacy phone either (avoid breaking direct testing)
      if(!localStorage.getItem('prajapati_admin_phone')) go();
    }
  }catch(e){ console.warn('login bridge', e); }
})();
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Campaign Status · Prajapati Advertising</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:opsz,wght,ital@9..144,300..900,0..1&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{
  --navy:#0B1957;--gold:#B89B4E;--gold-deep:#8B7430;--gold-soft:#F4E4B0;--gold-pale:#FBF6E4;
  --cream:#FAF8F3;--paper:#F7F4EC;--rule:#E5E0D2;
  --ink-950:#0F172A;--ink-500:#64748B;--text-dim:#94A3B8;
  --success:#047857;--success-bg:#D1FAE5;
  --warn:#C2410C;--warn-bg:#FED7AA;
  --danger:#BE123C;--danger-bg:#FECACA;
  --info:#1E40AF;--info-bg:#DBEAFE;
  --purple:#7C3AED;--purple-bg:#EDE9FE;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--cream);color:var(--ink-950);font-size:14px;line-height:1.55}
button{font-family:inherit;cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none}

.topbar{background:var(--navy);color:#fff;padding:14px 32px;border-bottom:3px solid var(--gold);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.tb-brand{display:flex;align-items:center;gap:12px}
.tb-logo{width:36px;height:36px;background:var(--gold);color:var(--navy);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.tb-name{font-size:14px;font-weight:700}
.tb-tag{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--gold-soft);letter-spacing:0.16em;text-transform:uppercase;margin-top:2px}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;border:none}
.btn-secondary{background:#fff;color:var(--navy);border:1px solid var(--rule)}
.btn-info{background:var(--info);color:#fff}
.btn.sm{padding:5px 10px;font-size:10.5px}

.main{max-width:1440px;margin:0 auto;padding:28px}

.page-head{margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--rule)}
.page-title{font-family:'Fraunces',serif;font-size:30px;font-weight:500;color:var(--navy)}
.page-title em{color:var(--gold);font-style:italic}
.page-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:0.14em;text-transform:uppercase;margin-top:6px}

.summary{display:grid;grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));gap:14px;margin-bottom:24px}
.sum-card{background:#fff;border:1px solid var(--rule);border-radius:10px;padding:16px}
.sum-label{font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:700;color:var(--gold-deep);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:8px}
.sum-value{font-family:'Fraunces',serif;font-size:30px;font-weight:600;color:var(--navy);line-height:1}

.tier{margin-bottom:32px}
.tier-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--rule);cursor:pointer}
.tier-title{font-family:'Fraunces',serif;font-size:22px;font-weight:500;color:var(--navy);display:flex;align-items:center;gap:10px}
.tier-count{padding:3px 10px;background:var(--gold-pale);color:var(--gold-deep);border-radius:999px;font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700;letter-spacing:0.1em}
.tier-toggle{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--gold-deep);letter-spacing:0.14em;text-transform:uppercase}
.tier-body{display:grid;grid-template-columns:1fr;gap:12px}
.tier.collapsed .tier-body{display:none}

.campaign-row{background:#fff;border:1px solid var(--rule);border-radius:10px;padding:16px;display:grid;grid-template-columns:1fr auto auto auto;gap:16px;align-items:center}
.campaign-row.urgent{border-left:4px solid var(--danger)}
.campaign-row.stale{background:linear-gradient(90deg, var(--danger-bg) 0%, #fff 20%);border-color:var(--danger)}

.cr-main{min-width:0}
.cr-name{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--navy);margin-bottom:4px}
.cr-meta{font-size:11.5px;color:var(--text-dim);font-family:'JetBrains Mono',monospace}

.cr-progress{min-width:160px}
.prog-bar{width:100%;height:8px;background:var(--paper);border-radius:999px;overflow:hidden;border:1px solid var(--rule)}
.prog-fill{height:100%;background:var(--gold)}
.prog-fill.complete{background:var(--success)}
.prog-fill.warn{background:var(--warn)}
.prog-text{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink-500);margin-top:5px;font-weight:600;display:flex;justify-content:space-between}

.cr-status{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.status-pill{padding:3px 9px;border-radius:999px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase}
.status-pill.in_production{background:var(--gold-pale);color:var(--gold-deep)}
.status-pill.plan_locked{background:var(--info-bg);color:var(--info)}
.status-pill.pending_execution_plan{background:var(--warn-bg);color:var(--warn)}
.status-pill.production_done,.status-pill.delivered,.status-pill.completed{background:var(--success-bg);color:var(--success)}
.status-pill.draft{background:#E5E7EB;color:#374151}
.stale-flag{background:var(--danger-bg);color:var(--danger);padding:2px 7px;border-radius:999px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase}

.empty{text-align:center;padding:40px 20px;color:var(--text-dim);font-style:italic;font-size:13px;background:#fff;border-radius:10px;border:1px solid var(--rule)}

.callout{display:flex;align-items:flex-start;gap:12px;padding:14px 18px;border-radius:10px;margin-bottom:18px;font-size:13px}
.callout.info{background:var(--info-bg);color:var(--info)}
.callout.error{background:var(--danger-bg);color:var(--danger)}

@media (max-width:768px){
  .main{padding:16px}
  .topbar{padding:12px 16px}
  .campaign-row{grid-template-columns:1fr;gap:10px}
  .cr-status{align-items:flex-start}
}
/* ═══ Pipeline flow strip ═══ */
.pipeline-wrap{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:22px}
.pipe-stage{background:#fff;border:1px solid var(--rule);border-radius:12px;padding:14px 14px 13px;position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s;cursor:pointer}
.pipe-stage:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(11,25,87,.08)}
.pipe-stage.sel{border-color:var(--navy);box-shadow:0 0 0 2px rgba(11,25,87,.12)}
.pipe-stage::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--c,#ccc)}
.pipe-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.pipe-ic{font-size:16px}
.pipe-arrow{position:absolute;right:-6px;top:50%;transform:translateY(-50%);z-index:2;color:var(--text-dim);font-size:14px}
.pipe-val{font-family:'Fraunces',serif;font-size:28px;font-weight:600;color:var(--navy);line-height:1}
.pipe-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-500);margin-top:5px}
.pipe-sub{font-size:10.5px;color:var(--text-dim);margin-top:4px;min-height:14px}
.pipe-bar{height:4px;background:var(--paper);border-radius:3px;margin-top:8px;overflow:hidden}
.pipe-bar>i{display:block;height:100%;background:var(--c,#ccc);border-radius:3px}

/* ═══ Alerts ═══ */
.alerts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:22px}
.alert-card{background:#fff;border:1px solid var(--rule);border-left-width:4px;border-radius:10px;padding:13px 15px;display:flex;align-items:center;gap:12px}
.alert-card.crit{border-left-color:var(--danger);background:linear-gradient(180deg,#fff,rgba(254,202,202,.18))}
.alert-card.warn{border-left-color:var(--warn);background:linear-gradient(180deg,#fff,rgba(254,215,170,.18))}
.alert-card.info{border-left-color:var(--info)}
.alert-ic{font-size:22px}
.alert-body{flex:1;min-width:0}
.alert-num{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--navy);line-height:1}
.alert-txt{font-size:11.5px;color:var(--ink-500);margin-top:2px}
.alert-card.crit .alert-num{color:var(--danger)}
.alert-card.warn .alert-num{color:var(--warn)}

/* ═══ Toolbar ═══ */
.cs-toolbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px;background:#fff;border:1px solid var(--rule);border-radius:12px;padding:12px 14px}
.cs-search{position:relative;flex:1;min-width:220px;display:flex;align-items:center}
.cs-search-ic{position:absolute;left:12px;font-size:13px;opacity:.5}
.cs-search input{width:100%;padding:9px 30px 9px 32px;border:1px solid var(--rule);border-radius:8px;font-family:inherit;font-size:13px;background:var(--cream);color:var(--ink-950);outline:none}
.cs-search input:focus{border-color:var(--navy);background:#fff}
.cs-clear{position:absolute;right:8px;width:20px;height:20px;border-radius:50%;background:var(--rule);color:var(--ink-500);font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center}
.cs-chips{display:flex;gap:6px;flex-wrap:wrap}
.cs-chip{padding:6px 12px;border-radius:999px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border:1px solid var(--rule);background:#fff;color:var(--ink-500);cursor:pointer;transition:all .12s}
.cs-chip:hover{border-color:var(--navy)}
.cs-chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.cs-chip .ch-n{opacity:.7;margin-left:4px}
.cs-sort{display:flex;align-items:center;gap:7px}
.cs-sort label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim)}
.cs-sort select{padding:8px 10px;border:1px solid var(--rule);border-radius:8px;font-family:inherit;font-size:12px;background:#fff;color:var(--ink-950);cursor:pointer;outline:none}
.cs-filter-meta{font-size:11.5px;color:var(--ink-500);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.cs-filter-meta b{color:var(--navy)}
.cs-reset{color:var(--info);cursor:pointer;font-weight:700;text-decoration:underline}

/* ═══ Enriched campaign row ═══ */
.cr-twobars{display:flex;flex-direction:column;gap:7px;min-width:200px}
.cr-barline{display:flex;align-items:center;gap:8px}
.cr-barlabel{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-dim);width:54px;flex-shrink:0}
.cr-mini{flex:1;height:6px;background:var(--paper);border-radius:3px;overflow:hidden}
.cr-mini>i{display:block;height:100%;border-radius:3px;transition:width .4s}
.cr-mini-num{font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:700;color:var(--ink-500);width:64px;text-align:right;flex-shrink:0}
.cr-stuck{display:inline-flex;align-items:center;gap:4px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;letter-spacing:.04em}
.cr-stuck.ok{background:var(--success-bg);color:var(--success)}
.cr-stuck.mid{background:var(--gold-pale);color:var(--gold-deep)}
.cr-stuck.bad{background:var(--danger-bg);color:var(--danger)}
.cr-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.cr-tag{font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:700;padding:2px 7px;border-radius:5px;letter-spacing:.04em;text-transform:uppercase}
.cr-tag.unassigned{background:var(--danger-bg);color:var(--danger)}
.cr-tag.nodone{background:var(--warn-bg);color:var(--warn)}
.cr-tag.urgent{background:#FEE2E2;color:#B91C1C}
.cr-tag.almost{background:var(--success-bg);color:var(--success)}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-brand">
    <div class="tb-logo">🗂️</div>
    <div>
      <div class="tb-name">Campaign Status</div>
      <div class="tb-tag">Lifecycle Board · 3-Tier Visibility</div>
    </div>
  </div>
  <div style="display:flex;gap:8px">
    <a href="/hub.html" class="btn btn-secondary">← Hub</a>
    <a href="/archive-viewer.html" class="btn btn-secondary">📦 Archive</a>
  </div>
</div>

<div class="main">
  <div class="page-head">
    <div class="page-title">Campaign <em>Status Board</em></div>
    <div class="page-sub" id="todayDate">…</div>
  </div>
  
  <div id="summaryArea" class="summary"></div>

  <!-- Pipeline flow strip -->
  <div id="pipelineArea" class="pipeline-wrap"></div>

  <!-- Alerts / needs-action -->
  <div id="alertsArea"></div>

  <!-- Toolbar: search + filter + sort -->
  <div id="toolbarArea" class="cs-toolbar" style="display:none">
    <div class="cs-search">
      <span class="cs-search-ic">🔍</span>
      <input type="text" id="csSearch" placeholder="Search campaign or client…" oninput="applyFilters()" autocomplete="off">
      <button id="csClear" class="cs-clear" onclick="clearSearch()" style="display:none">×</button>
    </div>
    <div class="cs-chips" id="csStatusChips"></div>
    <div class="cs-sort">
      <label>Sort</label>
      <select id="csSort" onchange="applyFilters()">
        <option value="stuck">Most stuck (days)</option>
        <option value="progress_low">Lowest progress</option>
        <option value="progress_high">Highest progress</option>
        <option value="name">Name (A–Z)</option>
        <option value="client">Client (A–Z)</option>
        <option value="newest">Newest first</option>
      </select>
    </div>
  </div>
  <div id="filterMeta" class="cs-filter-meta" style="display:none"></div>
  
  <div id="contentArea">
    <div class="empty">Loading…</div>
  </div>
</div>

<script src="/lib/access-guard.js"></script>
<script>
const SUPABASE_URL = 'https://fpbktcgtspqsqpaytslv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_JhObe56x_zETygpy6y8-DQ_qpQXIz_j';
const HEADERS = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' };
const state = { user: null, campaigns: [] };

async function api(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + path, { ...opts, headers: { ...HEADERS, ...(opts.headers || {}) } });
  if (!res.ok) throw new Error('API ' + res.status);
  if (res.status === 204) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function loadData() {
  const phone = localStorage.getItem('prajapati_admin_phone');
  if (!phone) {
    // Embedded in admin-v2 iframe? Don't redirect inside the frame.
    var embedded = (window.self !== window.top) || /[?&]embedded=1/.test(location.search);
    if (!embedded) { location.href = '/login.html'; }
    return;
  }
  
  try {
    const [user, campaigns] = await Promise.all([
      api('/rest/v1/trial_team_members?phone=eq.' + phone + '&active=eq.true&select=*'),
      api('/rest/v1/v_active_campaigns?select=*&limit=200')
    ]);
    
    if (!user || !user.length) {
      var embedded = (window.self !== window.top) || /[?&]embedded=1/.test(location.search);
      if (!embedded) { location.href = '/login.html'; }
      return;
    }
    state.user = user[0];
    state.campaigns = campaigns || [];
    
    if (window.AccessGuard) AccessGuard.filterUI(state.user);
    
    document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-IN', {
      weekday: 'long', day: '2-digit', month: 'long', year: 'numeric', timeZone: 'Asia/Kolkata'
    });
    
    render();
  } catch (e) {
    document.getElementById('contentArea').innerHTML = '<div class="callout error"><span>❌</span><div><strong>Load failed:</strong> ' + escapeHtml(e.message) + '<br><small>Apply SESSION_4 SQL first.</small></div></div>';
  }
}

// ═══ STATUS DEFINITIONS ═══
var STATUS_DEFS = [
  { key:'draft',                  label:'Draft',      icon:'📝', color:'#94A3B8' },
  { key:'pending_execution_plan', label:'Planning',   icon:'🗒️', color:'#C2410C' },
  { key:'plan_locked',            label:'Plan Locked',icon:'🔒', color:'#1E40AF' },
  { key:'in_production',          label:'Production',  icon:'⚙️', color:'#B89B4E' },
  { key:'done',                   label:'Done',       icon:'✅', color:'#047857' }  // production_done/delivered/completed
];
var DONE_STATUSES = ['production_done','delivered','completed'];
var ACTIVE_STATUSES = ['in_production','plan_locked','pending_execution_plan','draft'];

// Filter state
var csState = { search:'', statuses:new Set(), sort:'stuck' };

function stageOf(c){
  if (DONE_STATUSES.indexOf(c.status) !== -1 || c.is_recently_completed) return 'done';
  return c.status;
}
function pctOf(c){
  var total = c.total_assigned || 0, done = c.total_done || 0;
  return total > 0 ? Math.round((done/total)*100) : 0;
}
function isUnassigned(c){ return (c.total_assigned || 0) === 0 && ACTIVE_STATUSES.indexOf(c.status) !== -1; }

function render() {
  var c = state.campaigns;

  var tierActive = c.filter(function(x){ return ACTIVE_STATUSES.indexOf(x.status) !== -1; });
  var tierRecent = c.filter(function(x){ return x.is_recently_completed; });
  var tierUrgent = c.filter(function(x){ return x.is_urgent && ['in_production','plan_locked','pending_execution_plan'].indexOf(x.status) !== -1; });
  var stale = c.filter(function(x){ return x.is_stale; }).length;

  // ── Summary cards (kept) ──
  document.getElementById('summaryArea').innerHTML =
    '<div class="sum-card"><div class="sum-label">🟢 Active</div><div class="sum-value">' + tierActive.length + '</div></div>' +
    '<div class="sum-card"><div class="sum-label">🚨 Urgent</div><div class="sum-value">' + tierUrgent.length + '</div></div>' +
    '<div class="sum-card"><div class="sum-label">✅ Recent Done</div><div class="sum-value">' + tierRecent.length + '</div></div>' +
    '<div class="sum-card"><div class="sum-label">⚠️ Stale (7+ days)</div><div class="sum-value">' + stale + '</div></div>';

  // ── Pipeline strip ──
  renderPipeline(c);
  // ── Alerts ──
  renderAlerts(c);
  // ── Toolbar (status chips) ──
  renderToolbar(c);
  // ── Filtered list ──
  applyFilters();
}

function renderPipeline(c){
  // Count campaigns + summed pending work per stage
  var byStage = {};
  STATUS_DEFS.forEach(function(s){ byStage[s.key] = { n:0, assigned:0, done:0 }; });
  c.forEach(function(x){
    var st = stageOf(x);
    if (!byStage[st]) return;
    byStage[st].n++;
    byStage[st].assigned += (x.total_assigned || 0);
    byStage[st].done += (x.total_done || 0);
  });
  var maxN = Math.max(1, Math.max.apply(null, STATUS_DEFS.map(function(s){ return byStage[s.key].n; })));

  var html = STATUS_DEFS.map(function(s, i){
    var d = byStage[s.key];
    var isLast = i === STATUS_DEFS.length - 1;
    var sub = '';
    if (s.key === 'in_production') {
      var pend = Math.max(0, d.assigned - d.done);
      sub = pend > 0 ? (pend.toLocaleString('en-IN') + ' units pending') : (d.assigned ? 'all done' : '—');
    } else if (s.key === 'done') {
      sub = d.done > 0 ? (d.done.toLocaleString('en-IN') + ' units delivered') : '—';
    } else if (s.key === 'plan_locked') {
      sub = d.n ? 'ready to assign' : '—';
    } else if (s.key === 'pending_execution_plan') {
      sub = d.n ? 'awaiting plan' : '—';
    } else {
      sub = d.n ? 'in draft' : '—';
    }
    var sel = csState.statuses.has(s.key) ? ' sel' : '';
    return '<div class="pipe-stage' + sel + '" style="--c:' + s.color + '" onclick="togglePipe(\'' + s.key + '\')">' +
        '<div class="pipe-top"><span class="pipe-ic">' + s.icon + '</span></div>' +
        '<div class="pipe-val">' + d.n + '</div>' +
        '<div class="pipe-label">' + s.label + '</div>' +
        '<div class="pipe-sub">' + sub + '</div>' +
        '<div class="pipe-bar"><i style="width:' + Math.round(d.n/maxN*100) + '%"></i></div>' +
        (isLast ? '' : '<div class="pipe-arrow">→</div>') +
      '</div>';
  }).join('');
  document.getElementById('pipelineArea').innerHTML = html;
}

function renderAlerts(c){
  var unassigned = c.filter(isUnassigned);
  var stale = c.filter(function(x){ return x.is_stale; });
  var stuck = c.filter(function(x){ return (x.days_in_status||0) >= 3 && ACTIVE_STATUSES.indexOf(x.status)!==-1; });
  var urgent = c.filter(function(x){ return x.is_urgent && ACTIVE_STATUSES.indexOf(x.status)!==-1; });
  var almost = c.filter(function(x){ var p = pctOf(x); return p >= 90 && p < 100 && x.status === 'in_production'; });

  var cards = [];
  if (unassigned.length) cards.push({ cls:'crit', ic:'🎯', num:unassigned.length, txt:'Unassigned — operators chahiye', filter:'__unassigned' });
  if (urgent.length)     cards.push({ cls:'crit', ic:'🚨', num:urgent.length, txt:'Urgent in flight', filter:'__urgent' });
  if (stale.length)      cards.push({ cls:'warn', ic:'⚠️', num:stale.length, txt:'Stale (7+ days no move)', filter:'__stale' });
  if (stuck.length)      cards.push({ cls:'warn', ic:'⏳', num:stuck.length, txt:'Stuck 3+ days in stage', filter:'__stuck' });
  if (almost.length)     cards.push({ cls:'info', ic:'🏁', num:almost.length, txt:'Almost done (90%+)', filter:'__almost' });

  var el = document.getElementById('alertsArea');
  if (!cards.length) { el.innerHTML = ''; return; }
  el.innerHTML = '<div class="alerts-grid">' + cards.map(function(a){
    return '<div class="alert-card ' + a.cls + '" onclick="quickFilter(\'' + a.filter + '\')" style="cursor:pointer">' +
        '<div class="alert-ic">' + a.ic + '</div>' +
        '<div class="alert-body"><div class="alert-num">' + a.num + '</div><div class="alert-txt">' + a.txt + '</div></div>' +
      '</div>';
  }).join('') + '</div>';
}

function renderToolbar(c){
  document.getElementById('toolbarArea').style.display = 'flex';
  // status chips with counts
  var counts = {};
  STATUS_DEFS.forEach(function(s){ counts[s.key] = 0; });
  c.forEach(function(x){ var st = stageOf(x); if (counts[st] != null) counts[st]++; });
  var chips = STATUS_DEFS.filter(function(s){ return counts[s.key] > 0; }).map(function(s){
    var on = csState.statuses.has(s.key) ? ' on' : '';
    return '<button class="cs-chip' + on + '" onclick="toggleStatus(\'' + s.key + '\')">' + s.icon + ' ' + s.label + '<span class="ch-n">' + counts[s.key] + '</span></button>';
  }).join('');
  document.getElementById('csStatusChips').innerHTML = chips;
}

// ─── FILTER / SORT ───
function applyFilters(){
  var q = (document.getElementById('csSearch').value || '').toLowerCase().trim();
  csState.search = q;
  csState.sort = document.getElementById('csSort').value;
  document.getElementById('csClear').style.display = q ? 'flex' : 'none';

  var list = state.campaigns.slice();

  // Quick-filter flags (set by alert cards)
  if (csState._quick === '__unassigned') list = list.filter(isUnassigned);
  else if (csState._quick === '__urgent') list = list.filter(function(x){ return x.is_urgent && ACTIVE_STATUSES.indexOf(x.status)!==-1; });
  else if (csState._quick === '__stale') list = list.filter(function(x){ return x.is_stale; });
  else if (csState._quick === '__stuck') list = list.filter(function(x){ return (x.days_in_status||0)>=3 && ACTIVE_STATUSES.indexOf(x.status)!==-1; });
  else if (csState._quick === '__almost') list = list.filter(function(x){ var p=pctOf(x); return p>=90 && p<100 && x.status==='in_production'; });

  // Status chips
  if (csState.statuses.size) list = list.filter(function(x){ return csState.statuses.has(stageOf(x)); });

  // Search
  if (q) list = list.filter(function(x){
    return ((x.campaign_name||'') + ' ' + (x.client_name||'')).toLowerCase().indexOf(q) !== -1;
  });

  // Sort
  var sorters = {
    stuck:        function(a,b){ return (b.days_in_status||0) - (a.days_in_status||0); },
    progress_low: function(a,b){ return pctOf(a) - pctOf(b); },
    progress_high:function(a,b){ return pctOf(b) - pctOf(a); },
    name:         function(a,b){ return (a.campaign_name||'').localeCompare(b.campaign_name||''); },
    client:       function(a,b){ return (a.client_name||'').localeCompare(b.client_name||''); },
    newest:       function(a,b){ return new Date(b.created_at||b.start_date||0) - new Date(a.created_at||a.start_date||0); }
  };
  list.sort(sorters[csState.sort] || sorters.stuck);

  // Filter meta line
  var active = csState.search || csState.statuses.size || csState._quick;
  var meta = document.getElementById('filterMeta');
  if (active) {
    meta.style.display = 'flex';
    var parts = [];
    if (csState._quick) parts.push(csState._quick.replace('__',''));
    if (csState.statuses.size) parts.push(Array.from(csState.statuses).join(', '));
    if (csState.search) parts.push('"' + csState.search + '"');
    meta.innerHTML = 'Showing <b>' + list.length + '</b> of ' + state.campaigns.length + ' · ' + parts.join(' · ') + ' <span class="cs-reset" onclick="resetFilters()">clear all</span>';
  } else {
    meta.style.display = 'none';
  }

  // Render rows (single flat list when filtered, else keep tiers)
  if (active) {
    document.getElementById('contentArea').innerHTML =
      '<div class="tier"><div class="tier-body">' +
      (list.length ? list.map(renderCampaign).join('') : '<div class="empty">No campaigns match</div>') +
      '</div></div>';
  } else {
    var tierActive = list.filter(function(x){ return ACTIVE_STATUSES.indexOf(x.status) !== -1; });
    var tierRecent = list.filter(function(x){ return x.is_recently_completed; });
    var tierUrgent = list.filter(function(x){ return x.is_urgent && ['in_production','plan_locked','pending_execution_plan'].indexOf(x.status) !== -1; });
    document.getElementById('contentArea').innerHTML =
      renderTier('🟢 ACTIVE — In Flight', tierActive, 'active', false) +
      (tierUrgent.length ? renderTier('🚨 URGENT — Priority', tierUrgent, 'urgent', false) : '') +
      renderTier('✅ RECENTLY COMPLETED (Last 7 days)', tierRecent, 'recent', true) +
      '<div style="text-align:center;margin-top:30px;padding:20px;background:#fff;border-radius:10px;border:1px solid var(--rule)">' +
        '<div style="font-family:\'JetBrains Mono\',monospace;font-size:10px;color:var(--text-dim);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:8px">Archived Campaigns (> 30 days completed)</div>' +
        '<a href="/archive-viewer.html" class="btn btn-info">📦 Open Archive →</a>' +
      '</div>';
  }
}

function togglePipe(key){ toggleStatus(key); }
function toggleStatus(key){
  csState._quick = null;
  if (csState.statuses.has(key)) csState.statuses.delete(key);
  else csState.statuses.add(key);
  renderToolbar(state.campaigns);
  renderPipeline(state.campaigns);
  applyFilters();
}
function quickFilter(flag){
  csState._quick = (csState._quick === flag) ? null : flag;
  csState.statuses.clear();
  document.getElementById('csSearch').value = '';
  renderToolbar(state.campaigns);
  renderPipeline(state.campaigns);
  applyFilters();
  document.getElementById('toolbarArea').scrollIntoView({ behavior:'smooth', block:'nearest' });
}
function clearSearch(){ document.getElementById('csSearch').value = ''; applyFilters(); }
function resetFilters(){
  csState.search=''; csState.statuses.clear(); csState._quick=null;
  document.getElementById('csSearch').value='';
  renderToolbar(state.campaigns); renderPipeline(state.campaigns); applyFilters();
}

function renderTier(title, list, key, collapsed) {
  return '<div class="tier ' + (collapsed ? 'collapsed' : '') + '" id="tier-' + key + '">' +
    '<div class="tier-head" onclick="toggleTier(\'' + key + '\')">' +
      '<div class="tier-title">' + escapeHtml(title) + '<span class="tier-count">' + list.length + '</span></div>' +
      '<div class="tier-toggle">' + (collapsed ? '+ Expand' : '− Collapse') + '</div>' +
    '</div>' +
    '<div class="tier-body">' +
      (list.length ? list.map(renderCampaign).join('') : '<div class="empty">No campaigns in this tier</div>') +
    '</div>' +
  '</div>';
}

function renderCampaign(c) {
  var assigned = c.total_assigned || 0;
  var done = c.total_done || 0;
  var target = Number(c.target_vehicles) || Number(c.total_quantity) || 0;
  var donePct = assigned > 0 ? Math.round((done/assigned)*100) : 0;
  var targetPct = target > 0 ? Math.round((assigned/target)*100) : 0;
  var days = c.days_in_status || 0;

  // Stuck badge
  var stuckCls = days <= 1 ? 'ok' : (days <= 3 ? 'mid' : 'bad');
  var stuckTxt = days + 'd in ' + (c.status || '').replace(/_/g,' ');

  // Tags
  var tags = '';
  if (isUnassigned(c)) tags += '<span class="cr-tag unassigned">⚠ Unassigned</span>';
  else if (assigned > 0 && done === 0) tags += '<span class="cr-tag nodone">No output yet</span>';
  if (c.is_urgent) tags += '<span class="cr-tag urgent">🚨 Urgent</span>';
  if (donePct >= 90 && donePct < 100) tags += '<span class="cr-tag almost">🏁 ' + donePct + '%</span>';

  // Done bar color
  var doneColor = donePct >= 100 ? 'var(--success)' : (donePct < 30 ? 'var(--warn)' : 'var(--gold)');

  return '<div class="campaign-row ' + (c.is_urgent ? 'urgent' : '') + ' ' + (c.is_stale ? 'stale' : '') + '">' +
    '<div class="cr-main">' +
      '<div class="cr-name">' + escapeHtml(c.campaign_name || c.name || 'Unnamed') + '</div>' +
      '<div class="cr-meta">' + escapeHtml(c.client_name || '—') + '</div>' +
      '<div class="cr-tags">' +
        '<span class="cr-stuck ' + stuckCls + '">⏱ ' + escapeHtml(stuckTxt) + '</span>' + tags +
      '</div>' +
    '</div>' +
    '<div class="cr-twobars">' +
      (target > 0 ?
        '<div class="cr-barline"><span class="cr-barlabel">Target</span><div class="cr-mini"><i style="width:' + Math.min(targetPct,100) + '%;background:var(--info)"></i></div><span class="cr-mini-num">' + assigned.toLocaleString('en-IN') + '/' + target.toLocaleString('en-IN') + '</span></div>'
        : '') +
      '<div class="cr-barline"><span class="cr-barlabel">Done</span><div class="cr-mini"><i style="width:' + Math.min(donePct,100) + '%;background:' + doneColor + '"></i></div><span class="cr-mini-num">' + done.toLocaleString('en-IN') + '/' + assigned.toLocaleString('en-IN') + '</span></div>' +
    '</div>' +
    '<div class="cr-status">' +
      '<span class="status-pill ' + c.status + '">' + escapeHtml((c.status || '').replace(/_/g, ' ')) + '</span>' +
      '<span style="font-family:\'JetBrains Mono\',monospace;font-size:11px;font-weight:700;color:' + (donePct>=100?'var(--success)':'var(--ink-500)') + '">' + donePct + '% done</span>' +
      (c.is_stale ? '<span class="stale-flag">⚠️ STALE</span>' : '') +
    '</div>' +
    '<div class="cr-actions"><a href="/assign-operators.html" class="btn btn-secondary sm">🎯 Assign</a></div>' +
  '</div>';
}

function toggleTier(key) {
  var el = document.getElementById('tier-' + key);
  el.classList.toggle('collapsed');
  var toggle = el.querySelector('.tier-toggle');
  if (toggle) toggle.textContent = el.classList.contains('collapsed') ? '+ Expand' : '− Collapse';
}

document.addEventListener('DOMContentLoaded', loadData);
</script>
