<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Command Center · Prajapati Advertising</title>
<meta name="theme-color" content="#0B1957">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:opsz,wght,ital@9..144,300..900,0..1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
:root{
  --navy:#0B1957;--navy-deep:#050B2E;--navy-soft:#1E2855;
  --gold:#B89B4E;--gold-bright:#D4B45F;--gold-deep:#8B7430;--gold-soft:#F4E4B0;
  --cream:#FAF8F3;--paper:#F7F4EC;--rule:#E5E0D2;--rule-soft:#F0EDE2;
  --ink-950:#0F172A;--ink-700:#475569;--ink-500:#64748B;--text-dim:#94A3B8;
  --success:#047857;--success-bg:#D1FAE5;--success-soft:#ECFDF5;
  --warn:#C2410C;--warn-bg:#FED7AA;--warn-soft:#FFF7ED;
  --danger:#BE123C;--danger-bg:#FECACA;--danger-soft:#FEF2F2;
  --info:#1E40AF;--info-bg:#DBEAFE;--info-soft:#EFF6FF;
  --purple:#7C3AED;--purple-bg:#EDE9FE;--purple-soft:#F5F3FF;
  
  --shadow-sm: 0 1px 2px rgba(11,25,87,0.04);
  --shadow-md: 0 4px 12px rgba(11,25,87,0.08);
  --shadow-lg: 0 10px 30px rgba(11,25,87,0.12);
  --shadow-glow: 0 0 0 1px var(--gold-soft), 0 4px 20px rgba(184,155,78,0.2);
}

body{
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
  background:linear-gradient(180deg, var(--cream), #FFF);
  background-attachment:fixed;
  color:var(--ink-950);
  font-size:14px;line-height:1.5;
  min-height:100vh;
}

button{font-family:inherit;cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none}

/* ─── TOPBAR ────────────────────────────────────────────── */
.topbar{
  background:linear-gradient(135deg, var(--navy), var(--navy-deep));
  color:#fff;
  padding:14px 28px;
  border-bottom:3px solid var(--gold);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:var(--shadow-md);
}
.tb-brand{display:flex;align-items:center;gap:14px}
.tb-logo{
  width:42px;height:42px;
  background:linear-gradient(135deg, var(--gold), var(--gold-bright));
  color:var(--navy);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;font-weight:700;font-size:22px;
  box-shadow:0 4px 12px rgba(212,180,95,0.4);
}
.tb-title-block .name{font-size:15px;font-weight:700;letter-spacing:-0.01em}
.tb-title-block .tag{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;color:var(--gold-bright);
  letter-spacing:0.18em;text-transform:uppercase;
  margin-top:3px;
}

.tb-actions{display:flex;gap:8px;align-items:center}
.tb-clock{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;color:rgba(255,255,255,0.75);
  letter-spacing:0.06em;
  padding:5px 10px;
  background:rgba(255,255,255,0.05);
  border-radius:6px;
  border:1px solid rgba(212,180,95,0.2);
}
.tb-user{
  display:flex;align-items:center;gap:10px;
  padding:5px 14px 5px 5px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(212,180,95,0.3);
  border-radius:999px;
}
.tb-ava{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg, var(--gold), var(--gold-bright));
  color:var(--navy);
  display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;font-style:italic;font-weight:700;font-size:15px;
}
.tb-user-info .name{font-size:12.5px;font-weight:700;line-height:1.15}
.tb-user-info .role{
  font-family:'JetBrains Mono',monospace;font-size:8.5px;
  color:var(--gold-bright);letter-spacing:0.14em;text-transform:uppercase;
}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:8px 14px;border-radius:8px;
  font-size:12px;font-weight:600;
  cursor:pointer;transition:all 0.2s;
  font-family:inherit;
  border:1px solid transparent;
}
.btn:hover{transform:translateY(-1px)}
.btn-secondary{background:rgba(255,255,255,0.08);color:#fff;border-color:rgba(212,180,95,0.3)}
.btn-secondary:hover{background:rgba(255,255,255,0.15)}
.btn-gold{background:var(--gold);color:var(--navy);font-weight:700}
.btn-gold:hover{background:var(--gold-bright)}
.btn-ghost{background:transparent;color:var(--navy);border:1px solid var(--rule)}
.btn-ghost:hover{background:var(--cream);border-color:var(--gold)}
.btn-light{background:#fff;color:var(--navy);border:1px solid var(--rule)}
.btn-light:hover{border-color:var(--gold);box-shadow:var(--shadow-sm)}
.btn.sm{padding:6px 10px;font-size:10.5px}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}

/* ─── LOGIN ────────────────────────────────────────────── */
.login-bg{position:fixed;inset:0;background:linear-gradient(135deg, var(--navy), var(--navy-deep));display:flex;align-items:center;justify-content:center;padding:20px;z-index:200}
.login-card{background:#fff;padding:40px 36px;border-radius:16px;max-width:400px;width:100%;border:1px solid var(--gold);box-shadow:var(--shadow-lg)}
.login-logo{width:72px;height:72px;background:linear-gradient(135deg, var(--gold), var(--gold-bright));color:var(--navy);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 20px;box-shadow:0 8px 24px rgba(212,180,95,0.3)}
.login-title{font-family:'Fraunces',serif;font-size:24px;font-weight:500;text-align:center;color:var(--navy);margin-bottom:6px;letter-spacing:-0.01em}
.login-title em{color:var(--gold);font-style:italic}
.login-sub{font-family:'JetBrains Mono',monospace;font-size:10px;text-align:center;color:var(--text-dim);letter-spacing:0.16em;text-transform:uppercase;margin-bottom:28px}
.login-input{width:100%;padding:13px 14px;border:1px solid var(--rule);font-family:inherit;font-size:14px;border-radius:8px;outline:none;margin-bottom:12px;transition:all 0.2s}
.login-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-soft)}
.login-btn{width:100%;padding:14px;background:var(--navy);color:#fff;border-radius:8px;font-weight:700;font-size:13px;letter-spacing:0.02em;transition:all 0.2s}
.login-btn:hover{background:var(--navy-deep);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.login-err{color:var(--danger);font-size:12px;text-align:center;margin-top:12px;display:none}
.login-err.show{display:block}

/* ─── MAIN ────────────────────────────────────────────── */
.main{padding:24px 28px;max-width:1480px;margin:0 auto;padding-bottom:60px}

.page-head{
  display:flex;align-items:flex-end;justify-content:space-between;
  margin-bottom:24px;
  flex-wrap:wrap;gap:14px;
}
.page-title{
  font-family:'Fraunces',serif;font-size:32px;font-weight:400;
  color:var(--navy);letter-spacing:-0.025em;line-height:1.1;
}
.page-title em{color:var(--gold);font-style:italic;font-weight:500}
.page-sub{
  font-family:'JetBrains Mono',monospace;font-size:10.5px;
  color:var(--text-dim);letter-spacing:0.14em;text-transform:uppercase;
  margin-top:6px;
}

/* ─── KPI STRIP ────────────────────────────────────────────── */
.kpi-strip{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));
  gap:10px;margin-bottom:20px;
}
.kpi-card{
  background:#fff;
  border:1px solid var(--rule);
  border-radius:12px;padding:14px 18px;
  position:relative;overflow:hidden;
  transition:all 0.2s;
}
.kpi-card:hover{border-color:var(--gold);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.kpi-card.urgent{border-left:3px solid var(--danger);background:linear-gradient(90deg, var(--danger-soft), #fff 40%)}
.kpi-card.warning{border-left:3px solid var(--warn);background:linear-gradient(90deg, var(--warn-soft), #fff 40%)}
.kpi-card.success{border-left:3px solid var(--success);background:linear-gradient(90deg, var(--success-soft), #fff 40%)}
.kpi-card.info{border-left:3px solid var(--info);background:linear-gradient(90deg, var(--info-soft), #fff 40%)}
.kpi-card.gold{border-left:3px solid var(--gold);background:linear-gradient(90deg, rgba(244,228,176,0.3), #fff 40%)}

.kpi-label{
  font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
  color:var(--gold-deep);letter-spacing:0.16em;text-transform:uppercase;
  margin-bottom:6px;display:flex;align-items:center;gap:5px;
}
.kpi-card.urgent .kpi-label{color:var(--danger)}
.kpi-card.warning .kpi-label{color:var(--warn)}
.kpi-card.success .kpi-label{color:var(--success)}
.kpi-card.info .kpi-label{color:var(--info)}

.kpi-value{
  font-family:'Fraunces',serif;font-size:28px;font-weight:600;
  color:var(--navy);line-height:1;letter-spacing:-0.02em;
}
.kpi-meta{font-size:10.5px;color:var(--text-dim);margin-top:4px;font-weight:500}

/* ─── FILTERS / TOOLBAR ────────────────────────────────────────────── */
.toolbar{
  background:#fff;border:1px solid var(--rule);border-radius:12px;
  padding:12px 16px;margin-bottom:18px;
  display:flex;align-items:center;flex-wrap:wrap;gap:8px;
  box-shadow:var(--shadow-sm);
}
.toolbar-search{
  flex:1;min-width:240px;position:relative;
}
.toolbar-search input{
  width:100%;padding:9px 12px 9px 36px;
  border:1px solid var(--rule);background:var(--cream);
  font-family:inherit;font-size:13px;border-radius:8px;outline:none;
  transition:all 0.2s;
}
.toolbar-search input:focus{border-color:var(--gold);background:#fff;box-shadow:0 0 0 3px var(--gold-soft)}
.toolbar-search::before{
  content:'🔍';position:absolute;left:11px;top:50%;transform:translateY(-50%);
  font-size:13px;opacity:0.5;
}

.filter-chip{
  padding:7px 12px;
  background:#fff;border:1px solid var(--rule);
  border-radius:999px;
  font-size:11.5px;font-weight:600;
  color:var(--ink-700);
  cursor:pointer;transition:all 0.2s;
  display:inline-flex;align-items:center;gap:5px;
}
.filter-chip:hover{border-color:var(--gold);color:var(--navy)}
.filter-chip.active{background:var(--navy);color:var(--gold-bright);border-color:var(--navy)}
.filter-chip .count{
  background:var(--gold-soft);color:var(--gold-deep);
  padding:1px 6px;border-radius:999px;font-size:9.5px;font-weight:700;
}
.filter-chip.active .count{background:var(--gold);color:var(--navy)}

/* ─── KANBAN PIPELINE ────────────────────────────────────────────── */
.pipeline{
  display:grid;
  grid-template-columns:repeat(4, minmax(280px, 1fr)) auto;
  gap:14px;
  overflow-x:auto;
  padding-bottom:8px;
}
.column{
  display:flex;flex-direction:column;
  background:rgba(255,255,255,0.5);
  border:1px solid var(--rule-soft);
  border-radius:12px;
  padding:0;min-height:200px;
}
.column-head{
  padding:12px 16px 10px;
  border-bottom:1px solid var(--rule-soft);
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(180deg, #fff, transparent);
  border-radius:12px 12px 0 0;
}
.column-title{
  font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700;
  color:var(--navy);letter-spacing:0.14em;text-transform:uppercase;
  display:flex;align-items:center;gap:6px;
}
.column-count{
  background:var(--gold-soft);color:var(--gold-deep);
  padding:2px 9px;border-radius:999px;
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
}
.column-body{
  padding:12px;display:flex;flex-direction:column;gap:10px;
  flex:1;overflow-y:auto;max-height:calc(100vh - 380px);
}
.column-body::-webkit-scrollbar{width:6px}
.column-body::-webkit-scrollbar-track{background:transparent}
.column-body::-webkit-scrollbar-thumb{background:var(--rule);border-radius:3px}

.column.design .column-title{color:var(--purple)}
.column.design .column-count{background:var(--purple-bg);color:var(--purple)}
.column.assign .column-title{color:var(--info)}
.column.assign .column-count{background:var(--info-bg);color:var(--info)}
.column.production .column-title{color:var(--warn)}
.column.production .column-count{background:var(--warn-bg);color:var(--warn)}
.column.completed .column-title{color:var(--success)}
.column.completed .column-count{background:var(--success-bg);color:var(--success)}

/* COLLAPSED COMPLETED COLUMN */
.column.completed.collapsed{
  min-width:64px;width:64px;
  cursor:pointer;
}
.column.completed.collapsed .column-head{
  flex-direction:column;gap:8px;
  writing-mode:vertical-rl;
  text-orientation:mixed;
  height:auto;padding:14px 8px;
}
.column.completed.collapsed .column-body{display:none}
.column.completed.collapsed:hover{background:rgba(255,255,255,0.8);border-color:var(--success)}

/* ─── CAMPAIGN CARDS ────────────────────────────────────────────── */
.card{
  background:#fff;
  border:1px solid var(--rule);
  border-radius:10px;
  padding:12px;
  cursor:pointer;
  transition:all 0.2s;
  position:relative;
  overflow:hidden;
}
.card:hover{
  border-color:var(--gold);
  box-shadow:var(--shadow-md);
  transform:translateY(-2px);
}
.card.urgent{
  border-left:3px solid var(--danger);
  background:linear-gradient(135deg, var(--danger-soft), #fff 30%);
}
.card.urgent::after{
  content:'🚨';position:absolute;top:8px;right:10px;font-size:11px;
}
.card.stalled{
  border-left:3px solid var(--warn);
  background:linear-gradient(135deg, var(--warn-soft), #fff 40%);
}
.card.stalled::after{
  content:'⚠️ STALLED';position:absolute;top:8px;right:8px;
  font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:700;
  color:var(--warn);letter-spacing:0.1em;
  background:var(--warn-bg);padding:2px 6px;border-radius:4px;
}
.card-title{
  font-family:'Fraunces',serif;font-size:14px;font-weight:600;
  color:var(--navy);line-height:1.3;
  margin-bottom:6px;padding-right:32px;letter-spacing:-0.01em;
}
.card-meta{
  display:flex;flex-wrap:wrap;gap:6px 12px;
  font-family:'JetBrains Mono',monospace;font-size:9.5px;
  color:var(--text-dim);letter-spacing:0.04em;
  margin-bottom:8px;
}
.card-meta strong{color:var(--gold-deep);font-weight:600}

.card-stats{
  display:flex;align-items:center;gap:10px;
  font-size:10.5px;color:var(--ink-700);
}
.card-stats .stat{display:flex;align-items:center;gap:3px}
.card-stats .stat strong{color:var(--navy);font-weight:700}

.card-progress{
  background:var(--rule-soft);height:5px;border-radius:3px;
  margin-top:8px;overflow:hidden;position:relative;
}
.card-progress-fill{
  height:100%;border-radius:3px;
  background:linear-gradient(90deg, var(--gold), var(--gold-bright));
  transition:width 0.5s;
}
.card-progress-fill.complete{
  background:linear-gradient(90deg, var(--success), #10B981);
}

.card-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:8px;padding-top:8px;
  border-top:1px dashed var(--rule);
  font-size:10px;color:var(--text-dim);
}
.card-days{
  font-family:'JetBrains Mono',monospace;font-weight:600;
}
.card-operators{display:flex;gap:-4px}
.op-bubble{
  width:22px;height:22px;border-radius:50%;
  background:linear-gradient(135deg, var(--gold), var(--gold-bright));
  color:var(--navy);
  display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;font-style:italic;font-weight:700;font-size:10px;
  border:2px solid #fff;
  margin-left:-6px;
}
.op-bubble:first-child{margin-left:0}

/* ─── SIDE PANEL ────────────────────────────────────────────── */
.side-panel{
  position:fixed;top:0;right:-560px;
  width:540px;max-width:90vw;height:100vh;
  background:#fff;
  box-shadow:-20px 0 60px rgba(11,25,87,0.2);
  z-index:200;
  transition:right 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  overflow-y:auto;
  display:flex;flex-direction:column;
}
.side-panel.open{right:0}
.side-panel-bg{
  position:fixed;inset:0;background:rgba(11,25,87,0.35);backdrop-filter:blur(2px);
  z-index:150;
  opacity:0;pointer-events:none;
  transition:opacity 0.3s;
}
.side-panel-bg.open{opacity:1;pointer-events:auto}

.sp-head{
  padding:20px 24px 16px;
  border-bottom:1px solid var(--rule);
  background:linear-gradient(180deg, var(--paper), #fff);
}
.sp-back{
  font-family:'JetBrains Mono',monospace;font-size:10.5px;
  color:var(--text-dim);letter-spacing:0.12em;text-transform:uppercase;
  cursor:pointer;display:inline-flex;align-items:center;gap:5px;
  padding:4px 8px;border-radius:6px;
  transition:all 0.2s;
  margin-bottom:12px;
}
.sp-back:hover{background:var(--cream);color:var(--navy)}
.sp-title{
  font-family:'Fraunces',serif;font-size:22px;font-weight:500;
  color:var(--navy);letter-spacing:-0.02em;line-height:1.2;
}
.sp-subtitle{
  font-family:'JetBrains Mono',monospace;font-size:10.5px;
  color:var(--text-dim);letter-spacing:0.1em;text-transform:uppercase;
  margin-top:6px;
}

.sp-status-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;
  background:linear-gradient(90deg, var(--paper), #fff);
  border-bottom:1px solid var(--rule);
}
.sp-status-badge{
  padding:5px 12px;border-radius:999px;
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
  letter-spacing:0.12em;text-transform:uppercase;
}
.sp-status-badge.draft{background:var(--cream);color:var(--ink-700)}
.sp-status-badge.design{background:var(--purple-bg);color:var(--purple)}
.sp-status-badge.assign{background:var(--info-bg);color:var(--info)}
.sp-status-badge.production{background:var(--warn-bg);color:var(--warn)}
.sp-status-badge.completed{background:var(--success-bg);color:var(--success)}

.sp-body{padding:20px 24px;flex:1}
.sp-section{margin-bottom:24px}
.sp-section-title{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
  color:var(--gold-deep);letter-spacing:0.16em;text-transform:uppercase;
  margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;
}
.sp-section-title .count{
  background:var(--gold-soft);color:var(--gold-deep);
  padding:1px 8px;border-radius:999px;font-size:10px;
}

.sp-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sp-stat{
  background:var(--cream);border:1px solid var(--rule);
  border-radius:8px;padding:12px;
}
.sp-stat-label{
  font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
  color:var(--gold-deep);letter-spacing:0.14em;text-transform:uppercase;
  margin-bottom:4px;
}
.sp-stat-value{
  font-family:'Fraunces',serif;font-size:22px;font-weight:600;
  color:var(--navy);line-height:1;
}

.sp-design-row{
  background:var(--cream);border:1px solid var(--rule);
  border-radius:10px;padding:12px;margin-bottom:8px;
}
.sp-design-row.complete{background:var(--success-soft);border-color:var(--success)}
.sp-design-name{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:4px}
.sp-design-meta{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  color:var(--text-dim);letter-spacing:0.04em;
  margin-bottom:6px;
}
.sp-design-meta strong{color:var(--gold-deep)}
.sp-design-progress{
  background:#fff;height:6px;border-radius:3px;
  overflow:hidden;
}
.sp-design-progress-fill{
  height:100%;
  background:linear-gradient(90deg, var(--gold), var(--gold-bright));
  border-radius:3px;
}

.sp-actions{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  padding:16px 24px;
  border-top:1px solid var(--rule);
  background:var(--paper);
}

.callout{
  display:flex;align-items:flex-start;gap:10px;
  padding:12px 14px;border-radius:8px;font-size:12px;
  margin-bottom:14px;
}
.callout.info{background:var(--info-bg);color:var(--info)}
.callout.success{background:var(--success-bg);color:var(--success)}
.callout.warn{background:var(--warn-bg);color:var(--warn)}
.callout.error{background:var(--danger-bg);color:var(--danger)}

.empty-state{
  text-align:center;padding:32px 20px;
  color:var(--text-dim);font-size:12px;font-style:italic;
}
.empty-state-icon{font-size:32px;opacity:0.4;margin-bottom:8px}

.spin{
  width:14px;height:14px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin 0.7s linear infinite;
  display:inline-block;
}
@keyframes spin{to{transform:rotate(360deg)}}

@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:0.4}
}
.live-pulse{
  display:inline-block;
  width:8px;height:8px;border-radius:50%;
  background:var(--success);
  animation:pulse 1.5s ease-in-out infinite;
  margin-right:5px;
  box-shadow:0 0 8px var(--success);
}

/* ─── RESPONSIVE ────────────────────────────────────────────── */
@media (max-width:1024px){
  .pipeline{grid-template-columns:repeat(2, 1fr)}
  .pipeline > .column:last-child{grid-column:span 2}
}
@media (max-width:768px){
  .main{padding:18px}
  .topbar{padding:12px 16px}
  .page-title{font-size:24px}
  .pipeline{grid-template-columns:1fr}
  .pipeline > .column:last-child{grid-column:auto}
  .column.completed.collapsed{width:auto;min-width:auto}
  .column.completed.collapsed .column-head{writing-mode:horizontal-tb;flex-direction:row;padding:12px 16px}
  .kpi-strip{grid-template-columns:repeat(2, 1fr)}
  .side-panel{width:100%}
  .sp-stat-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-bg" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">⌘</div>
    <div class="login-title">Command <em>Center</em></div>
    <div class="login-sub">Manager Pipeline View</div>
    <input id="loginPhone" class="login-input" type="tel" placeholder="10-digit phone" maxlength="10">
    <button id="loginBtn" class="login-btn" onclick="doLogin()">Access Command Center →</button>
    <div id="loginErr" class="login-err"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none">
  
  <div class="topbar">
    <div class="tb-brand">
      <div class="tb-logo">⌘</div>
      <div class="tb-title-block">
        <div class="name">Command Center</div>
        <div class="tag">Pipeline · Real-Time</div>
      </div>
    </div>
    <div class="tb-actions">
      <div class="tb-clock" id="tbClock">…</div>
      <a href="/assign-operators.html" class="btn btn-secondary sm">🎯 Assign</a>
      <a href="/designer-uploads.html" class="btn btn-secondary sm">🎨 Designer</a>
      <a href="/reassignment-history.html" class="btn btn-secondary sm">🔄 History</a>
      <div class="tb-user">
        <div class="tb-ava" id="tbAva">?</div>
        <div class="tb-user-info"><div class="name" id="tbName">…</div><div class="role" id="tbRole">…</div></div>
      </div>
      <button class="btn btn-secondary sm" onclick="logout()">⎋</button>
    </div>
  </div>
  
  <div class="main">
    
    <div class="page-head">
      <div>
        <div class="page-title">Today's <em>Pipeline</em></div>
        <div class="page-sub" id="todayDate"><span class="live-pulse"></span>Live · auto-refreshes every 60s</div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-light sm" onclick="loadData()">🔄 Refresh</button>
      </div>
    </div>
    
    <!-- KPI STRIP -->
    <div class="kpi-strip" id="kpiStrip">
      <!-- Filled by renderKPIs() -->
    </div>
    
    <!-- TOOLBAR -->
    <div class="toolbar">
      <div class="toolbar-search">
        <input type="text" id="searchInput" placeholder="Search by design, location, client..." oninput="renderPipeline()">
      </div>
      <button class="filter-chip active" data-filter="all" onclick="setFilter('all')">All <span class="count" id="cntAll">0</span></button>
      <button class="filter-chip" data-filter="urgent" onclick="setFilter('urgent')">🚨 Urgent <span class="count" id="cntUrgent">0</span></button>
      <button class="filter-chip" data-filter="stalled" onclick="setFilter('stalled')">⚠️ Stalled <span class="count" id="cntStalled">0</span></button>
      <button class="filter-chip" data-filter="production" onclick="setFilter('production')">🔧 Production <span class="count" id="cntProduction">0</span></button>
    </div>
    
    <!-- KANBAN PIPELINE -->
    <div class="pipeline" id="pipeline">
      <!-- Filled by renderPipeline() -->
    </div>
    
  </div>
</div>

<!-- SIDE PANEL -->
<div class="side-panel-bg" id="sidePanelBg" onclick="closeSidePanel()"></div>
<div class="side-panel" id="sidePanel">
  <!-- Filled by openSidePanel() -->
</div>

<script src="/lib/access-guard.js"></script>

<script>
const SUPABASE_URL = 'https://fpbktcgtspqsqpaytslv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_JhObe56x_zETygpy6y8-DQ_qpQXIz_j';

const state = {
  user: null,
  campaigns: [],
  kpis: null,
  filter: 'all',
  completedExpanded: false,
  refreshTimer: null,
  clockTimer: null,
  currentDetail: null
};

const HEADERS = {
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Content-Type': 'application/json'
};

async function api(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + path, { ...opts, headers: { ...HEADERS, ...(opts.headers || {}) } });
  if (!res.ok) throw new Error('API ' + res.status + ': ' + await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function getInitials(name) {
  return (name || '?').split(' ').map(p => p[0]).slice(0,2).join('').toUpperCase();
}

// ═══════════════════════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════════════════════

async function doLogin() {
  const phone = document.getElementById('loginPhone').value.trim();
  const errEl = document.getElementById('loginErr');
  const btn = document.getElementById('loginBtn');
  
  errEl.classList.remove('show');
  if (phone.length !== 10) {
    errEl.textContent = 'Phone 10 digits ka hona chahiye';
    errEl.classList.add('show');
    return;
  }
  
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Loading…';
  
  try {
    const members = await api('/rest/v1/trial_team_members?phone=eq.' + phone + '&active=eq.true&select=*');
    if (!members || !members.length) throw new Error('Number registered nahi');
    
    const m = members[0];
    const allowed = ['admin', 'owner', 'operations_manager', 'ops_manager', 'operations'];
    if (!allowed.includes((m.role || '').toLowerCase())) {
      throw new Error('Manager-only · Sirf Owner/Admin/Ops Manager');
    }
    
    state.user = m;
    localStorage.setItem('prajapati_admin_phone', phone);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    initApp();
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = 'Access Command Center →';
  }
}

async function autoLogin() {
  const phone = localStorage.getItem('prajapati_admin_phone');
  if (!phone) return;
  try {
    const members = await api('/rest/v1/trial_team_members?phone=eq.' + phone + '&active=eq.true&select=*');
    if (!members || !members.length) return;
    const m = members[0];
    const allowed = ['admin', 'owner', 'operations_manager', 'ops_manager', 'operations'];
    if (!allowed.includes((m.role || '').toLowerCase())) return;
    state.user = m;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    initApp();
  } catch (e) {}
}

function logout() {
  localStorage.removeItem('prajapati_admin_phone');
  if (state.refreshTimer) clearInterval(state.refreshTimer);
  if (state.clockTimer) clearInterval(state.clockTimer);
  location.reload();
}

// ═══════════════════════════════════════════════════════════════
// INIT + REFRESH
// ═══════════════════════════════════════════════════════════════

function initApp() {
  document.getElementById('tbAva').textContent = getInitials(state.user.name);
  document.getElementById('tbName').textContent = state.user.name || 'User';
  document.getElementById('tbRole').textContent = (state.user.role || 'user').replace(/_/g, ' ');
  
  document.getElementById('todayDate').innerHTML = 
    '<span class="live-pulse"></span>' +
    new Date().toLocaleDateString('en-IN', {
      weekday: 'long', day: '2-digit', month: 'long', year: 'numeric', timeZone: 'Asia/Kolkata'
    }) +
    ' · auto-refresh every 60s';
  
  if (window.AccessGuard) AccessGuard.filterUI(state.user);
  
  startClock();
  loadData();
  
  // Auto-refresh every 60s
  state.refreshTimer = setInterval(loadData, 60000);
}

function startClock() {
  const update = () => {
    const now = new Date().toLocaleTimeString('en-IN', { 
      hour: '2-digit', minute: '2-digit', second: '2-digit',
      hour12: false, timeZone: 'Asia/Kolkata'
    });
    document.getElementById('tbClock').textContent = '⏱ ' + now + ' IST';
  };
  update();
  state.clockTimer = setInterval(update, 1000);
}

async function loadData() {
  try {
    const [pipeline, kpis] = await Promise.all([
      api('/rest/v1/v_campaign_pipeline?select=*&order=is_urgent.desc,days_in_stage.desc&limit=500'),
      api('/rest/v1/v_command_center_kpis?select=*')
    ]);
    
    state.campaigns = pipeline || [];
    state.kpis = (kpis && kpis[0]) || {};
    
    renderKPIs();
    renderFilterCounts();
    renderPipeline();
    
  } catch (err) {
    console.error(err);
    document.getElementById('pipeline').innerHTML = `
      <div class="callout error" style="grid-column:1/-1">
        <span>❌</span>
        <div><strong>Load failed:</strong> ${escapeHtml(err.message)}<br>
        <small>Make sure SESSION_4_CAMPAIGN_LIFECYCLE.sql is applied.</small></div>
      </div>
    `;
  }
}

// ═══════════════════════════════════════════════════════════════
// KPI STRIP
// ═══════════════════════════════════════════════════════════════

function renderKPIs() {
  const k = state.kpis;
  const html = `
    <div class="kpi-card gold">
      <div class="kpi-label">🎯 Active Total</div>
      <div class="kpi-value">${k.total_active || 0}</div>
      <div class="kpi-meta">in pipeline</div>
    </div>
    <div class="kpi-card ${(k.urgent_count || 0) > 0 ? 'urgent' : ''}">
      <div class="kpi-label">🚨 Urgent</div>
      <div class="kpi-value">${k.urgent_count || 0}</div>
      <div class="kpi-meta">need priority</div>
    </div>
    <div class="kpi-card ${(k.stalled_count || 0) > 0 ? 'warning' : ''}">
      <div class="kpi-label">⚠️ Stalled</div>
      <div class="kpi-value">${k.stalled_count || 0}</div>
      <div class="kpi-meta">no logs 3+ days</div>
    </div>
    <div class="kpi-card info">
      <div class="kpi-label">🔧 In Production</div>
      <div class="kpi-value">${k.in_production_count || 0}</div>
      <div class="kpi-meta">active work</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">🎨 Need File</div>
      <div class="kpi-value">${k.designs_pending_file || 0}</div>
      <div class="kpi-meta">designs awaiting</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">🎯 Need Assign</div>
      <div class="kpi-value">${k.designs_needing_assignment || 0}</div>
      <div class="kpi-meta">awaiting operator</div>
    </div>
    <div class="kpi-card success">
      <div class="kpi-label">✅ Done Today</div>
      <div class="kpi-value">${(k.today_qty_done || 0).toLocaleString('en-IN')}</div>
      <div class="kpi-meta">${k.active_operators_today || 0} operators active</div>
    </div>
    <div class="kpi-card success">
      <div class="kpi-label">🏆 This Week</div>
      <div class="kpi-value">${k.completed_this_week || 0}</div>
      <div class="kpi-meta">campaigns completed</div>
    </div>
  `;
  document.getElementById('kpiStrip').innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════════════════════════

function setFilter(f) {
  state.filter = f;
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.classList.toggle('active', chip.dataset.filter === f);
  });
  renderPipeline();
}

function renderFilterCounts() {
  const active = state.campaigns.filter(c => !['completed', 'archived', 'cancelled'].includes(c.status));
  document.getElementById('cntAll').textContent = active.length;
  document.getElementById('cntUrgent').textContent = active.filter(c => c.is_urgent).length;
  document.getElementById('cntStalled').textContent = active.filter(c => c.is_stalled).length;
  document.getElementById('cntProduction').textContent = active.filter(c => c.pipeline_bucket === 'production').length;
}

function filterCampaigns(list) {
  const search = (document.getElementById('searchInput').value || '').toLowerCase();
  let filtered = list;
  
  if (search) {
    filtered = filtered.filter(c => 
      (c.campaign_name || '').toLowerCase().includes(search) ||
      (c.client_name || '').toLowerCase().includes(search)
    );
  }
  
  if (state.filter === 'urgent') {
    filtered = filtered.filter(c => c.is_urgent);
  } else if (state.filter === 'stalled') {
    filtered = filtered.filter(c => c.is_stalled);
  } else if (state.filter === 'production') {
    filtered = filtered.filter(c => c.pipeline_bucket === 'production');
  }
  
  return filtered;
}

// ═══════════════════════════════════════════════════════════════
// PIPELINE RENDER
// ═══════════════════════════════════════════════════════════════

function renderPipeline() {
  const all = filterCampaigns(state.campaigns);
  
  const byBucket = {
    design: all.filter(c => c.pipeline_bucket === 'design'),
    assign: all.filter(c => c.pipeline_bucket === 'assign'),
    production: all.filter(c => c.pipeline_bucket === 'production'),
    completed: all.filter(c => c.pipeline_bucket === 'completed' || c.pipeline_bucket === 'delivery')
  };
  
  const columns = [
    { key: 'design', icon: '🎨', label: 'Design', items: byBucket.design },
    { key: 'assign', icon: '🎯', label: 'Assign', items: byBucket.assign },
    { key: 'production', icon: '🔧', label: 'Production', items: byBucket.production },
    { key: 'completed', icon: '✅', label: 'Completed', items: byBucket.completed, collapsible: true }
  ];
  
  document.getElementById('pipeline').innerHTML = columns.map(col => `
    <div class="column ${col.key} ${col.collapsible && !state.completedExpanded ? 'collapsed' : ''}" 
         ${col.collapsible ? 'onclick="toggleCompletedColumn(event)"' : ''}>
      <div class="column-head">
        <div class="column-title">${col.icon} ${col.label}</div>
        <div class="column-count">${col.items.length}</div>
      </div>
      <div class="column-body">
        ${col.items.length ? col.items.map(c => renderCard(c)).join('') : `
          <div class="empty-state">
            <div class="empty-state-icon">${col.icon}</div>
            <div>No campaigns here</div>
          </div>
        `}
      </div>
    </div>
  `).join('');
}

function toggleCompletedColumn(e) {
  if (!e.target.closest('.column.collapsed')) return;
  e.stopPropagation();
  state.completedExpanded = !state.completedExpanded;
  renderPipeline();
}

function renderCard(c) {
  const operators = c.operators || [];
  const uniqueOps = [...new Map(operators.map(o => [o.id, o])).values()];
  
  return `
    <div class="card ${c.is_urgent ? 'urgent' : ''} ${c.is_stalled ? 'stalled' : ''}" 
         onclick="openSidePanel('${c.campaign_id}')">
      <div class="card-title">${escapeHtml(c.campaign_name || 'Untitled')}</div>
      <div class="card-meta">
        ${c.client_name ? `<span>👤 <strong>${escapeHtml(c.client_name)}</strong></span>` : ''}
        ${c.total_designs ? `<span>🎨 ${c.total_designs} design${c.total_designs > 1 ? 's' : ''}</span>` : ''}
        ${c.total_qty ? `<span>📦 ${c.total_qty.toLocaleString('en-IN')} units</span>` : ''}
      </div>
      <div class="card-stats">
        ${c.designs_with_files > 0 || c.total_designs > 0 ? `
          <span class="stat">📂 <strong>${c.designs_with_files || 0}/${c.total_designs || 0}</strong></span>
        ` : ''}
        ${c.total_assignments > 0 ? `
          <span class="stat">🎯 <strong>${c.completed_assignments || 0}/${c.total_assignments}</strong></span>
        ` : ''}
        ${c.progress_pct > 0 ? `
          <span class="stat">📊 <strong>${c.progress_pct}%</strong></span>
        ` : ''}
      </div>
      ${c.progress_pct > 0 ? `
        <div class="card-progress">
          <div class="card-progress-fill ${c.progress_pct >= 100 ? 'complete' : ''}" 
               style="width:${Math.min(c.progress_pct, 100)}%"></div>
        </div>
      ` : ''}
      <div class="card-footer">
        <span class="card-days">⏱ ${c.days_in_stage || 0}d in stage</span>
        ${uniqueOps.length ? `
          <div class="card-operators">
            ${uniqueOps.slice(0, 3).map(op => `<div class="op-bubble" title="${escapeHtml(op.name)}">${getInitials(op.name)}</div>`).join('')}
            ${uniqueOps.length > 3 ? `<div class="op-bubble" style="background:var(--rule);color:var(--ink-700)">+${uniqueOps.length - 3}</div>` : ''}
          </div>
        ` : ''}
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════
// SIDE PANEL
// ═══════════════════════════════════════════════════════════════

async function openSidePanel(campaignId) {
  const campaign = state.campaigns.find(c => c.campaign_id === campaignId);
  if (!campaign) return;
  
  state.currentDetail = campaign;
  
  // Show panel immediately with skeleton
  const panel = document.getElementById('sidePanel');
  panel.innerHTML = `
    <div class="sp-head">
      <button class="sp-back" onclick="closeSidePanel()">← Close</button>
      <div class="sp-title">${escapeHtml(campaign.campaign_name)}</div>
      <div class="sp-subtitle">${escapeHtml(campaign.client_name || '—')}</div>
    </div>
    <div class="sp-status-bar">
      <span class="sp-status-badge ${campaign.pipeline_bucket}">${campaign.status.replace(/_/g, ' ')}</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim)">
        ${campaign.days_in_stage} days in stage · ${campaign.days_total} days total
      </span>
    </div>
    <div class="sp-body">
      <div class="empty-state"><div class="spin" style="border-color:var(--gold);border-top-color:transparent"></div></div>
    </div>
  `;
  document.getElementById('sidePanelBg').classList.add('open');
  panel.classList.add('open');
  
  // Load detail data
  try {
    const designs = await api(`/rest/v1/trial_campaign_designs?campaign_id=eq.${campaignId}&select=*`);
    const assignments = await api(`/rest/v1/trial_campaign_assignments?campaign_id=eq.${campaignId}&select=*,member:assigned_to(id,name,role)`);
    
    renderSidePanelDetail(campaign, designs || [], assignments || []);
  } catch (e) {
    panel.querySelector('.sp-body').innerHTML = `
      <div class="callout error"><span>❌</span><div>${escapeHtml(e.message)}</div></div>
    `;
  }
}

function renderSidePanelDetail(c, designs, assignments) {
  const panel = document.getElementById('sidePanel');
  
  panel.innerHTML = `
    <div class="sp-head">
      <button class="sp-back" onclick="closeSidePanel()">← Close</button>
      <div class="sp-title">${escapeHtml(c.campaign_name)}</div>
      <div class="sp-subtitle">${escapeHtml(c.client_name || '—')} ${c.start_date ? '· Started ' + c.start_date : ''}</div>
    </div>
    
    <div class="sp-status-bar">
      <span class="sp-status-badge ${c.pipeline_bucket}">${c.status.replace(/_/g, ' ')}</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim)">
        ${c.days_in_stage}d in stage · ${c.days_total}d total
      </span>
    </div>
    
    <div class="sp-body">
      
      <div class="sp-section">
        <div class="sp-section-title">Overview</div>
        <div class="sp-stat-grid">
          <div class="sp-stat">
            <div class="sp-stat-label">📦 Total Units</div>
            <div class="sp-stat-value">${(c.total_qty || 0).toLocaleString('en-IN')}</div>
          </div>
          <div class="sp-stat">
            <div class="sp-stat-label">✅ Done</div>
            <div class="sp-stat-value">${(c.qty_done || 0).toLocaleString('en-IN')}</div>
          </div>
          <div class="sp-stat">
            <div class="sp-stat-label">📊 Progress</div>
            <div class="sp-stat-value">${c.progress_pct || 0}%</div>
          </div>
          <div class="sp-stat">
            <div class="sp-stat-label">⏳ Outstanding</div>
            <div class="sp-stat-value">${Math.max(0, (c.total_qty || 0) - (c.qty_done || 0)).toLocaleString('en-IN')}</div>
          </div>
        </div>
      </div>
      
      <div class="sp-section">
        <div class="sp-section-title">Designs <span class="count">${designs.length}</span></div>
        ${designs.length ? designs.map(d => {
          const hasFile = !!(d.drive_url || d.design_url);
          const designAssignments = assignments.filter(a => a.design_id === d.id);
          const totalAssignedQty = designAssignments.reduce((s,a)=>s+(a.quantity_assigned||0),0);
          const totalDoneQty = designAssignments.reduce((s,a)=>s+(a.quantity_done||0),0);
          const pct = totalAssignedQty > 0 ? Math.round((totalDoneQty/totalAssignedQty)*100) : 0;
          
          return `
            <div class="sp-design-row ${pct >= 100 ? 'complete' : ''}">
              <div class="sp-design-name">${escapeHtml(d.design_name || 'Unnamed')}</div>
              <div class="sp-design-meta">
                ${d.location_name ? `<strong>📍</strong> ${escapeHtml(d.location_name)} ` : ''}
                <strong>📦</strong> ${(d.quantity || 0).toLocaleString('en-IN')} units
                ${hasFile ? ` · <strong>${d.drive_url ? '📂 Drive' : '📄 File'}</strong>` : ' · <strong style="color:var(--warn)">⚠️ No file</strong>'}
              </div>
              ${totalAssignedQty > 0 ? `
                <div style="display:flex;justify-content:space-between;font-size:10.5px;margin-bottom:4px">
                  <span><strong>${totalDoneQty}/${totalAssignedQty}</strong> units · ${designAssignments.length} stage(s)</span>
                  <span style="font-weight:700;color:var(--gold-deep)">${pct}%</span>
                </div>
                <div class="sp-design-progress">
                  <div class="sp-design-progress-fill" style="width:${Math.min(pct, 100)}%"></div>
                </div>
              ` : '<div style="font-size:11px;color:var(--text-dim);margin-top:4px">Not assigned yet</div>'}
            </div>
          `;
        }).join('') : '<div class="empty-state">No designs added</div>'}
      </div>
      
      <div class="sp-section">
        <div class="sp-section-title">Team <span class="count">${assignments.length}</span></div>
        ${assignments.length ? assignments.map(a => {
          const memberName = a.member ? a.member.name : 'Unassigned';
          const stage = (a.stage || '').replace(/_/g, ' ');
          return `
            <div class="sp-design-row" style="background:#fff">
              <div style="display:flex;align-items:center;justify-content:space-between">
                <div>
                  <div class="sp-design-name">${escapeHtml(memberName)}</div>
                  <div class="sp-design-meta" style="text-transform:capitalize">${escapeHtml(stage)} · ${a.quantity_done || 0}/${a.quantity_assigned || 0} done</div>
                </div>
                <div style="text-align:right">
                  <span class="sp-status-badge ${a.status === 'completed' ? 'completed' : 'production'}" style="font-size:8.5px">${a.status}</span>
                </div>
              </div>
            </div>
          `;
        }).join('') : '<div class="empty-state">No team assigned</div>'}
      </div>
      
      ${c.is_stalled ? `
        <div class="callout warn">
          <span>⚠️</span>
          <div><strong>Stalled:</strong> No work logged in last 3 days. Consider reaching out to operators or reassigning.</div>
        </div>
      ` : ''}
      
    </div>
    
    <div class="sp-actions">
      <a href="/assign-operators.html" class="btn btn-gold">🎯 Manage Assignments</a>
      <a href="/printing-v2.html" class="btn btn-light">📊 View Production</a>
    </div>
  `;
}

function closeSidePanel() {
  document.getElementById('sidePanelBg').classList.remove('open');
  document.getElementById('sidePanel').classList.remove('open');
  state.currentDetail = null;
}

// ═══════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════

document.addEventListener('DOMContentLoaded', () => {
  autoLogin();
  document.getElementById('loginPhone').addEventListener('keypress', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('loginPhone').addEventListener('input', e => {
    e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 10);
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && state.currentDetail) closeSidePanel();
  });
});
</script>

</body>
</html>
