<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Delivery · Prajapati Advertising</title>
<meta name="theme-color" content="#0B1957">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:opsz,wght,ital@9..144,300..900,0..1&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{
  --navy:#0B1957;--navy-deep:#050B2E;
  --gold:#B89B4E;--gold-deep:#8B7430;--gold-soft:#F4E4B0;--gold-pale:#FBF6E4;
  --cream:#FAF8F3;--paper:#F7F4EC;--rule:#E5E0D2;
  --ink-950:#0F172A;--ink-700:#475569;--text-dim:#94A3B8;
  --success:#047857;--success-bg:#D1FAE5;
  --warn:#C2410C;--warn-bg:#FED7AA;
  --danger:#BE123C;--danger-bg:#FECACA;
  --info:#1E40AF;--info-bg:#DBEAFE;
  --purple:#7C3AED;--purple-bg:#EDE9FE;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--cream);color:var(--ink-950);font-size:14px;line-height:1.55}
button{font-family:inherit;cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none}
input,select,textarea{font-family:inherit;outline:none}

.topbar{background:var(--navy);color:#fff;padding:14px 28px;border-bottom:3px solid var(--gold);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:10px}
.tb-brand{display:flex;align-items:center;gap:12px}
.tb-logo{width:40px;height:40px;background:var(--gold);color:var(--navy);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px}
.tb-name{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.tb-tag{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--gold-soft);letter-spacing:0.16em;text-transform:uppercase;margin-top:2px}
.mode-badge{background:var(--gold);color:var(--navy);padding:2px 8px;border-radius:999px;font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase}

.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border-radius:8px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;border:none;transition:all 0.15s}
.btn-secondary{background:#fff;color:var(--navy);border:1px solid var(--rule)}
.btn-success{background:var(--success);color:#fff}
.btn-info{background:var(--info);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn.sm{padding:6px 10px;font-size:11px}
.btn:disabled{opacity:0.5;cursor:not-allowed}

.tb-user{display:flex;align-items:center;gap:10px;padding:5px 14px 5px 5px;background:rgba(255,255,255,0.08);border:1px solid rgba(212,180,95,0.3);border-radius:999px}
.tb-ava{width:30px;height:30px;border-radius:50%;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;font-style:italic;font-weight:700;font-size:14px}
.tb-info .name{font-size:12px;font-weight:700;line-height:1.1}
.tb-info .role{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--gold-soft);letter-spacing:0.14em;text-transform:uppercase}

.main{max-width:1440px;margin:0 auto;padding:24px 28px 60px}

.page-head{margin-bottom:20px}
.page-title{font-family:'Fraunces',serif;font-size:32px;font-weight:500;color:var(--navy);letter-spacing:-0.02em}
.page-title em{color:var(--gold);font-style:italic}
.page-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:0.14em;text-transform:uppercase;margin-top:6px}

.tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:2px solid var(--rule);overflow-x:auto}
.tab{padding:12px 18px;background:none;border:none;color:var(--text-dim);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;display:inline-flex;align-items:center;gap:8px;white-space:nowrap;transition:all 0.15s}
.tab:hover{color:var(--navy)}
.tab.active{color:var(--navy);border-bottom-color:var(--gold)}
.tab-count{background:var(--paper);color:var(--ink-700);padding:2px 8px;border-radius:999px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700}
.tab.active .tab-count{background:var(--gold);color:var(--navy)}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:14px;margin-bottom:22px}
.stat{background:#fff;border:1px solid var(--rule);border-radius:12px;padding:18px}
.stat.highlight{background:linear-gradient(135deg, var(--gold-pale), #fff);border-color:var(--gold)}
.stat.success{background:linear-gradient(135deg, var(--success-bg), #fff);border-color:var(--success)}
.stat.warn{background:linear-gradient(135deg, var(--warn-bg), #fff);border-color:var(--warn)}
.stat.info{background:linear-gradient(135deg, var(--info-bg), #fff);border-color:var(--info)}
.stat-label{font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:700;color:var(--gold-deep);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:8px}
.stat-value{font-family:'Fraunces',serif;font-size:32px;font-weight:600;color:var(--navy);line-height:1}
.stat-meta{font-size:11.5px;color:var(--text-dim);margin-top:6px}

.section{background:#fff;border:1px solid var(--rule);border-radius:12px;margin-bottom:18px;overflow:hidden}
.section-head{padding:14px 20px;background:linear-gradient(180deg, var(--paper), #fff);border-bottom:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.section-title{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--navy)}
.section-title em{color:var(--gold);font-style:italic}
.section-body{padding:18px 20px}

.job-card{background:#fff;border:1.5px solid var(--rule);border-radius:10px;padding:14px 16px;margin-bottom:10px;transition:all 0.15s}
.job-card:hover{border-color:var(--gold)}
.job-card.urgent{border-left:4px solid var(--danger);background:linear-gradient(90deg, var(--danger-bg) 0%, #fff 15%)}
.job-card.completed{border-left:4px solid var(--success);opacity:0.85}
.job-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.job-title{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--navy);margin-bottom:3px}
.job-meta{display:flex;flex-wrap:wrap;gap:12px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);margin-bottom:6px}
.job-meta strong{color:var(--navy)}
.job-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.tag{display:inline-flex;padding:2px 8px;border-radius:999px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase}
.tag.urgent{background:var(--danger);color:#fff}
.tag.completed{background:var(--success);color:#fff}
.tag.qty{background:var(--purple-bg);color:var(--purple)}
.tag.location{background:var(--gold-pale);color:var(--gold-deep)}
.tag.outstanding{background:var(--warn-bg);color:var(--warn)}
.job-actions{display:flex;gap:6px;flex-wrap:wrap}
.progress-wrap{margin-top:8px;background:var(--paper);height:8px;border-radius:999px;overflow:hidden;border:1px solid var(--rule)}
.progress-fill{height:100%;background:var(--gold);transition:width 0.3s}
.progress-fill.complete{background:var(--success)}
.progress-text{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-700);margin-top:4px;font-weight:600}

.field{margin-bottom:14px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
@media(max-width:600px){.field-row{grid-template-columns:1fr}}
.label{display:block;font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:700;color:var(--navy);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px}
.label .req{color:var(--danger);margin-left:2px}
.label .hint{color:var(--text-dim);font-weight:400;text-transform:none;letter-spacing:0;font-size:10.5px;margin-left:6px}
.input,.textarea{padding:10px 12px;border:1px solid var(--rule);background:var(--cream);font-size:13px;color:var(--ink-950);border-radius:6px;outline:none;width:100%;font-family:inherit}
.input:focus,.textarea:focus{border-color:var(--gold);background:#fff}
.textarea{resize:vertical;min-height:60px}

.modal-bg{position:fixed;inset:0;background:rgba(11,25,87,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(4px)}
.modal{background:#fff;border-radius:12px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;border:1px solid var(--gold)}
.modal-head{padding:18px 22px;background:linear-gradient(180deg, var(--paper), #fff);border-bottom:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Fraunces',serif;font-size:18px;font-weight:600;color:var(--navy)}
.modal-close{width:30px;height:30px;border-radius:50%;background:var(--cream);color:var(--danger);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.modal-body{padding:18px 22px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--rule);display:flex;justify-content:flex-end;gap:8px;background:var(--paper)}

.vendor-card{display:flex;align-items:center;gap:12px;padding:14px 16px;background:#fff;border:1px solid var(--rule);border-radius:10px;margin-bottom:10px}
.vendor-avatar{width:42px;height:42px;border-radius:50%;background:var(--purple);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:600;font-style:italic;font-size:15px;flex-shrink:0}
.vendor-body{flex:1;min-width:0}
.vendor-name{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:2px}
.vendor-meta{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--text-dim)}
.vendor-meta strong{color:var(--gold-deep)}
.vendor-actions{display:flex;gap:6px}

.callout{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-radius:8px;margin-bottom:14px;font-size:12.5px}
.callout.info{background:var(--info-bg);color:var(--info)}
.callout.success{background:var(--success-bg);color:var(--success)}
.callout.warn{background:var(--warn-bg);color:var(--warn)}
.callout.error{background:var(--danger-bg);color:var(--danger)}

.filter-bar{background:#fff;border:1px solid var(--rule);border-radius:10px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-btn{padding:7px 14px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;background:var(--cream);border:1px solid var(--rule);color:var(--ink-700);cursor:pointer}
.filter-btn:hover{background:var(--paper)}
.filter-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.filter-bar input[type=date]{padding:7px 10px;border:1px solid var(--rule);border-radius:6px;background:var(--cream);font-size:12px}

.login-bg{position:fixed;inset:0;background:linear-gradient(135deg, var(--navy), var(--navy-deep));display:flex;align-items:center;justify-content:center;padding:20px;z-index:200}
.login-card{background:#fff;padding:36px 32px;border-radius:14px;max-width:400px;width:100%;border:1px solid var(--gold)}
.login-logo{width:64px;height:64px;background:var(--gold);color:var(--navy);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 18px}
.login-title{font-family:'Fraunces',serif;font-size:22px;font-weight:500;text-align:center;color:var(--navy);margin-bottom:6px}
.login-sub{font-family:'JetBrains Mono',monospace;font-size:9.5px;text-align:center;color:var(--text-dim);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:24px}
.login-input{width:100%;padding:12px 14px;border:1px solid var(--rule);font-family:inherit;font-size:14px;border-radius:8px;outline:none;margin-bottom:10px}
.login-input:focus{border-color:var(--gold)}
.login-btn{width:100%;padding:13px;background:var(--navy);color:#fff;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;border:none}
.login-err{color:var(--danger);font-size:12px;text-align:center;margin-top:10px;display:none}
.login-err.show{display:block}

.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:-2px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--text-dim);font-style:italic;font-size:13px}
.hidden{display:none !important}

@media(max-width:768px){
  .main{padding:16px}
  .topbar{padding:12px 16px}
  .page-title{font-size:24px}
  .stat-value{font-size:24px}
  .tab{padding:10px 12px;font-size:11.5px}
}
</style>
</head>
<body>

<div class="login-bg" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🚚</div>
    <div class="login-title">Delivery</div>
    <div class="login-sub">Operations · Vendors · Reports</div>
    <input id="loginPhone" class="login-input" type="tel" inputmode="numeric" placeholder="10-digit phone" maxlength="10">
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Access Delivery →</button>
    <div id="loginErr" class="login-err"></div>
  </div>
</div>

<div id="mainApp" class="hidden">

  <div class="topbar">
    <div class="tb-brand">
      <div class="tb-logo">🚚</div>
      <div>
        <div class="tb-name">Delivery <span class="mode-badge" id="modeBadge">…</span></div>
        <div class="tb-tag">Unified · One Page for All</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <a href="/hub.html" class="btn btn-secondary sm">← Hub</a>
      <div class="tb-user">
        <div class="tb-ava" id="tbAva">?</div>
        <div class="tb-info"><div class="name" id="tbName">…</div><div class="role" id="tbRole">…</div></div>
      </div>
      <button class="btn btn-secondary sm" onclick="doLogout()">⎋</button>
    </div>
  </div>

  <div class="main">
    
    <div class="page-head">
      <div class="page-title">Delivery <em id="pageMode">Workspace</em></div>
      <div class="page-sub" id="todayDate">…</div>
    </div>
    
    <div class="tabs" id="tabsBar">
      <button class="tab active" data-tab="my-work" onclick="switchTab('my-work')">
        📦 My Deliveries <span class="tab-count" id="cntMyWork">0</span>
      </button>
      <button class="tab manager-only hidden" data-tab="all-jobs" onclick="switchTab('all-jobs')">
        🚚 All Active <span class="tab-count" id="cntAllJobs">0</span>
      </button>
      <button class="tab manager-only hidden" data-tab="vendors" onclick="switchTab('vendors')">
        🏢 Vendors <span class="tab-count" id="cntVendors">0</span>
      </button>
      <button class="tab manager-only hidden" data-tab="reports" onclick="switchTab('reports')">
        📊 Reports
      </button>
    </div>
    
    <div class="tab-content" id="tab-my-work">
      <div id="myWorkArea"><div class="empty">Loading…</div></div>
    </div>
    
    <div class="tab-content hidden" id="tab-all-jobs">
      <div id="allJobsArea"><div class="empty">Loading…</div></div>
    </div>
    
    <div class="tab-content hidden" id="tab-vendors">
      <div class="section">
        <div class="section-head">
          <div class="section-title">🏢 Delivery <em>Vendors</em></div>
          <button class="btn btn-success sm" onclick="openVendorModal()">+ Add Vendor</button>
        </div>
        <div class="section-body" id="vendorsArea">
          <div class="empty">Loading…</div>
        </div>
      </div>
    </div>
    
    <div class="tab-content hidden" id="tab-reports">
      <div class="filter-bar">
        <span style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--gold-deep);letter-spacing:0.14em;text-transform:uppercase">Period:</span>
        <button class="filter-btn active" data-period="today" onclick="setPeriod('today')">Today</button>
        <button class="filter-btn" data-period="yesterday" onclick="setPeriod('yesterday')">Yesterday</button>
        <button class="filter-btn" data-period="7days" onclick="setPeriod('7days')">7 Days</button>
        <button class="filter-btn" data-period="30days" onclick="setPeriod('30days')">30 Days</button>
        <button class="filter-btn" data-period="month" onclick="setPeriod('month')">This Month</button>
        <button class="filter-btn" data-period="custom" onclick="setPeriod('custom')">Custom</button>
        <span id="customInputs" class="hidden" style="display:inline-flex;gap:6px;margin-left:8px">
          <input type="date" id="customFrom" onchange="loadReports()">
          <input type="date" id="customTo" onchange="loadReports()">
        </span>
      </div>
      <div id="reportsArea"><div class="empty">Loading reports…</div></div>
    </div>
    
  </div>
</div>

<!-- LOG WORK MODAL -->
<div class="modal-bg hidden" id="logModal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="logModalTitle">✏️ Log Delivery</div>
      <button class="modal-close" onclick="closeLogModal()">×</button>
    </div>
    <div class="modal-body">
      <div id="logJobInfo" style="margin-bottom:14px"></div>
      <div class="field-row">
        <div class="field" style="margin-bottom:0">
          <label class="label">Date <span class="req">*</span></label>
          <input class="input" type="date" id="logDate">
        </div>
        <div class="field" style="margin-bottom:0">
          <label class="label">Qty Delivered <span class="req">*</span></label>
          <input class="input" type="number" id="logQty" min="0" placeholder="Units">
        </div>
      </div>
      <div class="field">
        <label class="label">Notes <span class="hint">Issues, observations</span></label>
        <textarea class="textarea" id="logNotes" placeholder="Optional notes..."></textarea>
      </div>
      <div class="field">
        <label class="label">📸 Proof Photo <span class="hint">Optional</span></label>
        <input class="input" type="file" id="logPhoto" accept="image/*" capture="environment">
      </div>
      <div id="logStatus"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeLogModal()">Cancel</button>
      <button class="btn btn-success" id="logSaveBtn" onclick="saveLog()">💾 Save Log</button>
    </div>
  </div>
</div>

<!-- VENDOR MODAL -->
<div class="modal-bg hidden" id="vendorModal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="vendorModalTitle">🏢 Add Vendor</div>
      <button class="modal-close" onclick="closeVendorModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field" style="margin-bottom:0">
          <label class="label">Vendor Name <span class="req">*</span></label>
          <input class="input" id="vName" placeholder="e.g. Falcon Travels">
        </div>
        <div class="field" style="margin-bottom:0">
          <label class="label">Type</label>
          <select class="input" id="vType">
            <option value="transport">Transport</option>
            <option value="courier">Courier</option>
            <option value="local">Local Delivery</option>
            <option value="own">Own Vehicle</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field" style="margin-bottom:0">
          <label class="label">Contact Person</label>
          <input class="input" id="vContact" placeholder="Person name">
        </div>
        <div class="field" style="margin-bottom:0">
          <label class="label">Phone <span class="req">*</span></label>
          <input class="input" type="tel" id="vPhone" inputmode="numeric" maxlength="10">
        </div>
      </div>
      <div class="field-row">
        <div class="field" style="margin-bottom:0">
          <label class="label">City</label>
          <input class="input" id="vCity" placeholder="e.g. Pune">
        </div>
        <div class="field" style="margin-bottom:0">
          <label class="label">Rate / Bundle (₹)</label>
          <input class="input" type="number" id="vRate" min="0" placeholder="e.g. 250">
        </div>
      </div>
      <div class="field">
        <label class="label">Notes</label>
        <textarea class="textarea" id="vNotes"></textarea>
      </div>
      <div id="vStatus"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeVendorModal()">Cancel</button>
      <button class="btn btn-success" id="vSaveBtn" onclick="saveVendor()">💾 Save</button>
    </div>
  </div>
</div>

<script src="/lib/access-guard.js"></script>
<script>
const SUPABASE_URL = 'https://fpbktcgtspqsqpaytslv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_JhObe56x_zETygpy6y8-DQ_qpQXIz_j';
const HEADERS = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' };

const state = {
  user: null,
  mode: 'operator',
  currentTab: 'my-work',
  myJobs: [],
  allJobs: [],
  vendors: [],
  currentJob: null,
  currentVendor: null,
  reportPeriod: 'today',
  reports: null
};

async function api(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + path, { ...opts, headers: { ...HEADERS, ...(opts.headers || {}) } });
  if (!res.ok) throw new Error('API ' + res.status + ': ' + await res.text());
  if (res.status === 204) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function cleanUuid(v) {
  return (v && typeof v === 'string' && v !== 'null' && v !== 'undefined' && v.length === 36) ? v : null;
}

async function saveLog() {
  const job = state.currentJob;
  if (!job) return;
  const date = document.getElementById('logDate').value;
  const qty = parseInt(document.getElementById('logQty').value) || 0;
  const notes = document.getElementById('logNotes').value.trim() || null;
  
  if (!date || qty <= 0) {
    document.getElementById('logStatus').innerHTML = '<div class="callout error"><span>⚠️</span><div>Date and Quantity required</div></div>';
    return;
  }
  
  const btn = document.getElementById('logSaveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Saving…';
  
  try {
    let proofUrl = null;
    const photoFile = document.getElementById('logPhoto').files[0];
    if (photoFile) {
      btn.innerHTML = '<span class="spin"></span> Uploading…';
      const safeName = photoFile.name.replace(/[^a-zA-Z0-9._-]/g, '_');
      const path = 'work-proofs/' + state.user.id + '/' + date + '_' + Date.now() + '_' + safeName;
      const ur = await fetch(SUPABASE_URL + '/storage/v1/object/campaign-designs/' + path, {
        method: 'POST',
        headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY, 'Content-Type': photoFile.type },
        body: photoFile
      });
      if (ur.ok) proofUrl = SUPABASE_URL + '/storage/v1/object/public/campaign-designs/' + path;
      btn.innerHTML = '<span class="spin"></span> Saving…';
    }
    
    const cId = cleanUuid(job.campaign_id);
    const dId = cleanUuid(job.design_id);
    const aId = cleanUuid(job.assignment_id);
    
    const payload = {
      operator_id: state.user.id,
      stage: 'delivery',
      log_date: date,
      qty_done: qty,
      notes,
      updated_at: new Date().toISOString()
    };
    if (cId) payload.campaign_id = cId;
    if (dId) payload.design_id = dId;
    if (aId) payload.assignment_id = aId;
    if (proofUrl) payload.proof_photo_url = proofUrl;
    
    const existing = aId ? await api('/rest/v1/trial_work_logs?operator_id=eq.' + state.user.id + '&assignment_id=eq.' + aId + '&log_date=eq.' + date + '&select=id') : null;
    
    if (existing && existing.length) {
      await api('/rest/v1/trial_work_logs?id=eq.' + existing[0].id, {
        method: 'PATCH',
        headers: { Prefer: 'return=minimal' },
        body: JSON.stringify(payload)
      });
    } else {
      await api('/rest/v1/trial_work_logs', {
        method: 'POST',
        headers: { Prefer: 'return=minimal' },
        body: JSON.stringify(payload)
      });
    }
    document.getElementById('logStatus').innerHTML = '<div class="callout success"><span>✅</span><div>Saved!</div></div>';
    setTimeout(() => { closeLogModal(); loadData(); }, 800);
  } catch (e) {
    document.getElementById('logStatus').innerHTML = '<div class="callout error"><span>❌</span><div>' + escapeHtml(e.message) + '</div></div>';
    btn.disabled = false;
    btn.innerHTML = '💾 Save Log';
  }
}

function getDateRange(period) {
  const today = new Date(); today.setHours(23,59,59,999);
  const start = new Date(); start.setHours(0,0,0,0);
  if (period === 'today') return { from: start, to: today };
  if (period === 'yesterday') {
    const y = new Date(start); y.setDate(y.getDate() - 1);
    const ye = new Date(y); ye.setHours(23,59,59,999);
    return { from: y, to: ye };
  }
  if (period === '7days') {
    const f = new Date(start); f.setDate(f.getDate() - 6);
    return { from: f, to: today };
  }
  if (period === '30days') {
    const f = new Date(start); f.setDate(f.getDate() - 29);
    return { from: f, to: today };
  }
  if (period === 'month') {
    const f = new Date(today.getFullYear(), today.getMonth(), 1);
    return { from: f, to: today };
  }
  if (period === 'custom') {
    const fs = document.getElementById('customFrom').value;
    const ts = document.getElementById('customTo').value;
    if (!fs || !ts) return null;
    const f = new Date(fs);
    const t = new Date(ts); t.setHours(23,59,59,999);
    return { from: f, to: t };
  }
  return null;
}

async function loadReports() {
  const range = getDateRange(state.reportPeriod);
  if (!range) {
    document.getElementById('reportsArea').innerHTML = '<div class="callout warn"><span>📅</span><div>Select both dates for custom range</div></div>';
    return;
  }
  document.getElementById('reportsArea').innerHTML = '<div class="empty"><span class="spin" style="border-color:var(--rule);border-top-color:var(--navy)"></span> Loading…</div>';
  try {
    const fromDate = range.from.toISOString().slice(0, 10);
    const toDate = range.to.toISOString().slice(0, 10);
    const logs = await api('/rest/v1/trial_work_logs?stage=eq.delivery&log_date=gte.' + fromDate + '&log_date=lte.' + toDate + '&select=*,trial_team_members(name,phone)&order=log_date.desc');
    state.reports = logs || [];
    renderReports();
  } catch (e) {
    document.getElementById('reportsArea').innerHTML = '<div class="callout error"><span>❌</span><div>' + escapeHtml(e.message) + '</div></div>';
  }
}

function renderReports() {
  const logs = state.reports || [];
  const totalQty = logs.reduce((s,l) => s + (l.qty_done || 0), 0);
  const entries = logs.length;
  const uniqueOps = new Set(logs.map(l => l.operator_id)).size;
  const uniqueDays = new Set(logs.map(l => l.log_date)).size;
  
  const statsHtml = `
    <div class="stats-grid">
      <div class="stat highlight">
        <div class="stat-label">📋 Total Entries</div>
        <div class="stat-value">${entries}</div>
        <div class="stat-meta">${uniqueOps} operators · ${uniqueDays} days</div>
      </div>
      <div class="stat success">
        <div class="stat-label">📦 Total Delivered</div>
        <div class="stat-value">${totalQty.toLocaleString('en-IN')}</div>
        <div class="stat-meta">units in period</div>
      </div>
      <div class="stat info">
        <div class="stat-label">📊 Daily Average</div>
        <div class="stat-value">${uniqueDays > 0 ? Math.round(totalQty / uniqueDays).toLocaleString('en-IN') : 0}</div>
        <div class="stat-meta">units per active day</div>
      </div>
      <div class="stat warn">
        <div class="stat-label">👥 Per Operator</div>
        <div class="stat-value">${uniqueOps > 0 ? Math.round(totalQty / uniqueOps).toLocaleString('en-IN') : 0}</div>
        <div class="stat-meta">avg units per operator</div>
      </div>
    </div>
  `;
  
  const byOp = {};
  logs.forEach(l => {
    const op = l.trial_team_members?.name || 'Unknown';
    if (!byOp[op]) byOp[op] = { entries: 0, qty: 0 };
    byOp[op].entries++;
    byOp[op].qty += l.qty_done || 0;
  });
  const breakdown = Object.entries(byOp).sort((a,b) => b[1].qty - a[1].qty);
  
  let opHtml = '';
  if (breakdown.length) {
    opHtml = '<div class="section"><div class="section-head"><div class="section-title">By <em>Operator</em></div></div><div class="section-body">';
    opHtml += breakdown.map(([name, d]) => `
      <div class="vendor-card">
        <div class="vendor-avatar" style="background:var(--gold);color:var(--navy)">${name.charAt(0).toUpperCase()}</div>
        <div class="vendor-body">
          <div class="vendor-name">${escapeHtml(name)}</div>
          <div class="vendor-meta">${d.entries} entries · <strong>${d.qty.toLocaleString('en-IN')} units delivered</strong></div>
        </div>
      </div>
    `).join('');
    opHtml += '</div></div>';
  }
  
  if (!entries) {
    document.getElementById('reportsArea').innerHTML = statsHtml + '<div class="empty">No delivery entries in this period</div>';
    return;
  }
  document.getElementById('reportsArea').innerHTML = statsHtml + opHtml;
}

document.addEventListener('DOMContentLoaded', () => {
  autoLogin();
  document.getElementById('loginPhone').addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('loginPhone').addEventListener('input', e => {
    e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 10);
  });
});
</script>
