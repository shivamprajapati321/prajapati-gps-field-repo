async function postAnnouncement(btn){
  const err=document.getElementById('anErr'); err.textContent='';
  const title=v('anTitle'), body=v('anBody');
  if(!title){ err.textContent='Title daalo'; return; }
  if(!body){ err.textContent='Message daalo'; return; }
  if(btn){btn.disabled=true;btn.textContent='Publishing...';}
  try {
    const row={ title:title, content:body, body:body, priority:document.getElementById('anPrio').value,
      pinned:document.getElementById('anPin').value==='true', active:true, published_at:new Date().toISOString(), created_by:USER.id };
    await api('/trial_hr_announcements',{method:'POST',headers:{'Prefer':'return=minimal'},body:JSON.stringify(row)});
    // WhatsApp broadcast if checked (silent, throttled)
    const waEl=document.getElementById('anWa');
    if(waEl&&waEl.checked){
      try {
        const emps=await api('/trial_team_members?select=name,phone&active=eq.true&phone=not.is.null');
        (emps||[]).forEach((m,i)=>{ if(m.phone) setTimeout(()=>notifyWhatsApp(m.phone,m.name,'hr_announcement',[m.name,title,body],'announcement'), i*300); });

      toast('Notice publish ho gaya ✓');

}
async function delAnnouncement(id){

}

// ══════════════════════════════════════════════
// 🎉 HOLIDAYS + 🎂 BIRTHDAYS
// ══════════════════════════════════════════════
async function renderHolidays(root){
  try {
    const admin=isAdmin();
    const yr=new Date().getFullYear();
    const hols = await api('/trial_hr_holidays?select=id,holiday_date,name,type,active&active=eq.true&holiday_date=gte.'+yr+'-01-01&order=holiday_date');
    // birthdays this month
    const emps = await api('/trial_team_members?select=name,date_of_birth&active=eq.true&date_of_birth=not.is.null');
    const curMonth=new Date().getMonth()+1;
    const bdays=emps.filter(e=>{ if(!e.date_of_birth)return false; return (new Date(e.date_of_birth).getMonth()+1)===curMonth; })
      .sort((a,b)=>new Date(a.date_of_birth).getDate()-new Date(b.date_of_birth).getDate());

    let h='<div class="sechead"><i class="ti ti-cake"></i>Birthdays — is mahine</div>';
    if(!bdays.length){ h+='<div class="card" style="text-align:center;color:var(--muted);padding:20px">Is mahine koi birthday nahi</div>'; }
    else { h+='<div class="card">'; bdays.forEach(e=>{
      const d=new Date(e.date_of_birth), day=d.getDate();
      h+='<div class="row-item"><div class="ava" style="background:var(--amber-bg);color:#8A5308">🎂</div>'+
        '<div style="flex:1"><div style="font-size:13px;font-weight:500">'+esc(e.name)+'</div>'+
        '<div style="font-size:11px;color:var(--muted)">'+day+' '+d.toLocaleDateString('en-IN',{month:'long'})+'</div></div></div>';
    }); h+='</div>'; }

    h+='<div class="sechead" style="margin-top:16px"><i class="ti ti-calendar-event"></i>Holidays '+yr+'</div>';
    if(admin){
      h+='<div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:8px">Holiday add karo</div>';
      h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">';
      h+='<input type="date" id="hlDate"><input type="text" id="hlName" placeholder="Holiday name">';
      h+='</div>';
      h+='<button class="btn-primary" style="width:100%;height:40px;font-weight:600;margin-top:10px" onclick="addHoliday(this)">Add Holiday</button>';
      h+='<div id="hlErr" style="color:var(--red);font-size:12px;text-align:center;margin-top:8px"></div></div>';
    }
    if(!hols.length){ h+='<div class="card" style="text-align:center;color:var(--muted);padding:20px">Koi holiday set nahi</div>'; }
    else { h+='<div class="card">'; hols.forEach(hh=>{
      const d=new Date(hh.holiday_date);
      const past=d<new Date(new Date().toDateString());
      h+='<div class="row-item" style="'+(past?'opacity:0.5':'')+'"><div style="flex:1"><div style="font-size:13px;font-weight:500">'+esc(hh.name)+'</div>'+
        '<div style="font-size:11px;color:var(--muted)">'+d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'})+'</div></div>'+
        (admin?'<span style="color:var(--red);cursor:pointer;font-size:12px" onclick="delHoliday(\''+hh.id+'\')">✕</span>':'')+'</div>';
    }); h+='</div>'; }
    root.innerHTML=h;
  } catch(e){ root.innerHTML='<div class="card" style="color:var(--red)">Load fail: '+esc(e.message)+'</div>'; }
}
async function addHoliday(btn){
  const err=document.getElementById('hlErr'); err.textContent='';
  const date=v('hlDate'), name=v('hlName');
  if(!date||!name){ err.textContent='Date aur name daalo'; return; }
  if(btn){btn.disabled=true;btn.textContent='...';}
  try { await api('/trial_hr_holidays',{method:'POST',headers:{'Prefer':'return=minimal'},body:JSON.stringify({holiday_date:date,name:name,type:'company',active:true})});
    toast('Holiday added ✓'); nav('holidays'); }
  catch(e){ err.textContent='Fail: '+e.message; if(btn){btn.disabled=false;btn.textContent='Add Holiday';} }
}
async function delHoliday(id){
  if(!confirm('Delete holiday?')) return;
  try { await api('/trial_hr_holidays?id=eq.'+id,{method:'PATCH',headers:{'Prefer':'return=minimal'},body:JSON.stringify({active:false})}); toast('Deleted'); nav('holidays'); }
  catch(e){ toast('Fail'); }
}

// ✅ TASKS
// ══════════════════════════════════════════════
async function renderTasks(root){
  try {
    const admin=isAdmin();
    // admin: all tasks; employee: assigned to me
    const filter = admin ? '' : '&assigned_to=eq.'+USER.id;
    const tasks = await api('/trial_hr_tasks?select=id,title,description,assigned_to,priority,due_date,status,category&order=created_at.desc&limit=50'+filter);
    let h='<div class="sechead"><i class="ti ti-checklist"></i>Tasks</div>';
    if(admin){
      h+='<div class="card"><div style="font-size:14px;font-weight:600;margin-bottom:10px">Naya task assign karo</div>';
      h+='<label style="font-size:12px;color:var(--muted)">Kiske liye</label><select id="tkMember" style="margin-bottom:10px"><option value="">— select —</option></select>';
      h+='<input type="text" id="tkTitle" placeholder="Task title" style="margin-bottom:10px">';
      h+='<textarea id="tkDesc" placeholder="Details (optional)" rows="2" style="width:100%;padding:11px;border:0.5px solid var(--bd2);border-radius:8px;font-family:inherit;font-size:14px;margin-bottom:10px;resize:vertical"></textarea>';
      h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">';
      h+='<div><label style="font-size:12px;color:var(--muted)">Priority</label><select id="tkPrio" style="margin-bottom:10px"><option value="normal">Normal</option><option value="high">High</option><option value="urgent">Urgent</option></select></div>';
      h+='<div><label style="font-size:12px;color:var(--muted)">Due date</label><input type="date" id="tkDue" style="margin-bottom:10px"></div>';
      h+='</div>';
      h+='<button class="btn-primary" style="width:100%;height:44px;font-weight:600" onclick="assignTask(this)">Assign Task</button>';
      h+='<div id="tkErr" style="color:var(--red);font-size:12px;text-align:center;margin-top:8px"></div></div>';
    }
    h+='<div class="sechead" style="margin-top:16px"><i class="ti ti-list-check"></i>'+(admin?'Sab tasks':'Mere tasks')+'</div>';
    if(!tasks.length){ h+='<div class="card" style="text-align:center;color:var(--muted);padding:26px">Koi task nahi</div>'; }
    else {
      h+='<div class="card">';
      tasks.forEach(t=>{
        const st=t.status||'pending';
        const done=st==='completed'||st==='done';
        const pc=done?'pill-green':st==='in_progress'?'pill-blue':'pill-amber';
        const prio=t.priority||'normal';
        h+='<div class="row-item"><div style="flex:1"><div style="font-size:13px;font-weight:500'+(done?';text-decoration:line-through;color:var(--muted)':'')+'">'+esc(t.title)+'</div>'+
          '<div style="font-size:11px;color:var(--muted)">'+(t.due_date?'Due '+t.due_date:'')+(prio!=='normal'?' · '+prio:'')+'</div></div>';
        if(!admin && !done) h+='<button class="btn-sm btn-green" onclick="completeTask(\''+t.id+'\')">Done</button>';
        else h+='<span class="pill '+pc+'">'+esc(st)+'</span>';
        h+='</div>';
      });
      h+='</div>';
    }
    root.innerHTML=h;
    if(admin){
      api('/trial_team_members?select=id,name&active=eq.true&order=name').then(ms=>{
        const sel=document.getElementById('tkMember');
        if(sel&&ms) ms.forEach(m=>{ const o=document.createElement('option'); o.value=m.id; o.textContent=m.name; sel.appendChild(o); });
      }).catch(()=>{});
    }
  } catch(e){ root.innerHTML='<div class="card" style="color:var(--red)">Load fail: '+esc(e.message)+'</div>'; }
}
async function assignTask(btn){
  const err=document.getElementById('tkErr'); err.textContent='';
  const mem=document.getElementById('tkMember').value, title=v('tkTitle');
  if(!mem){ err.textContent='Member select karo'; return; }
  if(!title){ err.textContent='Title daalo'; return; }
  if(btn){btn.disabled=true;btn.textContent='Assigning...';}
  try {
    const row={ title:title, description:v('tkDesc'), assigned_to:mem, assigned_by:USER.id, assigned_at:new Date().toISOString(),
      priority:document.getElementById('tkPrio').value, due_date:v('tkDue'), status:'pending' };
    await api('/trial_hr_tasks',{method:'POST',headers:{'Prefer':'return=minimal'},body:JSON.stringify(row)});
    // WhatsApp notify to assignee (silent)
    try {
      const m = await api('/trial_team_members?select=name,phone&id=eq.'+mem);
      if(m&&m[0]&&m[0].phone) notifyWhatsApp(m[0].phone, m[0].name, 'hr_task_assigned', [m[0].name, title, v('tkDue')||'jaldi'], 'task');
    } catch(_){}
    toast('Task assign ho gaya ✓'); nav('tasks');
  } catch(e){ err.textContent='Fail: '+e.message; if(btn){btn.disabled=false;btn.textContent='Assign Task';} }
}
async function completeTask(id){
  try { await api('/trial_hr_tasks?id=eq.'+id,{method:'PATCH',headers:{'Prefer':'return=minimal'},body:JSON.stringify({status:'completed',completed_at:new Date().toISOString(),completed_by:USER.id})});
    toast('Task complete ✓'); nav('tasks'); }
  catch(e){ toast('Fail: '+e.message); }
}

  try {
    const admin=isAdmin();

    const filter = admin ? '' : '&member_id=eq.'+USER.id+'&visible_to_employee=eq.true';
    const docs = await api('/trial_hr_documents?select=id,member_id,document_type,document_name,document_url,uploaded_at,visible_to_employee&order=uploaded_at.desc&limit=60'+filter);
    let h='<div class="sechead"><i class="ti ti-files"></i>Documents</div>';

      h+='<div class="card"><div style="font-size:14px;font-weight:600;margin-bottom:10px">Document upload karo</div>';
      h+='<label style="font-size:12px;color:var(--muted)">Kiska document</label><select id="dcMember" style="margin-bottom:10px"><option value="">— select —</option></select>';

      h+='<label style="font-size:12px;color:var(--muted)">File</label><input type="file" id="dcFile" accept="image/*,application/pdf" onchange="onDocFile(this)" style="margin-bottom:6px">';
      h+='<div id="dcLbl" style="font-size:11px;color:var(--muted);margin-bottom:10px"></div>';
      h+='<label style="font-size:12px"><input type="checkbox" id="dcVisible" checked style="width:auto;margin-right:6px">Employee ko dikhe</label>';
      h+='<button class="btn-primary" style="width:100%;height:44px;font-weight:600;margin-top:10px" onclick="uploadDoc(this)">Upload Document</button>';
      h+='<div id="dcErr" style="color:var(--red);font-size:12px;text-align:center;margin-top:8px"></div></div>';
    }
    h+='<div class="sechead" style="margin-top:16px"><i class="ti ti-folder"></i>'+(admin?'Sab documents':'Mere documents')+'</div>';
    if(!docs.length){ h+='<div class="card" style="text-align:center;color:var(--muted);padding:26px">Koi document nahi</div>'; }
    else { h+='<div class="card">'; docs.forEach(d=>{
      h+='<div class="row-item"><div style="flex:1"><div style="font-size:13px;font-weight:500">'+esc(d.document_name)+'</div>'+
        '<div style="font-size:11px;color:var(--muted)">'+esc((d.document_type||'').replace(/_/g,' '))+' · '+fmtDate(d.uploaded_at)+'</div></div>'+
        '<span class="pill pill-blue" style="cursor:pointer" onclick="viewImg(\''+esc(d.document_url)+'\')">Open</span></div>';
    }); h+='</div>'; }
    root.innerHTML=h; DOC_UPLOAD_URL='';
    if(admin){
      api('/trial_team_members?select=id,name&active=eq.true&order=name').then(ms=>{
        const sel=document.getElementById('dcMember');
        if(sel&&ms) ms.forEach(m=>{ const o=document.createElement('option'); o.value=m.id; o.textContent=m.name; sel.appendChild(o); });
      }).catch(()=>{});
    }
  } catch(e){ root.innerHTML='<div class="card" style="color:var(--red)">Load fail: '+esc(e.message)+'</div>'; }
}
async function onDocFile(input){
  const f=input.files[0]; if(!f) return;
  const lbl=document.getElementById('dcLbl'); lbl.textContent='Uploading...';
  try { DOC_UPLOAD_URL=await uploadFile(f, USER.phone, 'doc'); lbl.innerHTML='<span style="color:var(--green)">File added ✓</span>'; }
  catch(e){ lbl.innerHTML='<span style="color:var(--red)">Upload fail</span>'; DOC_UPLOAD_URL=''; }
}
async function uploadDoc(btn){
  const err=document.getElementById('dcErr'); err.textContent='';
  const mem=document.getElementById('dcMember').value, name=v('dcName'), type=document.getElementById('dcType').value;
  if(!mem){ err.textContent='Member select karo'; return; }
  if(!name){ err.textContent='Document name daalo'; return; }
  if(!DOC_UPLOAD_URL){ err.textContent='File upload karo'; return; }
  if(btn){btn.disabled=true;btn.textContent='Saving...';}
  try {
    const row={ member_id:mem, document_type:type, document_name:name, document_url:DOC_UPLOAD_URL,
      visible_to_employee:document.getElementById('dcVisible').checked, uploaded_by:USER.id, uploaded_at:new Date().toISOString() };
    await api('/trial_hr_documents',{method:'POST',headers:{'Prefer':'return=minimal'},body:JSON.stringify(row)});
    toast('Document upload ho gaya ✓'); nav('documents');
  } catch(e){ err.textContent='Fail: '+e.message; if(btn){btn.disabled=false;btn.textContent='Upload Document';} }
}

// helper: format date nicely
function fmtDate(d){ if(!d)return ''; try{ return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); }catch(e){ return ''; } }



// ══════════════════════════════════════════════
// 📝 BULK FILL — sab employees ka salary/DOB ek saath
// ══════════════════════════════════════════════
let BULK_EMPS = [];
async function renderBulkFill(root){
  if(!isAdmin()){ root.innerHTML='<div class="card">Sirf admin</div>'; return; }
  try {
    const emps = await api('/trial_team_members?select=id,name,phone,designation,monthly_salary,basic_pay,petrol_rate_per_km,date_of_birth,joining_date,attendance_mode&active=eq.true&order=name');
    BULK_EMPS = emps;
    const filled = emps.filter(e=>e.monthly_salary>0).length;
    let h='<div class="sechead"><i class="ti ti-table"></i>Bulk Fill — Salary & Details</div>';
    h+='<div class="card" style="background:var(--s1);margin-bottom:12px">';
    h+='<div style="font-size:13px">Progress: <b class="c-teal">'+filled+'/'+emps.length+'</b> employees ka salary set</div>';
    h+='<div style="font-size:11px;color:var(--muted);margin-top:4px">Har row bharo, save dabao. Ek-ek ya sab ek saath.</div>';
    h+='</div>';
    h+='<input type="text" placeholder="Search name..." oninput="filterBulk(this.value)" style="margin-bottom:12px">';
    h+='<div id="bulkList">';
    emps.forEach((e,i)=>{
      h+='<div class="card bulk-row" data-s="'+esc(e.name.toLowerCase())+'" data-id="'+e.id+'" style="margin-bottom:10px">';
      h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
      h+='<div class="ava" style="width:32px;height:32px;font-size:12px">'+initials(e.name)+'</div>';
      h+='<div style="flex:1"><div style="font-size:13px;font-weight:600">'+esc(e.name)+'</div><div style="font-size:10px;color:var(--muted)">'+esc(e.phone)+'</div></div>';
      h+='<span class="bulk-status" style="font-size:11px"></span>';
      h+='</div>';
      h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">';
      h+='<input type="number" id="bSal_'+i+'" placeholder="Salary" value="'+(e.monthly_salary||'')+'" inputmode="numeric" style="font-size:12px;padding:8px">';
      h+='<input type="number" id="bBasic_'+i+'" placeholder="Basic" value="'+(e.basic_pay||'')+'" inputmode="numeric" style="font-size:12px;padding:8px">';
      h+='<input type="number" id="bPet_'+i+'" placeholder="₹/km" value="'+(e.petrol_rate_per_km||'')+'" inputmode="numeric" style="font-size:12px;padding:8px">';
      h+='</div>';
      h+='<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:6px;margin-top:6px">';
      h+='<input type="date" id="bDob_'+i+'" value="'+(e.date_of_birth||'')+'" title="DOB" style="font-size:12px;padding:8px">';
      h+='<select id="bMode_'+i+'" style="font-size:12px;padding:8px"><option value="office"'+(e.attendance_mode==='office'?' selected':'')+'>Office</option><option value="anywhere"'+(e.attendance_mode==='anywhere'?' selected':'')+'>Anywhere</option></select>';
      h+='<button class="btn-primary" style="padding:8px 14px;font-size:12px" onclick="saveBulkRow('+i+',this)">Save</button>';
      h+='</div>';
      h+='</div>';
    });
    h+='</div>';
    root.innerHTML=h;
  } catch(e){ root.innerHTML='<div class="card" style="color:var(--red)">Load fail: '+esc(e.message)+'</div>'; }
}
function filterBulk(q){
  q=q.toLowerCase();
  document.querySelectorAll('.bulk-row').forEach(r=>{ r.style.display=r.dataset.s.includes(q)?'':'none'; });
}
async function saveBulkRow(i, btn){
  const e=BULK_EMPS[i];
  const row=e.id;
  const st=btn.closest('.bulk-row').querySelector('.bulk-status');
  if(btn){btn.disabled=true;btn.textContent='...';}
  try {
    const upd={
      monthly_salary: numOrNull('bSal_'+i),
      basic_pay: numOrNull('bBasic_'+i),
      petrol_rate_per_km: numOrNull('bPet_'+i),
      date_of_birth: v('bDob_'+i)||null,
      attendance_mode: document.getElementById('bMode_'+i).value
    };
    await api('/trial_team_members?id=eq.'+row, {method:'PATCH',headers:{'Prefer':'return=minimal'},body:JSON.stringify(upd)});
    if(st){ st.textContent='✓ saved'; st.style.color='var(--green)'; }
    if(btn){btn.disabled=false;btn.textContent='Save';}
    // update local
    Object.assign(BULK_EMPS[i], upd);
  } catch(ex){
    if(st){ st.textContent='✗ fail'; st.style.color='var(--red)'; }
    if(btn){btn.disabled=false;btn.textContent='Save';}
  }
}


// ══════════ BOOT ══════════
(function boot(){
  const saved = localStorage.getItem('hr_user');
  if (saved) {
    try {
      USER = JSON.parse(saved);
      if (sessionValid()) { enterApp(); return; }
      localStorage.removeItem('hr_user'); USER = null;  // expired → phir se login
    } catch(e){}
  }
  document.getElementById('loginPhone').addEventListener('keydown',e=>{if(e.key==='Enter')sendOtp();});
  document.getElementById('loginOtp').addEventListener('keydown',e=>{if(e.key==='Enter')verifyOtp();});
  // auto-submit OTP jab 6 digit ho jaye
  document.getElementById('loginOtp').addEventListener('input',function(){
    if (this.value.replace(/\D/g,'').length === 6) verifyOtp();
  });
})();
</script>
