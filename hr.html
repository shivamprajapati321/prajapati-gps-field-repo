<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0E9F8E">
<link rel="manifest" href="/hr-manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PA HR">
<title>Prajapati HR</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --navy:#0B1957; --navy2:#12235f; --teal:#0E9F8E; --teal-d:#0B8375;
    --blue:#378ADD; --amber:#BA7517; --amber-bg:#FAEEDA;
    --green:#1D9E75; --green-bg:#E1F5EE; --red:#E24B4A; --red-bg:#FCEBEB;
    --ink:#141922; --muted:#6B7280; --sec:#3d4453;
    --bg:#F4F6FA; --card:#fff; --s2:#F7F9FC; --s1:#EEF2F8;
    --bd:#E4E9F0; --bd2:#D4DCE6; --acc-bg:#E8F0FB; --acc-bd:#BBD4F3; --acc:#2B6FC4;
    --radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;font-size:14px}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;font-size:14px}
  input,select{font-family:inherit;font-size:14px;width:100%;padding:11px;border:0.5px solid var(--bd2);border-radius:8px;background:#fff;outline:none}
  input:focus,select:focus{border-color:var(--acc)}
  .hidden{display:none!important}
  .muted{color:var(--muted)} .sec{color:var(--sec)}
  .pill{padding:3px 10px;border-radius:20px;font-size:11px;display:inline-block;font-weight:500}
  .c-amber{background:var(--amber-bg);color:#7a4d0e} .c-teal{background:var(--green-bg);color:#0B6E5B}
  .c-blue{background:var(--acc-bg);color:var(--acc)} .c-red{background:var(--red-bg);color:#A32D2D}
  .c-gray{background:var(--s1);color:var(--sec)}
  .spin{animation:sp 0.8s linear infinite;display:inline-block}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* ===== LOGIN ===== */
  #login{position:fixed;inset:0;background:linear-gradient(160deg,var(--navy),var(--navy2));display:flex;align-items:center;justify-content:center;padding:20px;z-index:100}
  .login-card{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .login-logo{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--teal),var(--teal-d));display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
  .login-logo i{font-size:28px;color:#fff}

  /* ===== APP SHELL ===== */
  #app{max-width:1200px;margin:0 auto;padding-bottom:70px}
  .topbar{background:var(--navy);color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
  .topbar-l{display:flex;align-items:center;gap:10px}
  .tb-logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--teal),var(--teal-d));display:flex;align-items:center;justify-content:center}
  .tb-ava{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
  .content{padding:16px}

  .card{background:var(--card);border:0.5px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:12px}
  .sechead{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;gap:8px}

  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(105px,1fr));gap:10px;margin-bottom:14px}
  .stat{background:var(--card);border:0.5px solid var(--bd);border-radius:12px;padding:13px}
  .stat .lbl{font-size:11px;color:var(--muted)}
  .stat .val{font-size:22px;font-weight:600;margin-top:2px}

  /* ===== BOTTOM NAV (mobile) ===== */
  .botnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid var(--bd);display:flex;justify-content:space-around;padding:7px 0 9px;z-index:40;max-width:1200px;margin:0 auto}
  .botnav button{background:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);font-size:10px;padding:2px 8px}
  .botnav button.on{color:var(--acc)}
  .botnav button i{font-size:20px}

  .row-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--bd)}
  .row-item:last-child{border-bottom:none}
  .ava{width:36px;height:36px;border-radius:50%;background:var(--acc-bg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--acc);flex-shrink:0}
  .btn-sm{height:30px;font-size:12px;padding:0 12px;background:var(--acc-bg);color:var(--acc)}
  .btn-primary{background:var(--teal);color:#fff}
  .sw{position:relative;display:inline-block;width:46px;height:26px;flex-shrink:0}
  .sw input{opacity:0;width:0;height:0}
  .sw-slider{position:absolute;cursor:pointer;inset:0;background:#cbd5e1;border-radius:26px;transition:.2s}
  .sw-slider:before{content:"";position:absolute;height:20px;width:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
  .sw input:checked+.sw-slider{background:var(--teal)}
  .sw input:checked+.sw-slider:before{transform:translateX(20px)}
  .btn-green{background:var(--green);color:#fff}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;z-index:200;opacity:0;transition:.3s;pointer-events:none;max-width:90%}
  .toast.show{opacity:1}
  /* pill color variants */
  .pill-green{background:var(--green-bg);color:#0F6E56} .pill-red{background:var(--red-bg);color:#A32D2D}
  .pill-amber{background:var(--amber-bg);color:#8A5308} .pill-blue{background:var(--acc-bg);color:var(--acc)}
  /* tabs */
  .tabBtn{flex:1;height:38px;border-radius:9px;background:var(--s1);color:var(--sec);font-size:13px;font-weight:500;border:0}
  .tabBtn.active{background:var(--teal);color:#fff}
  /* ghost buttons */
  .btn-ghost{background:var(--s1);color:var(--sec)}
  .btn-ghost-red{background:var(--red-bg);color:#A32D2D}
  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(11,25,87,.45);z-index:300;display:flex;align-items:flex-end;justify-content:center;padding:0}
  .modal{background:var(--card);border-radius:18px 18px 0 0;padding:20px;width:100%;max-width:480px;box-shadow:0 -6px 30px rgba(0,0,0,.2);animation:slideUp .22s ease}
  @keyframes slideUp{from{transform:translateY(40px);opacity:.4}to{transform:translateY(0);opacity:1}}
  @media(min-width:520px){.modal-bg{align-items:center}.modal{border-radius:18px}}
</style>
</head>
<body>

<!-- ══════════ LOGIN ══════════ -->
<div id="login">
  <div class="login-card">
    <div class="login-logo"><i class="ti ti-users-group"></i></div>
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:19px;font-weight:600;color:var(--navy)">Prajapati HR</div>
      <div style="font-size:12px;color:var(--muted)">Team attendance &amp; payroll</div>
    </div>

    <!-- STEP 1: phone -->
    <div id="loginStep1">
      <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:5px">WhatsApp number</label>
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <div style="padding:11px 12px;background:var(--s1);border-radius:8px;font-size:14px;color:var(--sec)">+91</div>
        <input id="loginPhone" type="tel" inputmode="numeric" maxlength="10" placeholder="10-digit number">
      </div>
      <button id="loginBtn" onclick="sendOtp()" style="width:100%;height:46px;background:var(--teal);color:#fff;font-weight:600">Send OTP on WhatsApp</button>
      <div id="loginErr" style="color:var(--red);font-size:12px;text-align:center;margin-top:10px"></div>
    </div>

    <!-- STEP 2: OTP -->
    <div id="loginStep2" class="hidden">
      <div style="font-size:13px;color:var(--sec);margin-bottom:10px" id="otpSentTo"></div>
      <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:5px">6-digit OTP</label>
      <input id="loginOtp" type="tel" inputmode="numeric" maxlength="6" placeholder="------" style="text-align:center;letter-spacing:8px;font-size:20px;margin-bottom:14px">
      <button id="verifyBtn" onclick="verifyOtp()" style="width:100%;height:46px;background:var(--teal);color:#fff;font-weight:600">Verify &amp; Login</button>
      <div style="display:flex;justify-content:space-between;margin-top:12px;font-size:12px">
        <span style="color:var(--acc);cursor:pointer" onclick="backToPhone()">&larr; Change number</span>
        <span id="resendBox" style="color:var(--muted);cursor:pointer"></span>
      </div>
      <div id="otpErr" style="color:var(--red);font-size:12px;text-align:center;margin-top:10px"></div>
    </div>

    <div style="text-align:center;margin-top:18px;font-size:11px;color:var(--muted)">Prajapati Advertising · internal use</div>
  </div>
</div>

<!-- ══════════ APP ══════════ -->
<div id="app" class="hidden">
  <div class="topbar">
    <div class="topbar-l">
      <div class="tb-logo"><i class="ti ti-users-group" style="font-size:18px;color:#fff"></i></div>
      <div>
        <div style="font-size:15px;font-weight:600">Prajapati HR</div>
        <div id="tbDate" style="font-size:11px;opacity:.7"></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div id="tbName" style="font-size:12px;text-align:right"></div>
      <div class="tb-ava" id="tbAva" onclick="toggleUserMenu(event)" style="cursor:pointer" title="Menu">?</div>
      <div id="userMenu" style="display:none;position:absolute;top:56px;right:14px;background:#fff;border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.18);overflow:hidden;z-index:60;min-width:190px">
        <div id="umName" style="padding:12px 16px 8px;font-size:13px;font-weight:600;color:var(--navy);border-bottom:1px solid var(--s1)"></div>
        <div onclick="nav('settings');closeUserMenu()" style="padding:13px 16px;font-size:13.5px;color:var(--sec);cursor:pointer;display:flex;align-items:center;gap:10px"><i class="ti ti-settings" style="font-size:17px"></i>Settings / Banking</div>
        <div onclick="logout()" style="padding:13px 16px;font-size:13.5px;color:var(--red);cursor:pointer;display:flex;align-items:center;gap:10px;border-top:1px solid var(--s1)"><i class="ti ti-logout" style="font-size:17px"></i>Logout</div>
      </div>
    </div>
  </div>

  <div class="content" id="viewRoot">
    <!-- views render here -->
  </div>

  <!-- bottom nav -->
  <div class="botnav" id="botnav">
    <button data-view="dashboard" class="on" onclick="nav('dashboard')"><i class="ti ti-layout-dashboard"></i>Home</button>
    <button data-view="attendance" onclick="nav('attendance')"><i class="ti ti-fingerprint"></i>Attend</button>
    <button data-view="expenses" onclick="nav('expenses')"><i class="ti ti-receipt"></i>Expense</button>
    <button data-view="approvals" onclick="nav('approvals')"><i class="ti ti-checklist"></i>Approve</button>
    <button data-view="employees" onclick="nav('employees')"><i class="ti ti-users"></i>Team</button>
  </div>
  <div id="modalRoot"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════ CONFIG ══════════
const SUPABASE_URL = 'https://fpbktcgtspqsqpaytslv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_JhObe56x_zETygpy6y8-DQ_qpQXIz_j';
const HEADERS = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' };
// supabase-js optional — app REST fetch use karta hai, CDN fail ho tab bhi chale
const db = (typeof supabase !== 'undefined') ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

let USER = null;   // logged in employee row

// ══════════ HELPERS ══════════
async function api(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1' + path, { ...opts, headers: { ...HEADERS, ...(opts.headers || {}) } });
  if (!res.ok) throw new Error('API ' + res.status + ': ' + await res.text());
  if (res.status === 204) return null;
  const t = await res.text();
  return t ? JSON.parse(t) : null;
}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmt(n){return Number(n||0).toLocaleString('en-IN');}
function inr(n){return '₹'+fmt(n);}
function initials(name){return (name||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();}
function today(){return new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Kolkata'});} // YYYY-MM-DD
function isSunday(){return new Date().toLocaleDateString('en-US',{weekday:'long',timeZone:'Asia/Kolkata'})==='Sunday';}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}

// role helpers
const ADMIN_ROLES = ['owner','admin','hr','operations_manager','ops_manager'];
function isAdmin(){ return ADMIN_ROLES.includes(String(USER.role||'').toLowerCase()) || USER.hr_role === true; }

// ══════════ FILE UPLOAD (Execution app jaisa — payment-receipts / team-docs) ══════════
// prefix: 'aadhaar' | 'pan' | 'upiqr' | 'receipt'  → path team-docs/{phone}/{prefix}_{ts}_{name}
async function uploadFile(file, phone, prefix){
  const safeName = (file.name||'file').replace(/[^a-zA-Z0-9._-]/g,'_').slice(-40);
  const path = 'team-docs/'+phone+'/'+prefix+'_'+Date.now()+'_'+safeName;
  const up = await fetch(SUPABASE_URL+'/storage/v1/object/payment-receipts/'+path, {
    method:'POST',
    headers:{ 'Authorization':'Bearer '+SUPABASE_KEY, 'apikey':SUPABASE_KEY, 'Content-Type': file.type||'application/octet-stream', 'x-upsert':'true' },
    body: file
  });
  if (!up.ok) throw new Error('Upload failed: '+up.status);
  return SUPABASE_URL+'/storage/v1/object/public/payment-receipts/'+path;
}

// ══════════ LOGIN — Wati OTP (GPS app jaisa, wati-send/wati-verify-otp) ══════════
const FN_URL = SUPABASE_URL + '/functions/v1';
let LOGIN_PHONE = '';

async function fn(name, body){
  const res = await fetch(FN_URL + '/' + name, {
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+SUPABASE_KEY, 'apikey':SUPABASE_KEY },
    body: JSON.stringify(body)
  });
  return res.json();
}

async function sendOtp(){
  const phone = document.getElementById('loginPhone').value.replace(/\D/g,'');
  const errEl = document.getElementById('loginErr');
  const btn = document.getElementById('loginBtn');
  errEl.textContent = '';
  if (phone.length !== 10 || !/^[6-9]/.test(phone)) { errEl.textContent = 'Sahi 10-digit WhatsApp number daalo'; return; }
  btn.innerHTML = '<i class="ti ti-loader-2 spin"></i>'; btn.disabled = true;
  try {
    const r = await fn('wati-send', { action:'send_otp', phone, purpose:'login' });
    if (!r.success) {
      errEl.textContent = r.error || 'OTP bhejne mein dikkat. Dobara try karo.';
      btn.innerHTML = 'Send OTP on WhatsApp'; btn.disabled = false; return;
    }
    LOGIN_PHONE = phone;
    document.getElementById('otpSentTo').innerHTML = 'OTP bheja gaya <b>'+(r.masked_phone||('+91 '+phone))+'</b> par WhatsApp pe';
    document.getElementById('loginStep1').classList.add('hidden');
    document.getElementById('loginStep2').classList.remove('hidden');
    document.getElementById('loginOtp').focus();
    startResendTimer();
  } catch(e) {
    errEl.textContent = 'Network issue. Dobara try karo.';
    btn.innerHTML = 'Send OTP on WhatsApp'; btn.disabled = false;
  }
}

async function verifyOtp(){
  const code = document.getElementById('loginOtp').value.replace(/\D/g,'');
  const errEl = document.getElementById('otpErr');
  const btn = document.getElementById('verifyBtn');
  errEl.textContent = '';
  if (code.length !== 6) { errEl.textContent = '6-digit OTP daalo'; return; }
  btn.innerHTML = '<i class="ti ti-loader-2 spin"></i>'; btn.disabled = true;
  try {
    const r = await fn('wati-verify-otp', { phone: LOGIN_PHONE, code });
    if (!r.success) {
      errEl.textContent = r.error || 'OTP galat hai';
      btn.innerHTML = 'Verify & Login'; btn.disabled = false; return;
    }
    // member aa gaya — par HR app ko full row chahiye (ot rate, hr_role, etc.)
    let member = r.member || {};
    try {
      const full = await api('/trial_team_members?select=*&phone=eq.'+LOGIN_PHONE+'&active=eq.true');
      if (full && full.length) member = full[0];
    } catch(e){}
    USER = member;
    USER._session = r.session_token;
    USER._session_exp = Date.now() + (r.expires_in||43200)*1000;
    localStorage.setItem('hr_user', JSON.stringify(USER));
    enterApp();
  } catch(e) {
    errEl.textContent = 'Network issue. Dobara try karo.';
    btn.innerHTML = 'Verify & Login'; btn.disabled = false;
  }
}

function backToPhone(){
  document.getElementById('loginStep2').classList.add('hidden');
  document.getElementById('loginStep1').classList.remove('hidden');
  document.getElementById('loginBtn').innerHTML = 'Send OTP on WhatsApp';
  document.getElementById('loginBtn').disabled = false;
  document.getElementById('loginOtp').value = '';
  document.getElementById('otpErr').textContent = '';
}

let resendTimer = null;
function startResendTimer(){
  let s = 30;
  const box = document.getElementById('resendBox');
  clearInterval(resendTimer);
  box.style.cursor = 'default'; box.onclick = null;
  resendTimer = setInterval(()=>{
    s--;
    if (s <= 0) {
      clearInterval(resendTimer);
      box.textContent = 'Resend OTP';
      box.style.color = 'var(--acc)'; box.style.cursor = 'pointer';
      box.onclick = () => { backToPhone(); sendOtp(); };
    } else {
      box.textContent = 'Resend in '+s+'s';
      box.style.color = 'var(--muted)';
    }
  }, 1000);
}

function logout(){
  if (!confirm('Logout karna hai?')) return;
  localStorage.removeItem('hr_user');
  location.reload();
}
function toggleUserMenu(ev){
  if (ev) ev.stopPropagation();
  var m = document.getElementById('userMenu');
  if (!m) return;
  var open = m.style.display !== 'none';
  if (open) { m.style.display = 'none'; return; }
  var nm = document.getElementById('umName');
  if (nm) nm.textContent = (typeof USER !== 'undefined' && USER && USER.name) ? USER.name : '';
  m.style.display = 'block';
  setTimeout(function(){ document.addEventListener('click', closeUserMenuOnce); }, 0);
}
function closeUserMenu(){
  var m = document.getElementById('userMenu');
  if (m) m.style.display = 'none';
}
function closeUserMenuOnce(){
  closeUserMenu();
  document.removeEventListener('click', closeUserMenuOnce);
}

// session expiry check
function sessionValid(){
  if (!USER) return false;
  if (USER._session_exp && Date.now() > USER._session_exp) return false;
  return true;
}

function enterApp(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('tbAva').textContent = initials(USER.name);
  document.getElementById('tbName').textContent = USER.name;
  document.getElementById('tbDate').textContent = new Date().toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short',timeZone:'Asia/Kolkata'});
  // hide admin-only nav for plain employees
  if (!isAdmin()) {
    document.querySelectorAll('.botnav button[data-view="approvals"],.botnav button[data-view="employees"]').forEach(b=>b.classList.add('hidden'));
  }
  nav('dashboard');
  resumeLivePing();
}

// ══════════ NAV ══════════
let CURRENT = 'dashboard';
function nav(view){
  CURRENT = view;
  document.querySelectorAll('.botnav button').forEach(b=>b.classList.toggle('on', b.dataset.view===view));
  const root = document.getElementById('viewRoot');
  root.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)"><i class="ti ti-loader-2 spin" style="font-size:26px"></i></div>';
  if (view==='dashboard') renderDashboard(root);
  else if (view==='attendance') renderAttendance(root);
  else if (view==='expenses') renderExpenses(root);
  else if (view==='approvals') renderApprovals(root);
  else if (view==='leave') renderLeave(root);
  else if (view==='employees') renderEmployees(root);
  else if (view==='settings') renderSettings(root);
  else if (view==='petrol') renderPetrol(root);
  else if (view==='announcements') renderAnnouncements(root);
  else if (view==='holidays') renderHolidays(root);
  else if (view==='tasks') renderTasks(root);
  else if (view==='documents') renderDocuments(root);
  else if (view==='advance') renderAdvance(root);
  else if (view==='tracking') renderTracking(root);
  else if (view==='bulkfill') renderBulkFill(root);
}
function placeholder(title,icon,sub){
  return '<div class="card" style="text-align:center;padding:40px 20px">'+
    '<i class="ti ti-'+icon+'" style="font-size:42px;color:var(--acc)"></i>'+
    '<div style="font-size:16px;font-weight:600;margin-top:10px">'+title+'</div>'+
    '<div style="font-size:12px;color:var(--muted);margin-top:4px">'+sub+'</div></div>';
}

// ══════════ DASHBOARD ══════════
async function renderDashboard(root){
  try {
    const t = today();
    // employee sees own summary; admin sees company overview
    if (isAdmin()) {
      const [emps, att, leaves, reimb] = await Promise.all([
        api('/trial_team_members?select=id,name,active&active=eq.true'),

let OFFICES = [];
async function loadOffices(){
  if (OFFICES.length) return OFFICES;
  try { OFFICES = await api('/trial_hr_office_locations?select=*&active=eq.true') || []; } catch(e){ OFFICES = []; }
  return OFFICES;
}
function haversine(lat1,lng1,lat2,lng2){
  const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

let PUNCH_GPS = null;
function startPunch(kind){
  const msg = document.getElementById('punchMsg');
  const btn = document.getElementById('punchBtn');
  msg.style.color = 'var(--muted)';
  msg.innerHTML = '<i class="ti ti-loader-2 spin"></i> Location le rahe hain...';
  btn.disabled = true;
  if (!navigator.geolocation) { msg.style.color='var(--red)'; msg.textContent='GPS support nahi. Phone me location on karo.'; btn.disabled=false; return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      PUNCH_GPS = { lat: pos.coords.latitude, lng: pos.coords.longitude, acc: Math.round(pos.coords.accuracy) };
      // geofence check (office mode only)
      const mode = USER.attendance_mode || 'office';
      // Distance HAMESHA calculate karo — mode sirf ye decide karta hai ki
      // warning dikhani hai ya nahi. (Pehle 'anywhere' me inside:true hardcode tha,
      // isliye 1800m door wale ka bhi record "office ke andar" ban jata tha.)
      let geo = { inside: null, dist: null, office: null };
      if (OFFICES.length) {
        const off = OFFICES.find(o=>o.is_primary) || OFFICES[0];
        const d = haversine(PUNCH_GPS.lat, PUNCH_GPS.lng, Number(off.latitude), Number(off.longitude));
        geo = { inside: d <= (off.geofence_radius_meters||300), dist: d, office: off };
      }
      PUNCH_GPS.geo = geo;
      PUNCH_GPS.mode = mode;
      // ask for selfie
      const strict = (mode === 'office');
      msg.innerHTML = '<i class="ti ti-map-pin" style="font-size:13px;vertical-align:-2px;color:'+((geo.inside===false&&strict)?'var(--red)':'var(--green)')+'"></i> '+
        (geo.dist!=null
          ? (geo.inside ? 'Office ke andar ('+geo.dist+'m) ✓'
                        : (strict ? 'Office se '+geo.dist+'m door ⚠️' : 'Location mil gayi · office se '+geo.dist+'m'))
          : 'Location mil gayi (±'+PUNCH_GPS.acc+'m)') +
        ' — ab selfie lo';
      openSelfieCam(kind);
      btn.disabled = false;
    },
    err => {
      msg.style.color = 'var(--red)';
      msg.textContent = 'Location nahi mili. Phone settings me location ON karo, phir dobara.';
      btn.disabled = false;
    },
    { enableHighAccuracy:true, timeout:12000, maximumAge:0 }
  );
}

// ══════════ LIVE LOCATION PING ══════════
// Punch-in ke baad har 5 min GPS bhejta hai, punch-out pe band.
// Isse admin ko sach me "live" location dikhti hai (sirf punch-in ka point nahi).
let PING_TIMER = null;

function startLivePing(){
  stopLivePing();
  if (!navigator.geolocation) return;
  sendPing();                                  // turant ek
  PING_TIMER = setInterval(sendPing, 5*60*1000); // phir har 5 min
  try { localStorage.setItem('hr_ping_on','1'); } catch(e){}
}
function stopLivePing(){
  if (PING_TIMER) { clearInterval(PING_TIMER); PING_TIMER = null; }
  try { localStorage.removeItem('hr_ping_on'); } catch(e){}
}
async function sendPing(){
  if (!navigator.geolocation || !USER || !USER.id) return;
  navigator.geolocation.getCurrentPosition(async function(pos){
    try {
      let dist = null;
      if (OFFICES && OFFICES.length) {
        const off = OFFICES.find(o=>o.is_primary) || OFFICES[0];
        dist = haversine(pos.coords.latitude, pos.coords.longitude,
                         Number(off.latitude), Number(off.longitude));
      }
      let batt = null;
      try { if (navigator.getBattery) { const b = await navigator.getBattery(); batt = Math.round(b.level*100); } } catch(e){}
      await api('/trial_hr_location_pings', { method:'POST',
        headers:{'Prefer':'return=minimal'},
        body: JSON.stringify({
          member_id: USER.id, member_name: USER.name, member_phone: USER.phone,
          lat: pos.coords.latitude, lng: pos.coords.longitude,
          accuracy_meters: Math.round(pos.coords.accuracy),
          distance_from_office_m: dist, battery_pct: batt,
          attendance_date: today()
        })});
    } catch(e){ /* silent — ping fail se app na ruke */ }
  }, function(){}, { enableHighAccuracy:false, timeout:15000, maximumAge:120000 });
}
// app khulte hi: agar aaj punch-in hai aur punch-out nahi, ping chalu rakho
async function resumeLivePing(){
  try {
    if (!USER || !USER.id) return;
    const rows = await api('/trial_hr_attendance?select=check_in_time,check_out_time&member_id=eq.'+USER.id+'&attendance_date=eq.'+today());
    const r = rows && rows[0];
    if (r && r.check_in_time && !r.check_out_time) startLivePing();
  } catch(e){}
}

// ── IN-APP FRONT CAMERA (selfie) ──
// capture="user" ko kai Android phone ignore kar dete hain aur back camera khol dete hain.
// getUserMedia se facingMode:'user' force hota hai — hamesha front camera + live preview.
let CAM_STREAM = null;
function openSelfieCam(kind){
  const msg = document.getElementById('punchMsg');
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    // purana browser — file input fallback
    document.getElementById('selfieInput').click();
    return;
  }
  const html =
    '<div id="camWrap" style="position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column">' +
      '<video id="camVid" autoplay playsinline muted style="flex:1;width:100%;object-fit:cover;transform:scaleX(-1)"></video>' +
      '<div style="padding:18px 16px 26px;background:#000;text-align:center">' +
        '<div style="color:#fff;font-size:13px;margin-bottom:12px">Chehra frame me rakho, phir photo lo</div>' +
        '<div style="display:flex;gap:12px;align-items:center;justify-content:center">' +
          '<button onclick="closeSelfieCam()" style="flex:1;max-width:120px;height:46px;border-radius:10px;border:1px solid #444;background:#111;color:#fff;font-weight:600">Cancel</button>' +
          '<button onclick="snapSelfie(\''+kind+'\')" style="width:72px;height:72px;border-radius:50%;border:4px solid #fff;background:var(--teal);color:#fff;font-size:26px">\u25cf</button>' +
          '<button onclick="flipSelfieCam(\''+kind+'\')" style="flex:1;max-width:120px;height:46px;border-radius:10px;border:1px solid #444;background:#111;color:#fff;font-weight:600">Flip</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  const d = document.createElement('div');
  d.id = 'camRoot';
  d.innerHTML = html;
  document.body.appendChild(d);
  window.__camFacing = 'user';
  startCamStream('user');
}
function startCamStream(facing){
  const vid = document.getElementById('camVid');
  if (CAM_STREAM) { try { CAM_STREAM.getTracks().forEach(t=>t.stop()); } catch(e){} }
  navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: facing }, width:{ideal:1280}, height:{ideal:1280} }, audio:false })
    .then(function(s){
      CAM_STREAM = s;
      if (vid) { vid.srcObject = s; vid.style.transform = (facing==='user') ? 'scaleX(-1)' : 'none'; }
    })
    .catch(function(){
      closeSelfieCam();
      const msg = document.getElementById('punchMsg');
      if (msg) { msg.style.color='var(--amber)'; msg.textContent='Camera permission nahi mili — phone camera se lo.'; }
      document.getElementById('selfieInput').click();
    });
}
function flipSelfieCam(kind){
  window.__camFacing = (window.__camFacing === 'user') ? 'environment' : 'user';
  startCamStream(window.__camFacing);
}
function closeSelfieCam(){
  if (CAM_STREAM) { try { CAM_STREAM.getTracks().forEach(t=>t.stop()); } catch(e){} CAM_STREAM = null; }
  const r = document.getElementById('camRoot');
  if (r) r.remove();
}
function snapSelfie(kind){
  const vid = document.getElementById('camVid');
  if (!vid || !vid.videoWidth) return;
  const c = document.createElement('canvas');
  c.width = vid.videoWidth; c.height = vid.videoHeight;
  const ctx = c.getContext('2d');
  if (window.__camFacing === 'user') { ctx.translate(c.width,0); ctx.scale(-1,1); }
  ctx.drawImage(vid, 0, 0, c.width, c.height);
  closeSelfieCam();
  c.toBlob(function(blob){
    if (!blob) return;
    const file = new File([blob], 'selfie.jpg', { type:'image/jpeg' });
    onSelfie({ files:[file] }, kind);
  }, 'image/jpeg', 0.85);
}

async function onSelfie(input, kind){
  const file = input.files && input.files[0];
  const msg = document.getElementById('punchMsg');
  if (!file) return;
  if (!PUNCH_GPS) { msg.style.color='var(--red)'; msg.textContent='Pehle location lena zaroori. Dobara Punch dabao.'; return; }
  msg.style.color = 'var(--muted)';
  msg.innerHTML = '<i class="ti ti-loader-2 spin"></i> Selfie upload ho rahi hai...';
  try {
    // upload selfie to storage
    const path = 'hr-attendance/'+USER.id+'/'+today()+'-'+kind+'-'+Date.now()+'.jpg';
    const up = await fetch(SUPABASE_URL+'/storage/v1/object/fc-photos/'+path, {
      method:'POST',
      headers:{ 'Authorization':'Bearer '+SUPABASE_KEY, 'apikey':SUPABASE_KEY, 'Content-Type': file.type||'image/jpeg', 'x-upsert':'true' },
      body: file
    });
    let selfieUrl = null;
    if (up.ok) selfieUrl = SUPABASE_URL+'/storage/v1/object/public/fc-photos/'+path;
    await savePunch(kind, selfieUrl);
  } catch(e){
    // selfie upload fail — phir bhi punch save karo (GPS ke saath)
    await savePunch(kind, null);
  }
}

async function savePunch(kind, selfieUrl){
  const msg = document.getElementById('punchMsg');
  const g = PUNCH_GPS.geo || { inside:true, dist:null };
  const now = new Date().toISOString();
  try {
    if (kind === 'in') {
      // late? office work_start_time se compare (default 10:00)
      const startT = USER.work_start_time || '10:00:00';
      const nowHM = new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Kolkata'});
      const isLate = nowHM > startT.slice(0,5);
      const body = {
        member_id: USER.id, attendance_date: today(),
        check_in_time: now, check_in_selfie_url: selfieUrl,
        check_in_lat: PUNCH_GPS.lat, check_in_lng: PUNCH_GPS.lng,
        check_in_accuracy_meters: PUNCH_GPS.acc,
        check_in_location_name: (g.office && g.inside) ? g.office.name
          : (g.dist!=null ? 'Field (office se '+g.dist+'m)' : (USER.city||'Field')),
        check_in_office_id: g.office ? g.office.id : null,
        check_in_within_geofence: g.inside,
        check_in_device: 'pwa',
        is_late: isLate,
        status: 'present'
      };
      await api('/trial_hr_attendance', { method:'POST', headers:{'Prefer':'return=minimal'}, body: JSON.stringify(body) });
      startLivePing();   // punch-in ke baad live tracking chalu
    } else {
      // punch out — update today's row
      const att = await api('/trial_hr_attendance?select=id,check_in_time&member_id=eq.'+USER.id+'&attendance_date=eq.'+today());
      if (att && att.length) {
        const rec = att[0];
        const hours = ((new Date(now) - new Date(rec.check_in_time)) / 3600000);
        await api('/trial_hr_attendance?id=eq.'+rec.id, { method:'PATCH', headers:{'Prefer':'return=minimal'}, body: JSON.stringify({
          check_out_time: now, check_out_selfie_url: selfieUrl,
          check_out_lat: PUNCH_GPS.lat, check_out_lng: PUNCH_GPS.lng,
          check_out_accuracy_meters: PUNCH_GPS.acc,
          total_hours_worked: (isFinite(hours) && hours > 0) ? Math.round(hours*100)/100 : 0
        }) });
      }
      stopLivePing();   // punch-out — tracking band
    }
    // Sunday OT auto-entry
    if (kind==='in' && isSunday()) await createSundayOT();
    PUNCH_GPS = null;
    toast(kind==='in' ? 'Punch in ho gaya ✓' : 'Punch out ho gaya ✓');
    nav('attendance');  // refresh
  } catch(e){
    msg.style.color = 'var(--red)';
    msg.textContent = 'Save fail: '+e.message;
  }
}

// Sunday OT → reimbursement entry (pending approval)
async function createSundayOT(){
  try {

      expense_date: today(), work_date: today(),
      is_sunday_ot: true,
      description: 'Sunday OT ('+inr(ot)+') + Food ('+inr(food)+')',

async function renderAttCalendar(){
  const box = document.getElementById('calCard');
  if (!box) return;
  try {
    const now = new Date();
    const y = now.getFullYear(), m = now.getMonth();  // current month
    const first = new Date(y, m, 1);
    const days = new Date(y, m+1, 0).getDate();
    const startDay = first.getDay();
    const monthStr = new Date(y,m,1).toLocaleDateString('en-CA');
    const endStr = new Date(y,m,days).toLocaleDateString('en-CA');
    const att = await api('/trial_hr_attendance?select=attendance_date,status,is_late&member_id=eq.'+USER.id+'&attendance_date=gte.'+monthStr+'&attendance_date=lte.'+endStr) || [];
    const byDate = {}; att.forEach(a=>byDate[a.attendance_date]={status:a.status,late:a.is_late});

    let present=0, leave=0, late=0;
    let h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
      '<div style="font-size:13px;font-weight:600">'+now.toLocaleDateString('en-IN',{month:'long',year:'numeric'})+'</div></div>';
    h += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;font-size:10px;color:var(--muted);text-align:center;margin-bottom:5px"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div>';
    h += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">';
    for (let i=0;i<startDay;i++) h+='<div></div>';
    for (let d=1; d<=days; d++){
      const ds = new Date(y,m,d).toLocaleDateString('en-CA');
      const rec = byDate[ds];
      const isToday = ds===today();
      let bg='var(--s2)', col='var(--muted)';
      if (rec){
        if (rec.status==='leave'){ bg='#FAEEDA'; col='#854F0B'; leave++; }
        else if (rec.late){ bg='#FAEEDA'; col='#854F0B'; present++; late++; }
        else { bg='#E1F5EE'; col='#0F6E56'; present++; }
      }
      const style = isToday ? 'background:var(--acc);color:#fff;font-weight:600' : 'background:'+bg+';color:'+col;
      h += '<div style="aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;'+style+'">'+d+'</div>';
    }
    h += '</div>';
    h += '<div style="display:flex;gap:14px;margin-top:12px;font-size:11px;color:var(--sec);flex-wrap:wrap">'+
      '<span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:#9FE1CB;vertical-align:-1px"></span> Present '+present+'</span>'+
      '<span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:#FAC775;vertical-align:-1px"></span> Late '+late+'</span>'+
      '<span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:#F7C1C1;vertical-align:-1px"></span> Leave '+leave+'</span></div>';
    box.innerHTML = h;
  } catch(e){
    box.innerHTML = '<div style="color:var(--red);font-size:12px;padding:10px">Calendar load fail: '+esc(e.message)+'</div>';
  }
}

let LEAVE_TYPES = {};
let MEMBER_NAMES = {};
let APPROVAL_TAB = 'pending';

async function loadLeaveTypes(){
  if (Object.keys(LEAVE_TYPES).length) return;
  try {

async function nameFor(ids){
  const need = ids.filter(id=>id && !MEMBER_NAMES[id]);
  if (need.length){
    try {
      const rows = await api('/trial_team_members?select=id,name&id=in.('+need.join(',')+')') || [];
      rows.forEach(r=>MEMBER_NAMES[r.id]=r.name);

async function renderApprovals(root){
  if (!isAdmin()){ root.innerHTML = placeholder('Approvals','lock','Sirf HR/admin ke liye'); return; }
  root.innerHTML = '<div class="sechead"><i class="ti ti-checklist"></i>Approvals</div>'+

function setApprovalTab(t){ APPROVAL_TAB=t; renderApprovals(document.getElementById('viewRoot')||document.getElementById('app').querySelector('.view')); }

async function loadApprovalList(){
  const box = document.getElementById('apprList');
  if (!box) return;
  await loadLeaveTypes();
  try {
    let leaves=[], reimb=[];
    if (APPROVAL_TAB==='pending'){
      leaves = await api('/trial_hr_leaves?select=*&status=eq.pending&order=applied_at.desc') || [];
      reimb  = await api('/trial_hr_reimbursements?select=*&status=eq.pending&order=created_at.desc') || [];
    } else if (APPROVAL_TAB==='approved'){
      // approved but not yet paid (reimbursements only — cash pending)
      reimb  = await api('/trial_hr_reimbursements?select=*&status=eq.approved&order=approved_at.desc') || [];
    } else {
      leaves = await api('/trial_hr_leaves?select=*&status=in.(approved,rejected)&order=applied_at.desc&limit=30') || [];
      reimb  = await api('/trial_hr_reimbursements?select=*&status=in.(paid,rejected)&order=updated_at.desc&limit=30') || [];
    }

    // collect member names
    const ids = [...new Set([...leaves.map(l=>l.member_id), ...reimb.map(r=>r.member_id)])];
    await nameFor(ids);

    // merge + sort by date
    const items = [
      ...leaves.map(l=>({kind:'leave', data:l, when:l.applied_at||l.created_at})),
      ...reimb.map(r=>({kind:'reimb', data:r, when:r.created_at}))
    ].sort((a,b)=>new Date(b.when)-new Date(a.when));

    if (!items.length){
      box.innerHTML = '<div class="card" style="text-align:center;padding:34px;color:var(--muted)">'+
        '<i class="ti ti-circle-check" style="font-size:34px;color:var(--green);display:block;margin-bottom:8px"></i>'+
        (APPROVAL_TAB==='pending'?'Koi pending approval nahi 🎉':APPROVAL_TAB==='approved'?'Pay karne ke liye kuch nahi':'History khaali')+'</div>';
      return;
    }
    box.innerHTML = items.map(it=> it.kind==='leave' ? leaveCard(it.data) : reimbCard(it.data)).join('');
  } catch(e){
    box.innerHTML = '<div class="card" style="color:var(--red)">Load fail: '+esc(e.message)+'</div>';
  }
}

function leaveCard(l){
  const lt = LEAVE_TYPES[l.leave_type_id] || {name:'Leave',code:''};
  const nm = MEMBER_NAMES[l.member_id]||'—';
  const from = new Date(l.from_date).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
  const to = new Date(l.to_date).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
  const range = l.from_date===l.to_date ? from : from+' – '+to;
  const badge = l.status==='pending'?'':'<span class="pill '+(l.status==='approved'?'pill-green':'pill-red')+'">'+l.status+'</span>';
  return '<div class="card" style="padding:14px">'+
    '<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px">'+
      '<div><div style="font-weight:600;font-size:14px">'+esc(nm)+'</div>'+
      '<div style="font-size:12px;color:var(--acc);margin-top:1px"><i class="ti ti-calendar-event" style="font-size:12px;vertical-align:-1px"></i> '+lt.name+' · '+range+' · '+Number(l.total_days||1)+'d'+(l.is_half_day?' (half)':'')+'</div></div>'+
      '<span class="pill pill-amber">Leave</span></div>'+
    (l.reason?'<div style="font-size:12px;color:var(--sec);background:var(--s1);border-radius:7px;padding:8px 10px;margin-bottom:10px">'+esc(l.reason)+'</div>':'')+
    (l.status==='pending'
      ? '<div style="display:flex;gap:8px">'+
        '<button class="btn-green" style="flex:1;height:40px" onclick="actLeave(\''+l.id+'\',\'approved\')"><i class="ti ti-check"></i> Approve</button>'+
        '<button class="btn-ghost-red" style="flex:1;height:40px" onclick="actLeave(\''+l.id+'\',\'rejected\')"><i class="ti ti-x"></i> Reject</button></div>'
      : badge)+
    '</div>';
}

function reimbCard(r){
  const nm = MEMBER_NAMES[r.member_id]||'—';
  const isOT = r.is_sunday_ot;
  const dt = new Date(r.work_date||r.expense_date||r.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
  const label = isOT ? 'Sunday OT' : (r.reimbursement_type||r.category||'Expense');
  let amtLine = inr(r.amount);
  if (isOT) amtLine = 'OT '+inr(r.ot_amount||0)+' + Food '+inr(r.food_amount||0)+' = <b>'+inr(r.amount)+'</b>';
  const badge = '<span class="pill '+(r.status==='paid'?'pill-green':r.status==='rejected'?'pill-red':r.status==='approved'?'pill-blue':'pill-amber')+'">'+r.status+'</span>';

  let actions='';
  if (r.status==='pending'){
    actions = '<div style="display:flex;gap:8px">'+
      '<button class="btn-green" style="flex:1;height:40px" onclick="actReimb(\''+r.id+'\',\'approved\')"><i class="ti ti-check"></i> Approve</button>'+
      '<button class="btn-ghost-red" style="flex:1;height:40px" onclick="actReimb(\''+r.id+'\',\'rejected\')"><i class="ti ti-x"></i> Reject</button></div>';
  } else if (r.status==='approved'){
    actions = '<button class="btn-primary" style="width:100%;height:42px;background:var(--teal);color:#fff" onclick="openPay(\''+r.id+'\','+(r.amount||0)+',\''+esc(label)+'\')"><i class="ti ti-cash"></i> Pay Cash '+inr(r.amount)+'</button>';
  } else { actions = badge; }

  return '<div class="card" style="padding:14px">'+
    '<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px">'+
      '<div><div style="font-weight:600;font-size:14px">'+esc(nm)+'</div>'+
      '<div style="font-size:12px;color:'+(isOT?'#B45309':'var(--acc)')+';margin-top:1px"><i class="ti ti-'+(isOT?'briefcase':'receipt')+'" style="font-size:12px;vertical-align:-1px"></i> '+esc(label)+' · '+dt+'</div></div>'+
      '<span class="pill '+(isOT?'pill-amber':'pill-blue')+'">'+(isOT?'OT':'Expense')+'</span></div>'+
    '<div style="font-size:13px;color:var(--sec);margin-bottom:10px">'+amtLine+'</div>'+
    actions+'</div>';
}

function closePay(e){ if(e&&e.target&&!e.target.classList.contains('modal-bg')&&e.type==='click')return; document.getElementById('modalRoot').innerHTML=''; PAY_ID=null; }
async function onReceipt(input){
  const f=input.files&&input.files[0]; if(!f)return;
  document.getElementById('receiptLbl').textContent='Uploading...';
  try {
    const path='hr-receipts/'+PAY_ID+'-'+Date.now()+'.jpg';
    const up=await fetch(SUPABASE_URL+'/storage/v1/object/fc-photos/'+path,{method:'POST',headers:{'Authorization':'Bearer '+SUPABASE_KEY,'apikey':SUPABASE_KEY,'Content-Type':f.type||'image/jpeg','x-upsert':'true'},body:f});

}
async function confirmPay(amt){
  const btn=document.getElementById('payConfirmBtn'), msg=document.getElementById('payMsg');
  btn.disabled=true; btn.innerHTML='<i class="ti ti-loader-2 spin"></i>';
  try {
    const patch={ status:'paid', paid_by:USER.id, paid_at:new Date().toISOString(),
      payment_method:document.getElementById('payMethod').value };
    if(PAY_RECEIPT) patch.receipt_url=PAY_RECEIPT;
    await api('/trial_hr_reimbursements?id=eq.'+PAY_ID,{method:'PATCH',headers:{'Prefer':'return=minimal'},body:JSON.stringify(patch)});
    document.getElementById('modalRoot').innerHTML='';
    toast('Paid '+inr(amt)+' ✓');
    loadApprovalList();
  } catch(e){ msg.style.color='var(--red)'; msg.textContent='Fail: '+e.message; btn.disabled=false; btn.innerHTML='<i class="ti ti-check"></i> Mark Paid'; }
}

function lvRecalc(){
  const half = document.getElementById('lvHalf').checked;
  document.getElementById('lvHalfSession').classList.toggle('hidden', !half);
  const from = document.getElementById('lvFrom').value;
  const to = document.getElementById('lvTo').value;
  const daysEl = document.getElementById('lvDays');
  if (!from || !to){ daysEl.textContent=''; return; }
  if (half){ document.getElementById('lvTo').value = from; daysEl.textContent = '0.5 day'; return; }
  const d1 = new Date(from), d2 = new Date(to);
  if (d2 < d1){ daysEl.style.color='var(--red)'; daysEl.textContent='To date From se pehle nahi ho sakti'; return; }
  const days = Math.round((d2-d1)/86400000)+1;
  daysEl.style.color='var(--acc)';
  daysEl.textContent = days+' day'+(days>1?'s':'');
}

async function submitLeave(){
  const btn = document.getElementById('lvSubmit'), msg = document.getElementById('lvMsg');
  const typeId = document.getElementById('lvType').value;
  const from = document.getElementById('lvFrom').value;
  const to = document.getElementById('lvTo').value;
  const half = document.getElementById('lvHalf').checked;
  const reason = document.getElementById('lvReason').value.trim();
  msg.textContent='';
  if (!typeId){ msg.style.color='var(--red)'; msg.textContent='Leave type chuno'; return; }
  if (!from || !to){ msg.style.color='var(--red)'; msg.textContent='Dates daalo'; return; }
  if (new Date(to) < new Date(from)){ msg.style.color='var(--red)'; msg.textContent='To date galat hai'; return; }
  if (!reason){ msg.style.color='var(--red)'; msg.textContent='Reason likhna zaroori hai'; return; }

  const days = half ? 0.5 : Math.round((new Date(to)-new Date(from))/86400000)+1;
  btn.disabled=true; btn.innerHTML='<i class="ti ti-loader-2 spin"></i>';
  try {
    const body = {
      member_id: USER.id, leave_type_id: typeId,
      from_date: from, to_date: half ? from : to,
      total_days: days, reason,
      is_half_day: half,
      half_day_session: half ? document.getElementById('lvSession').value : null,
      status: 'pending', applied_at: new Date().toISOString()
    };
    await api('/trial_hr_leaves', {method:'POST',headers:{'Prefer':'return=minimal'},body:JSON.stringify(body)});
    toast('Leave request bhej diya ✓');
    // reset + reload
    document.getElementById('lvReason').value='';
    document.getElementById('lvHalf').checked=false;
    lvRecalc(); loadMyLeaves(); loadLeaveBalances();
  } catch(e){
    msg.style.color='var(--red)'; msg.textContent='Fail: '+e.message;
  }
  btn.disabled=false; btn.innerHTML='<i class="ti ti-send"></i> Submit Leave Request';
}

// ── PAYROLL CALCULATION ──
async function calcPayroll(){
  const e=window.__CUR_EMP;
  const yr=parseInt(v('payYear')||'0'), mo=parseInt(v('payMonth')||'0');
  const box=document.getElementById('payResult');
  if(!yr||!mo||mo<1||mo>12){ box.innerHTML='<div style="color:var(--red);font-size:12px">Sahi year/month daalo</div>'; return; }
  if(!e.monthly_salary||e.monthly_salary<=0){ box.innerHTML='<div class="pill pill-amber" style="display:block;padding:10px">Pehle Profile tab me Monthly Salary set karo</div>'; return; }
  box.innerHTML='<div style="text-align:center;padding:16px"><i class="ti ti-loader-2 spin"></i></div>';
  try {
    // attendance for the month
    const from = yr+'-'+String(mo).padStart(2,'0')+'-01';
    const toD = new Date(yr, mo, 0).getDate();
    const to = yr+'-'+String(mo).padStart(2,'0')+'-'+String(toD).padStart(2,'0');
    const att = await api('/trial_hr_attendance?select=status,is_late,attendance_date&member_id=eq.'+e.id+'&attendance_date=gte.'+from+'&attendance_date=lte.'+to);
    const leaves = await api('/trial_hr_leaves?select=total_days,status&member_id=eq.'+e.id+'&status=eq.approved&from_date=lte.'+to+'&to_date=gte.'+from);
    // Sunday OT reimbursements (helper/stitching — same-day paid, alag se)
    const sundayOT = await api('/trial_hr_reimbursements?select=ot_amount,food_amount,status&member_id=eq.'+e.id+'&is_sunday_ot=eq.true&work_date=gte.'+from+'&work_date=lte.'+to).catch(()=>[]);
    const present = att.filter(a=>a.status==='present').length;
    const leaveDays = leaves.reduce((s,l)=>s+(+l.total_days||0),0);
    // count Sundays in month — Sunday = weekly off, working days se hatao
    let sundays=0;
    for(let dd=1; dd<=toD; dd++){ if(new Date(yr,mo-1,dd).getDay()===0) sundays++; }
    const workingDays = toD - sundays; // Sunday chhutti — count nahi
    const perDay = e.monthly_salary / workingDays;
    const absent = Math.max(0, workingDays - present - leaveDays);
    const earned = Math.round(perDay * (present + leaveDays));
    const unpaidDeduction = Math.round(perDay * absent);
    const otTotal = (sundayOT||[]).reduce((s,r)=>s+(+r.ot_amount||0)+(+r.food_amount||0),0);

    // ── ADVANCE: is month ki planned installment nikalo ──
    const smon = yr+'-'+String(mo).padStart(2,'0');
    let advDue = 0, advList = [];
    try {
      const advs = await api('/prajapati_advances?select=id,amount,recovered_amount,balance_amount,monthly_deduction,recovery_mode,total_months,recovery_status,recovery_start_month&member_id=eq.'+e.id+'&recovery_status=in.(active,pending)&status=eq.paid');
      (advs||[]).forEach(function(a){
        const bal = Number(a.balance_amount||0);
        if (bal <= 0) return;
        if (a.recovery_start_month && smon < a.recovery_start_month) return;   // abhi shuru nahi hua
        let inst = 0;
        if (a.recovery_mode === 'months' && a.total_months) inst = Math.round(Number(a.amount||0) / a.total_months);
        else inst = Number(a.monthly_deduction||0);
        if (inst <= 0) return;
        inst = Math.min(inst, bal);   // aakhri kist balance se zyada na ho
        advDue += inst;
        advList.push({ id:a.id, inst:inst, bal:bal });
      });
    } catch(ex){ console.warn('advance fetch', ex); }

    window.__PAYCALC = { year:yr, month:mo, present, leaveDays, absent, workingDays, earned, unpaidDeduction, gross:e.monthly_salary, sundays, otTotal, advDue, advList, salaryMonth:smon };

    let h='<div class="card" style="background:var(--s1);margin-top:6px">';
    h+=payRow('Month', mo+'/'+yr);
    h+=payRow('Monthly salary', inr(e.monthly_salary));
    h+=payRow('Total days', toD);
    h+=payRow('Sundays (off)', sundays, 'var(--muted)');
    h+=payRow('Working days', workingDays);
    h+=payRow('Present days', present, 'var(--green)');
    h+=payRow('Approved leave', leaveDays);
    h+=payRow('Absent days', absent, absent>0?'var(--red)':null);
    h+='<div style="border-top:1px solid var(--bd);margin:8px 0"></div>';

    if(advDue>0){
      h+=payRow('Advance installment', '- '+inr(advDue), 'var(--red)');
      h+='<div style="display:flex;align-items:center;gap:8px;margin:4px 0 2px">'+
         '<span style="font-size:11px;color:var(--muted);flex:1">Advance kitna kaatna hai? (0 = is month skip)</span>'+
         '<input id="advEdit" type="number" value="'+advDue+'" oninput="reNet()" style="width:92px;height:34px;border:1px solid var(--bd);border-radius:8px;padding:0 8px;font-size:13px;text-align:right">'+
         '</div>';
    }
    h+='<div style="border-top:1px solid var(--bd);margin:8px 0"></div>';
    h+='<div style="display:flex;justify-content:space-between;font-weight:700;font-size:16px"><span>Net Salary</span><span style="color:var(--teal)" id="netSal">'+inr(Math.max(0, earned-advDue))+'</span></div>';
    if(otTotal>0){
      h+='<div style="border-top:1px solid var(--bd);margin:10px 0 6px"></div>';
      h+='<div style="font-size:11px;color:var(--muted);margin-bottom:4px">Sunday OT (helper/stitching — same-day cash, alag)</div>';
      h+=payRow('Sunday OT + food', inr(otTotal), 'var(--amber)');
    }
    h+='</div>';
    h+='<button class="btn-green" style="width:100%;height:44px;font-weight:600;margin-top:10px" onclick="savePayroll(this)">💾 Save Salary Record</button>';
    h+='<button class="btn-ghost" style="width:100%;height:42px;font-weight:600;margin-top:8px" onclick="downloadSlip()"><i class="ti ti-download" style="vertical-align:-2px"></i> Salary Slip (Print / PDF)</button>';
    h+='<div id="payErr" style="color:var(--red);font-size:12px;text-align:center;margin-top:8px"></div>';
    box.innerHTML=h;
  } catch(ex){ box.innerHTML='<div style="color:var(--red);font-size:12px">Calc fail: '+esc(ex.message)+'</div>'; }
}
function payRow(l,val,color){
  return '<div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0"><span style="color:var(--muted)">'+l+'</span><span'+(color?' style="color:'+color+';font-weight:600"':'')+'>'+val+'</span></div>';
}
// advance edit hone pe Net Salary live update
function reNet(){
  const c = window.__PAYCALC; if(!c) return;
  const el = document.getElementById('advEdit');
  const adv = el ? Math.max(0, Number(el.value)||0) : 0;
  c.advDeduct = adv;
  const n = document.getElementById('netSal');
  if(n) n.textContent = inr(Math.max(0, c.earned - adv));
}
async function savePayroll(btn){
  const e=window.__CUR_EMP, c=window.__PAYCALC;
  if(!c) return;
  const err=document.getElementById('payErr'); if(err)err.textContent='';
  btn=btn||(typeof event!=="undefined"&&event.target); if(btn){btn.disabled=true;btn.textContent='Saving...';}
  try {
    // check existing record for this month
    const exist = await api('/trial_hr_salary_records?select=id&member_id=eq.'+e.id+'&year=eq.'+c.year+'&month=eq.'+c.month);
    const row = {
      member_id:e.id, year:c.year, month:c.month,
      basic_pay: c.earned,
      unpaid_leave_deduction:c.unpaidDeduction,
      total_working_days:c.workingDays, present_days:c.present, absent_days:c.absent, leave_days:c.leaveDays,
      status:'draft', updated_at:new Date().toISOString()
    };
    if(exist&&exist.length){
      await api('/trial_hr_salary_records?id=eq.'+exist[0].id, {method:'PATCH',headers:{'Prefer':'return=minimal'},body:JSON.stringify(row)});
    } else {
      await api('/trial_hr_salary_records', {method:'POST',headers:{'Prefer':'return=minimal'},body:JSON.stringify(row)});
    }
    // ── ADVANCE recovery: installment ledger + recovered_amount update ──
    const advEl = document.getElementById('advEdit');
    const advTake = advEl ? Math.max(0, Number(advEl.value)||0) : (c.advDue||0);
    if (advTake > 0 && c.advList && c.advList.length) {
      let left = advTake;
      for (const a of c.advList) {
        if (left <= 0) break;
        const take = Math.min(a.inst, a.bal, left);
        if (take <= 0) continue;
        left -= take;
        try {
          await api('/prajapati_advance_installments', { method:'POST',
            headers:{'Prefer':'resolution=merge-duplicates,return=minimal'},
            body: JSON.stringify({ advance_id:a.id, member_id:e.id, member_phone:e.phone, member_name:e.name,
              salary_month:c.salaryMonth, planned_amount:a.inst, deducted_amount:take,
              status:'deducted', updated_at:new Date().toISOString() }) });
          const cur = await api('/prajapati_advances?select=amount,recovered_amount&id=eq.'+a.id);
          const rec = Number((cur&&cur[0]&&cur[0].recovered_amount)||0) + take;
          const amt = Number((cur&&cur[0]&&cur[0].amount)||0);
          await api('/prajapati_advances?id=eq.'+a.id, { method:'PATCH', headers:{'Prefer':'return=minimal'},
            body: JSON.stringify({ recovered_amount:rec, recovery_status: rec>=amt?'completed':'active' }) });
        } catch(ax){ console.warn('advance recovery', ax); }
      }
    }
    toast('Salary record save ho gaya ✓'+(advTake>0?' (advance '+inr(advTake)+' kata)':''));
    document.getElementById('modalRoot').innerHTML='';
  } catch(ex){ if(err)err.textContent='Save fail: '+ex.message; if(btn){btn.disabled=false;btn.textContent='💾 Save Salary Record';} }
}

// 3 tabs: Live (aaj kaun kahan) · Attendance report · Advance status
function trkTab(t){ window.__TRK_TAB = t; nav('tracking'); }

async function renderTracking(root){

function trkBtn(id,label,cur){
  const on = cur===id;
  return '<button onclick="trkTab(\''+id+'\')" style="flex:0 0 auto;padding:8px 14px;border-radius:20px;border:1px solid '+(on?'var(--teal)':'var(--bd)')+';background:'+(on?'var(--teal)':'var(--card)')+';color:'+(on?'#fff':'var(--sec)')+';font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer">'+label+'</button>';
}
// safe hours: DB me kabhi negative/0 aa jata hai — compute from times
function trkHours(r){
  if(!r.check_in_time) return null;
  const end = r.check_out_time ? new Date(r.check_out_time) : new Date();
  const hrs = (end - new Date(r.check_in_time))/3600000;
  if(!isFinite(hrs) || hrs < 0) return null;
  return hrs;
}
function trkHM(hrs){
  if(hrs===null) return '—';
  const h=Math.floor(hrs), m=Math.round((hrs-h)*60);
  return h+'h '+String(m).padStart(2,'0')+'m';
}

// ── TAB 1: Live — aaj kaun punch kar chuka, kahan hai ──
async function trkLive(){
  const t = today();
  const [rows, mem, pings] = await Promise.all([
    api('/trial_hr_attendance?select=*&attendance_date=eq.'+t+'&order=check_in_time.desc'),
    api('/trial_team_members?select=id,name,role,phone&active=eq.true&order=name'),
    api('/trial_hr_location_pings?select=*&attendance_date=eq.'+t+'&order=pinged_at.desc&limit=400').catch(()=>[])
  ]);
  await loadOffices();
  const off = (OFFICES && OFFICES.length) ? (OFFICES.find(o=>o.is_primary)||OFFICES[0]) : null;
  const byId = {}; (mem||[]).forEach(m=>byId[m.id]=m);
  // latest ping per member
  const lastPing = {};
  (pings||[]).forEach(function(p){ if(!lastPing[p.member_id]) lastPing[p.member_id]=p; });

  const list = rows||[];
  const working = list.filter(r=>r.check_in_time && !r.check_out_time);
  const done = list.filter(r=>r.check_out_time);
  const absent = (mem||[]).length - list.length;
  const liveCount = working.filter(r=>{
    const p = lastPing[r.member_id];
    return p && (Date.now() - new Date(p.pinged_at)) < 15*60*1000;
  }).length;

  let h = '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px">'+
    trkStat('Kaam pe', working.length, 'var(--green)')+
    trkStat('Live GPS', liveCount, 'var(--teal)')+
    trkStat('Ja chuke', done.length, 'var(--muted)')+
    trkStat('Nahi aaye', absent, 'var(--red)')+'</div>';

  if(!list.length){
    h += '<div class="card" style="text-align:center;color:var(--muted);font-size:13px;padding:24px">Aaj abhi kisi ne punch nahi kiya</div>';
  }

  // working first, then done
  const ordered = working.concat(done);
  ordered.forEach(function(r){
    const m = byId[r.member_id] || {};
    const outY = !!r.check_out_time;
    const hrs = trkHours(r);
    const p = lastPing[r.member_id];
    const ageMin = p ? Math.round((Date.now() - new Date(p.pinged_at))/60000) : null;
    const isLive = !outY && p && ageMin < 15;

    // position: latest ping > check-in
    const lat = p ? p.lat : r.check_in_lat;
    const lng = p ? p.lng : r.check_in_lng;
    let dist = p ? p.distance_from_office_m : null;
    if (dist == null && off && lat != null) dist = haversine(Number(lat), Number(lng), Number(off.latitude), Number(off.longitude));

    const inT = r.check_in_time ? new Date(r.check_in_time).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Kolkata'}) : '—';
    const outT = r.check_out_time ? new Date(r.check_out_time).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Kolkata'}) : null;
    const initials = (m.name||'?').split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
    const stripe = outY ? 'var(--muted)' : (isLive ? 'var(--teal)' : 'var(--amber)');

    // location label — distance se, flag se nahi (flag purana galat data ho sakta)
    let locTxt, locCol;
    if (dist == null) { locTxt = 'GPS nahi'; locCol = 'var(--muted)'; }
    else if (off && dist <= (off.geofence_radius_meters||300)) { locTxt = 'Office me'; locCol = 'var(--green)'; }
    else if (dist < 1000) { locTxt = dist+'m door'; locCol = 'var(--sec)'; }
    else { locTxt = (dist/1000).toFixed(1)+' km door'; locCol = 'var(--amber)'; }

    h += '<div class="card" style="margin-bottom:8px;border-left:3px solid '+stripe+';padding:11px 13px">'+
      '<div style="display:flex;gap:10px;align-items:flex-start">'+
        '<div style="width:34px;height:34px;border-radius:50%;background:var(--s1);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--navy);flex-shrink:0">'+esc(initials)+'</div>'+
        '<div style="flex:1;min-width:0">'+
          '<div style="display:flex;align-items:center;gap:6px">'+
            '<span style="font-size:14px;font-weight:600">'+esc(m.name||'—')+'</span>'+
            (isLive ? '<span style="display:inline-flex;align-items:center;gap:3px;background:var(--s1);color:var(--teal);font-size:9.5px;padding:1px 7px;border-radius:20px"><span style="width:5px;height:5px;border-radius:50%;background:var(--teal);display:inline-block"></span>LIVE</span>' : '')+
          '</div>'+
          '<div style="font-size:11px;color:var(--muted);margin-top:1px">'+esc(m.role||'')+'</div>'+
          '<div style="display:flex;gap:12px;flex-wrap:wrap;font-size:11.5px;margin-top:6px">'+
            '<span style="color:var(--sec)"><i class="ti ti-clock" style="font-size:12px;vertical-align:-2px"></i> '+trkHM(hrs)+'</span>'+
            '<span style="color:'+locCol+'"><i class="ti ti-map-pin" style="font-size:12px;vertical-align:-2px"></i> '+locTxt+'</span>'+
            (p ? '<span style="color:var(--muted)">'+(ageMin<1?'abhi':ageMin+' min pehle')+'</span>' : '')+
            (p && p.battery_pct!=null ? '<span style="color:'+(p.battery_pct<20?'var(--red)':'var(--muted)')+'"><i class="ti ti-battery-2" style="font-size:12px;vertical-align:-2px"></i> '+p.battery_pct+'%</span>' : '')+
          '</div>'+
          '<div style="font-size:10.5px;color:var(--muted);margin-top:4px">in '+inT+(outT?' · out '+outT:'')+'</div>'+
        '</div>'+
        '<div style="text-align:right;flex-shrink:0">'+
          '<span class="pill" style="background:var(--s1);color:'+(outY?'var(--muted)':'var(--green)')+';font-size:10px">'+(outY?'gaya':'kaam pe')+'</span>'+
          (lat!=null ? '<div style="margin-top:7px"><a href="https://maps.google.com/?q='+lat+','+lng+'" target="_blank" style="font-size:11px;color:var(--teal);text-decoration:none"><i class="ti ti-map-2" style="font-size:13px;vertical-align:-2px"></i> map</a></div>' : '')+
        '</div>'+
      '</div></div>';
  });

  if(!(pings||[]).length && working.length){
    h += '<div class="c-amber" style="border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:11.5px">'+
      '<b>Live GPS abhi shuru nahi hua</b><br>Naya version deploy hone ke baad, jo log punch karenge unki location har 5 min update hogi.</div>';
  }

  const punched = {}; list.forEach(r=>punched[r.member_id]=1);
  const missing = (mem||[]).filter(m=>!punched[m.id]);
  if(missing.length){
    h += '<div class="sechead" style="margin-top:14px"><i class="ti ti-user-off"></i>Punch nahi kiya ('+missing.length+')</div>';
    h += '<div class="card"><div style="font-size:12.5px;color:var(--sec);line-height:1.9">'+
      missing.slice(0,40).map(m=>esc(m.name)).join(' · ')+
      (missing.length>40?' <span style="color:var(--muted)">+'+(missing.length-40)+' aur</span>':'')+'</div></div>';
  }
  document.getElementById('trkBody').innerHTML = h;
}
function trkStat(label,val,color){
  return '<div class="card" style="padding:11px 8px;text-align:center"><div style="font-size:20px;font-weight:700;color:'+color+'">'+val+'</div>'+
    '<div style="font-size:10.5px;color:var(--muted);margin-top:2px">'+label+'</div></div>';
}

// ── TAB 2: Attendance report — last 30 din, per employee ──
async function trkAttendance(){
  const to = today();
  const d = new Date(); d.setDate(d.getDate()-29);
  const from = d.toISOString().slice(0,10);
  const [rows, mem] = await Promise.all([
    api('/trial_hr_attendance?select=*&attendance_date=gte.'+from+'&attendance_date=lte.'+to),
    api('/trial_team_members?select=id,name,role&active=eq.true&order=name')
  ]);
  const byId = {}; (mem||[]).forEach(m=>byId[m.id]=m);
  const agg = {};
  (rows||[]).forEach(function(r){
    const k = r.member_id; if(!k) return;
    if(!agg[k]) agg[k] = { days:0, late:0, hours:0, outside:0, noOut:0 };
    agg[k].days++;
    if(r.is_late) agg[k].late++;
    const hh = trkHours(r); if(hh!==null) agg[k].hours += hh;
    if(r.check_in_within_geofence===false) agg[k].outside++;
    if(!r.check_out_time) agg[k].noOut++;
  });
  const list = Object.keys(agg).map(k=>({ m: byId[k]||{}, ...agg[k] }))
    .sort((a,b)=>b.days-a.days);

  let h = '<div style="font-size:11.5px;color:var(--muted);margin-bottom:10px">'+from+' → '+to+' (30 din)</div>';
  if(!list.length){ h += '<div class="card" style="text-align:center;color:var(--muted);font-size:13px">Is period me koi attendance nahi</div>'; }
  list.forEach(function(r){
    const avg = r.days ? r.hours/r.days : 0;
    h += '<div class="card" style="margin-bottom:8px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px">'+
        '<div style="flex:1;min-width:0">'+
          '<div style="font-size:14px;font-weight:600">'+esc(r.m.name||'—')+'</div>'+
          '<div style="font-size:11px;color:var(--muted)">'+esc(r.m.role||'')+'</div>'+
        '</div>'+
        '<div style="text-align:right"><div style="font-size:18px;font-weight:700;color:var(--teal)">'+r.days+'</div>'+
        '<div style="font-size:10px;color:var(--muted)">din</div></div>'+
      '</div>'+
      '<div style="display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;margin-top:8px;padding-top:8px;border-top:1px solid var(--bd)">'+
        '<span style="color:var(--sec)">⏱ avg '+trkHM(avg)+'</span>'+
        (r.late?'<span style="color:var(--amber)">⏰ '+r.late+' late</span>':'')+
        (r.outside?'<span style="color:var(--amber)">📍 '+r.outside+' bahar</span>':'')+
        (r.noOut?'<span style="color:var(--red)">⚠️ '+r.noOut+' punch-out nahi</span>':'')+
      '</div></div>';
  });
  // never punched
  const seen = {}; Object.keys(agg).forEach(k=>seen[k]=1);
  const never = (mem||[]).filter(m=>!seen[m.id]);
  if(never.length){
    h += '<div class="sechead" style="margin-top:14px"><i class="ti ti-alert-circle"></i>30 din me ek bhi punch nahi ('+never.length+')</div>';
    h += '<div class="card"><div style="font-size:12.5px;color:var(--sec);line-height:1.9">'+
      never.slice(0,40).map(m=>esc(m.name)).join(' · ')+
      (never.length>40?' <span style="color:var(--muted)">+'+(never.length-40)+' aur</span>':'')+'</div></div>';
  }
  document.getElementById('trkBody').innerHTML = h;
}

// ── TAB 3: Advance status — kiska kitna baaki ──
async function trkAdvance(){
  const rows = await api('/prajapati_advances?select=*&order=requested_at.desc') || [];
  const paid = rows.filter(r=>r.status==='paid'||r.status==='approved');
  const outstanding = paid.reduce((s,r)=>s+Math.max(0,Number(r.balance_amount||0)),0);
  const given = paid.reduce((s,r)=>s+Number(r.amount||0),0);
  const recovered = paid.reduce((s,r)=>s+Number(r.recovered_amount||0),0);
  const pending = rows.filter(r=>r.status==='pending');
  const noKist = paid.filter(r=>Number(r.balance_amount||0)>0 && !(r.monthly_deduction>0) && !(r.recovery_mode==='months'&&r.total_months));

  let h = '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">'+
    trkStat('Diya', inr(given), 'var(--navy)')+
    trkStat('Wasool', inr(recovered), 'var(--green)')+
    trkStat('Baaki', inr(outstanding), 'var(--red)')+'</div>';

  if(pending.length){
    h += '<div class="c-amber" style="border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12.5px">'+
      '<b>⏳ '+pending.length+' request pending</b> — approve karna baaki</div>';
  }
  if(noKist.length){
    h += '<div class="c-amber" style="border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12.5px">'+
      '<b>⚠️ '+noKist.length+' advance me kist set nahi</b> — salary se nahi katega: '+
      noKist.slice(0,5).map(r=>esc(r.member_name||'')).join(', ')+'</div>';
  }

  // group by member
  const byMem = {};
  paid.forEach(function(r){
    const k = r.member_name || r.member_phone || '—';
    if(!byMem[k]) byMem[k] = { name:k, given:0, rec:0, bal:0, n:0, rows:[] };
    byMem[k].given += Number(r.amount||0);
    byMem[k].rec += Number(r.recovered_amount||0);
    byMem[k].bal += Math.max(0, Number(r.balance_amount||0));
    byMem[k].n++; byMem[k].rows.push(r);
  });
  const list = Object.values(byMem).sort((a,b)=>b.bal-a.bal);
  if(!list.length) h += '<div class="card" style="text-align:center;color:var(--muted);font-size:13px">Koi active advance nahi</div>';
  list.forEach(function(m){
    const pct = m.given>0 ? Math.round(m.rec/m.given*100) : 0;
    const clear = m.bal<=0;
    h += '<div class="card" style="margin-bottom:8px">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">'+
        '<div style="flex:1;min-width:0">'+
          '<div style="font-size:14px;font-weight:600">'+esc(m.name)+'</div>'+
          '<div style="font-size:11px;color:var(--muted)">'+m.n+' advance · diya '+inr(m.given)+'</div>'+
        '</div>'+
        '<div style="text-align:right"><div style="font-size:16px;font-weight:700;color:'+(clear?'var(--green)':'var(--red)')+'">'+(clear?'✓ clear':inr(m.bal))+'</div>'+
        (clear?'':'<div style="font-size:10px;color:var(--muted)">baaki</div>')+'</div>'+
      '</div>'+
      '<div style="height:6px;background:var(--s1);border-radius:99px;overflow:hidden;margin-top:8px">'+
        '<div style="height:100%;width:'+Math.min(100,pct)+'%;background:'+(clear?'var(--green)':'var(--teal)')+'"></div></div>'+
      '<div style="font-size:11px;color:var(--muted);margin-top:4px">'+pct+'% wasool</div>'+
      '</div>';
  });

// ── EMI schedule: kaise katega, month by month ──
function buildEmiPlan(adv){
  const amt = Number(adv.amount||0);
  const recovered = Number(adv.recovered_amount||0);
  let bal = Number(adv.balance_amount||0);
  let inst = (adv.recovery_mode==='months' && adv.total_months)
    ? Math.round(amt / adv.total_months)
    : Number(adv.monthly_deduction||0);
  if(inst<=0) return { rows:[], err:'Monthly amount set nahi hai — Edit karke set karo' };
  // start month
  let sm = adv.recovery_start_month || new Date().toISOString().slice(0,7);
  let [y,m] = sm.split('-').map(Number);
  const now = new Date().toISOString().slice(0,7);
  const rows = [];
  let guard = 0;
  while(bal > 0 && guard < 60){
    const take = Math.min(inst, bal);
    const mk = y+'-'+String(m).padStart(2,'0');
    bal = Math.round((bal - take)*100)/100;
    rows.push({ month:mk, amount:take, balAfter:bal, past: mk < now, current: mk===now });
    m++; if(m>12){ m=1; y++; }
    guard++;
  }
  return { rows, inst, recovered, amt };
}
async function toggleEmi(id){
  const box = document.getElementById('emi-'+id);
  if(!box) return;
  if(box.style.display !== 'none'){ box.style.display='none'; return; }
  box.style.display='block';
  box.innerHTML='<div style="font-size:11px;color:var(--muted)">loading…</div>';
  try{
    const rows = await api('/prajapati_advances?select=*&id=eq.'+id);
    const adv = rows && rows[0];
    if(!adv){ box.innerHTML='<div style="font-size:11px;color:var(--red)">Advance nahi mila</div>'; return; }
    const plan = buildEmiPlan(adv);
    if(plan.err){ box.innerHTML='<div class="pill pill-amber" style="display:block;padding:8px;font-size:11px">'+plan.err+'</div>'; return; }
    // already deducted installments
    let done = [];
    try{ done = await api('/prajapati_advance_installments?select=salary_month,deducted_amount,status&advance_id=eq.'+id+'&order=salary_month') || []; }catch(e){}
    const doneMap = {};
    done.forEach(function(d){ doneMap[d.salary_month] = d; });

    let h='<div style="background:var(--s1);border-radius:10px;padding:10px">';
    h+='<div style="font-size:11px;color:var(--muted);margin-bottom:6px">Total '+inr(plan.amt)+' · har month '+inr(plan.inst)+' · '+plan.rows.length+' kist</div>';
    h+='<table style="width:100%;font-size:12px;border-collapse:collapse">';
    h+='<tr style="color:var(--muted);font-size:10px;text-transform:uppercase"><th style="text-align:left;padding:3px 0">Month</th><th style="text-align:right">Kist</th><th style="text-align:right">Baaki</th><th style="text-align:center">Status</th></tr>';
    plan.rows.forEach(function(r){
      const d = doneMap[r.month];
      const st = d ? (d.status==='skipped' ? '<span style="color:var(--amber)">skip</span>' : '<span style="color:var(--green)">✓ kata</span>')
                   : (r.current ? '<span style="color:var(--teal)">is month</span>' : '<span style="color:var(--muted)">baaki</span>');
      h+='<tr style="border-top:1px solid var(--bd)">'+
        '<td style="padding:5px 0">'+r.month+'</td>'+
        '<td style="text-align:right;font-weight:600">'+inr(d?d.deducted_amount:r.amount)+'</td>'+
        '<td style="text-align:right;color:var(--muted)">'+inr(r.balAfter)+'</td>'+
        '<td style="text-align:center;font-size:11px">'+st+'</td></tr>';
    });
    h+='</table>';
    h+='<div style="font-size:10px;color:var(--muted);margin-top:6px">Salary banate waqt ye apne aap katega — chaho to kam/zyada ya skip kar sakte ho.</div>';
    h+='</div>';
    box.innerHTML=h;
  }catch(e){ box.innerHTML='<div style="font-size:11px;color:var(--red)">Fail: '+esc(e.message)+'</div>'; }
}

async function submitExpense(btn){
  const err = document.getElementById('expErr'); err.textContent='';
  const amt = parseFloat(document.getElementById('expAmt').value||'0');
  const cat = document.getElementById('expCat').value;
  const date = document.getElementById('expDate').value;
  const remark = document.getElementById('expRemark').value.trim();
  if (!amt || amt<=0){ err.textContent='Amount daalo'; return; }
  if (!date){ err.textContent='Date daalo'; return; }
  let phone=USER.phone, name=USER.name;
  const memSel = document.getElementById('expMember');
  if (memSel){ const parts=memSel.value.split('|'); phone=parts[0]; name=parts[1]||''; }
  btn=btn||(typeof event!=="undefined"&&event.target); if(btn){btn.disabled=true;btn.textContent='Saving...';}
  try {
    const row = {
      expense_type:'internal', internal_category:cat, total_amount:amt, other_amount:amt,
      expense_date:date, team_member_phone:phone, team_member_name:name,
      remark:remark||null, receipt_url:EXP_RECEIPT_URL||null,
      approval_status:'pending', payment_status:'pending', source:'hr',
      created_by:USER.phone, created_by_name:USER.name
    };
    await api('/prajapati_expenses', { method:'POST', headers:{'Prefer':'return=minimal'}, body:JSON.stringify(row) });
    // notify 2-3 admins on WhatsApp (silent)
    try {
      EXPENSE_ADMIN_PHONES.forEach((ap,i)=>{
        if(ap!==phone) setTimeout(()=>notifyWhatsApp(ap, 'Admin', 'hr_expense_new', [name, inr(amt), cat], 'expense'), i*300);
      });
    } catch(_){}
    toast('Expense submit ho gaya ✓');
    nav('expenses');
  } catch(e){ err.textContent='Save fail: '+e.message; if(btn){btn.disabled=false;btn.textContent='Submit Expense';} }
}

async function expApprove(btn, status){
  const id=btn.getAttribute('data-exp');
  if(btn){btn.disabled=true;btn.textContent='...';}
  try {
    await api('/prajapati_expenses?id=eq.'+id,{method:'PATCH',headers:{'Prefer':'return=minimal'},
      body:JSON.stringify({approval_status:status, approved_by:USER.id, approved_at:new Date().toISOString()})});
    toast(status==='approved'?'Approved ✓':'Rejected');
    nav('expenses');
  } catch(e){ toast('Fail: '+e.message); if(btn){btn.disabled=false;btn.textContent=status==='approved'?'Approve':'Reject';} }
}
async function expPay(btn){
  const id=btn.getAttribute('data-exp');
  const amt=parseFloat(btn.getAttribute('data-amt')||'0');
  const phone=btn.getAttribute('data-phone');
  const name=btn.getAttribute('data-name');
  if(!confirm('Pay '+inr(amt)+' to '+(name||'employee')+'?')) return;
  if(btn){btn.disabled=true;btn.textContent='Paying...';}
  try {
    await api('/prajapati_expenses?id=eq.'+id,{method:'PATCH',headers:{'Prefer':'return=minimal'},
      body:JSON.stringify({payment_status:'paid'})});
    // notify submitter (silent)
    if(phone) notifyWhatsApp(phone, name, 'hr_expense_paid', [name||'', inr(amt)], 'expense');
    toast('Paid '+inr(amt)+' ✓');
    nav('expenses');
  } catch(e){ toast('Fail: '+e.message); if(btn){btn.disabled=false;btn.textContent='Pay '+inr(amt);} }
}

function fld(id,label,val){
  return '<label style="font-size:12px;color:var(--muted)">'+label+'</label>'+

function opt(v,label,cur){ return '<option value="'+v+'"'+(cur===v?' selected':'')+'>'+label+'</option>'; }
function docRow(prefix,label,url){
  let h = '<label style="font-size:12px;color:var(--muted)">'+label+'</label>';
  h += '<div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">';
  h += '<input type="file" accept="image/*" onchange="onDocUpload(this,\''+prefix+'\')" style="flex:1">';
  h += '<span id="doclbl_'+prefix+'">'+(url?'<span class="pill pill-green" style="cursor:pointer" onclick="viewImg(\''+esc(url)+'\')">View</span>':'')+'</span>';
  h += '</div>';
  return h;
}
async function onDocUpload(input,prefix){

    DOC_URLS[key]=url;

      h+='<div style="font-size:12px;color:var(--muted);margin-bottom:10px">Tumhara rate: <b style="color:var(--teal)">₹'+PETROL_RATE+'/km</b></div>';

    h+='<div><label style="font-size:12px;color:var(--muted)">KM chala</label><input type="number" id="ptKm" inputmode="numeric" placeholder="0" oninput="calcPetrol()" style="margin-bottom:10px"></div>';
    h+='<div><label style="font-size:12px;color:var(--muted)">Amount (₹)</label><input type="number" id="ptAmt" inputmode="numeric" placeholder="0" style="margin-bottom:10px"></div>';
    h+='</div>';
    h+='<label style="font-size:12px;color:var(--muted)">Kahan gaye / purpose</label><input type="text" id="ptPurpose" placeholder="client visit, site, etc" style="margin-bottom:10px">';
    h+='<button class="btn-primary" style="width:100%;height:44px;font-weight:600" onclick="submitPetrol(this)">Submit Travel Claim</button>';
    h+='<div id="ptErr" style="color:var(--red);font-size:12px;text-align:center;margin-top:8px"></div>';
    h+='</div>';

    h+='<div class="sechead" style="margin-top:16px"><i class="ti ti-list"></i>Mere travel claims</div>';

      h+='<div class="card">';
      mine.forEach(r=>{
        const st=(r.status||'pending');
        const pill=st==='paid'?'pill-green':st==='approved'?'pill-blue':st==='rejected'?'pill-red':'pill-amber';
        h+='<div class="row-item"><div style="flex:1"><div style="font-size:13px;font-weight:500">'+inr(r.amount)+'</div>'+

    root.innerHTML=h;
  } catch(e){ root.innerHTML='<div class="card" style="color:var(--red)">Load fail: '+esc(e.message)+'</div>'; }
}
function calcPetrol(){
  const km=parseFloat(document.getElementById('ptKm').value||'0');
  if(PETROL_RATE>0 && km>0){ document.getElementById('ptAmt').value=Math.round(km*PETROL_RATE); }
}
async function submitPetrol(btn){
